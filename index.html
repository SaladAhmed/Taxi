<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: sans-serif; }
        .card { background: #252945; border-radius: 15px; padding: 15px; border: 1px solid #30355a; position: relative; }
        .hidden { display: none !important; }
        input { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        #authSection { position: fixed; inset: 0; background: #1a1c2c; z-index: 2000; display: flex; align-items: center; justify-content: center; p: 20px; }
    </style>
</head>
<body class="pb-24">

    <div id="authSection">
        <div class="bg-[#252945] p-8 rounded-3xl w-full max-w-sm border-t-4 border-yellow-400 text-center">
            <h1 class="text-yellow-400 font-black text-2xl mb-6">M. SALAD LOGIN</h1>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="handleAuth()" class="w-full bg-yellow-400 text-black py-4 rounded-xl font-black mt-4 uppercase">LOGIN</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-2">
                <button onclick="changeLang('so')" class="bg-gray-700 px-3 py-1 rounded text-xs font-bold">SO</button>
                <button onclick="changeLang('no')" class="bg-yellow-400 text-black px-3 py-1 rounded text-xs font-bold">NO</button>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold border border-red-500/30 px-3 py-1.5 rounded-lg text-[10px]">KA BAX</button>
        </div>

        <h2 class="text-center font-black text-yellow-400 text-xl mb-6 uppercase">M. Salad Transport</h2>

        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="card border-l-4 border-green-500 text-center">
                <p class="text-[8px] text-gray-400 font-bold uppercase">INNTEKT</p>
                <h3 id="totalIncome" class="text-xs font-black text-green-400">0 kr</h3>
            </div>
            <div class="card border-l-4 border-red-500 text-center">
                <p class="text-[8px] text-gray-400 font-bold uppercase">UTGIFT</p>
                <h3 id="totalExpense" class="text-xs font-black text-red-400">0 kr</h3>
            </div>
            <div class="card border-l-4 border-blue-400 text-center">
                <p class="text-[8px] text-gray-400 font-bold uppercase">EIER</p>
                <h3 id="totalOwner" class="text-xs font-black text-blue-400">0 kr</h3>
            </div>
        </div>

        <div class="card border-2 border-yellow-400/20 text-center py-6 mb-6">
            <p class="text-[10px] text-yellow-400 font-bold uppercase tracking-widest mb-1">NETTO RESULTAT</p>
            <h2 id="netResult" class="text-3xl font-black">0 kr</h2>
        </div>

        <div id="dashboardSection" class="section space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadData(u.uid);
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        window.loadData = (uid) => {
            // Wuxuu isku mar raadinayaa transfers iyo xogtaada kale
            const colls = ['transfers', 'data', 'xisaabaadka'];
            colls.forEach(c => {
                const q = query(collection(db, c), where("userId", "==", uid));
                onSnapshot(q, snap => {
                    let ti=0, te=0, to=0;
                    const list = document.getElementById('dashboardSection');
                    list.innerHTML = '';
                    snap.forEach(dDoc => {
                        const d = dDoc.data();
                        const amt = Number(d.amount);
                        if(d.mode === 'income') ti += amt; else te += amt;
                        list.innerHTML += `<div class="card flex justify-between items-center border-l-4 ${d.mode === 'income' ? 'border-green-500' : 'border-red-500'}">
                            <div><p class="font-bold text-xs uppercase">${d.name || 'Salad'}</p><p class="text-[9px] text-gray-500">${d.date}</p></div>
                            <div class="flex items-center gap-4">
                                <p class="font-black ${d.mode === 'income' ? 'text-green-400' : 'text-red-400'}">${amt.toLocaleString()} kr</p>
                                <button onclick="deleteItem('${c}', '${dDoc.id}')" class="text-gray-600"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>`;
                    });
                    document.getElementById('totalIncome').innerText = ti.toLocaleString() + ' kr';
                    document.getElementById('totalExpense').innerText = te.toLocaleString() + ' kr';
                    document.getElementById('netResult').innerText = (ti - te).toLocaleString() + ' kr';
                });
            });
        };

        window.handleAuth = () => {
            const e = document.getElementById('emailInput').value, p = document.getElementById('passInput').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Email ama Password khaldan!"));
        };
        window.logout = () => signOut(auth);
        window.deleteItem = async (c, id) => { if(confirm("Tirtir?")) await deleteDoc(doc(db, c, id)); };
    </script>
</body>
</html>
