<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed Salad Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .card { background: #252945; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #30355a; position: relative; }
        #authSection { position: fixed; inset: 0; background: #1a1c2c; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .auth-card { background: #252945; border-radius: 15px; padding: 20px; width: 100%; max-width: 320px; border-top: 4px solid #fbbf24; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-input { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 8px; padding: 10px; width: 100%; font-size: 14px; margin-bottom: 8px; outline: none; }
        .auth-btn { width: 100%; background-color: #fbbf24; color: black; padding: 12px; border-radius: 10px; font-weight: bold; text-transform: uppercase; font-size: 14px; margin-top: 10px; transition: 0.2s; border: none; }
        .result-card { background: linear-gradient(135deg, #30355a 0%, #1a1c2c 100%); border: 2px solid #fbbf24; }
        input, select { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; font-size: 16px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        .lang-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; transition: 0.3s; background: #374151; border: none; color: white; }
        .active-lang { background: #fbbf24 !important; color: black !important; }
        nav button { transition: 0.3s; opacity: 0.6; background: none; border: none; color: white; }
        nav button.active { opacity: 1; color: #fbbf24; }
    </style>
</head>
<body class="pb-24">

    <!-- LOGIN SCREEN -->
    <div id="authSection">
        <div class="w-full flex flex-col items-center">
            <h1 class="text-xl font-black text-yellow-400 mb-4 uppercase tracking-wider text-center">M. Salad Transport</h1>
            <div class="auth-card text-center">
                <h2 id="authTitle" class="text-white text-sm font-bold mb-4 uppercase tracking-widest">Login</h2>
                <input type="email" id="emailInput" class="auth-input" placeholder="Email">
                <input type="password" id="passInput" class="auth-input" placeholder="Password">
                <button id="mainAuthBtn" onclick="handleAuth()" class="auth-btn shadow-lg mb-4">Login</button>
                <div class="flex flex-col gap-2">
                    <button id="toggleAuthBtn" onclick="toggleAuthMode()" class="text-gray-400 text-[10px] font-bold uppercase transition">Ma haysatid Account? Sign Up</button>
                    <button onclick="resetPassword()" class="text-yellow-400 text-[9px] font-bold uppercase hover:underline">Forgot Password?</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden p-4">
        <div class="mb-4 text-center">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2">
                    <button onclick="changeLang('so')" id="btn-so" class="lang-btn active-lang">SO</button>
                    <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
                    <button onclick="changeLang('no')" id="btn-no" class="lang-btn">NO</button>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleVisibility()" class="text-yellow-400 text-xl"><i id="eyeIcon" class="fas fa-eye"></i></button>
                    <button onclick="logout()" class="text-red-400 font-bold border border-red-900/30 px-3 py-1 rounded text-[10px] uppercase">Ka Bax</button>
                </div>
            </div>
            
            <h1 class="text-lg font-black text-yellow-400 uppercase tracking-tighter mb-4">Mohamed Salad Transport</h1>
            
            <div class="grid grid-cols-3 gap-2">
                <div class="card border-l-4 border-green-500 p-2"><p data-i18n="income" class="text-[8px] text-gray-400 uppercase font-bold">Dakhli</p><h2 id="totalIncome" class="text-xs font-bold text-green-400">0 kr</h2></div>
                <div class="card border-l-4 border-red-500 p-2"><p data-i18n="expense" class="text-[8px] text-gray-400 uppercase font-bold">Kharash</p><h2 id="totalExpense" class="text-xs font-bold text-red-400">0 kr</h2></div>
                <div class="card border-l-4 border-blue-400 p-2"><p data-i18n="owner" class="text-[8px] text-gray-400 uppercase font-bold">Owner</p><h2 id="totalOwner" class="text-xs font-bold text-blue-400">0 kr</h2></div>
            </div>

            <div class="card result-card mt-2">
                <div class="grid grid-cols-2 border-b border-gray-600 pb-2 mb-2 text-orange-400 font-bold">
                    <div><p data-i18n="mva_refund" class="text-[9px] text-gray-400 uppercase">MVA Refund</p><p id="mvaTax" class="text-sm">0 kr</p></div>
                    <div><p data-i18n="feriepenger" class="text-[9px] text-gray-400 uppercase">Feriepenger</p><p id="ferieTax" class="text-sm">0 kr</p></div>
                </div>
                <div class="text-center"><p data-i18n="net_result" class="text-[10px] text-yellow-400 uppercase font-bold">Net Result</p><h2 id="netResult" class="text-2xl font-black mt-1">0 kr</h2></div>
            </div>
        </div>
        
        <div id="dashboardSection" class="section"><div id="transactionList" class="space-y-2"></div></div>
        <div id="statsSection" class="section hidden"><div id="categoryTotals" class="space-y-2"></div></div>
        <div id="inputSection" class="section hidden">
            <div class="card p-4">
                <div class="flex gap-2 mb-6 font-bold uppercase text-xs">
                    <button onclick="setMode('income')" id="modeInc" class="flex-1 py-3 rounded-xl bg-green-600 text-white shadow-lg">Income ↑</button>
                    <button onclick="setMode('expense')" id="modeExp" class="flex-1 py-3 rounded-xl bg-gray-700">Kharash ↓</button>
                </div>
                <div class="space-y-2">
                    <input type="date" id="dateInput">
                    <input type="text" id="nameInput" placeholder="Magaca">
                    <input type="number" id="amountInput" placeholder="Lacagta (Kr)">
                    <select id="typeInput"></select>
                    <button onclick="saveEntry()" id="btnSave" class="w-full bg-yellow-400 text-black py-4 rounded-2xl font-black mt-4 uppercase">Kaydi</button>
                </div>
            </div>
        </div>
    </div>

    <nav id="bottomNav" class="fixed bottom-0 w-full bg-[#252945] border-t border-gray-800 flex justify-around py-3 z-50 hidden">
        <button onclick="showSection('dashboard')" id="nav-dashboard" class="active flex flex-col items-center"><i class="fas fa-list-ul"></i><span data-i18n="nav_summary" class="text-[10px]">Guudmar</span></button>
        <button onclick="showSection('stats')" id="nav-stats" class="flex flex-col items-center"><i class="fas fa-chart-pie"></i><span data-i18n="nav_report" class="text-[10px]">Warbixin</span></button>
        <button onclick="showSection('input')" id="nav-input" class="flex flex-col items-center"><i class="fas fa-plus-circle"></i><span data-i18n="nav_add" class="text-[10px]">Geli Xog</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null, mode = 'income', isHidden = false, currentLang = localStorage.getItem('appLang') || 'so';

        const i18n = {
            so: { income: "Dakhli", expense: "Kharash", owner: "Owner", mva_refund: "MVA Refund", feriepenger: "Feriepenger", net_result: "Net Result", nav_summary: "Guudmar", nav_report: "Warbixin", nav_add: "Geli Xog" },
            en: { income: "Income", expense: "Expense", owner: "Owner", mva_refund: "VAT Refund", feriepenger: "Holiday Pay", net_result: "Net Profit", nav_summary: "Summary", nav_report: "Report", nav_add: "Add Entry" },
            no: { income: "Inntekt", expense: "Utgift", owner: "Eier", mva_refund: "MVA Refund", feriepenger: "Feriepenger", net_result: "Netto Resultat", nav_summary: "Oversikt", nav_report: "Rapport", nav_add: "Legg til" }
        };

        const cats = {
            income: { so: ['Kaarka Taksi', 'Caddaan', 'Faktura', 'Wax kale'], en: ['Taxi Card', 'Cash', 'Invoice', 'Other'], no: ['Taxi Kort', 'Kontanter', 'Faktura', 'Annet'] },
            expense: { so: ['Mushaar', 'Bankuttak', 'Skatt', 'Shidaal', 'Dayactir', 'Regnskap', 'Forsikring', 'Wax kale'], en: ['Salary', 'Withdrawal', 'Tax', 'Fuel', 'Repair', 'Accounting', 'Insurance', 'Other'], no: ['Lønn', 'Eieruttak', 'Skatt', 'Drivstoff', 'Reparasjon', 'Regnskap', 'Forsikring', 'Annet'] }
        };

        window.toggleAuthMode = () => {
            const isLogin = document.getElementById('authTitle').innerText === 'Login';
            document.getElementById('authTitle').innerText = isLogin ? 'Sign Up' : 'Login';
            document.getElementById('mainAuthBtn').innerText = isLogin ? 'Create Account' : 'Login';
            document.getElementById('toggleAuthBtn').innerText = isLogin ? 'Haysataa Account? Login' : 'Ma haysatid Account? Sign Up';
        };

        window.handleAuth = () => {
            const email = document.getElementById('emailInput').value, pass = document.getElementById('passInput').value;
            if(!email || !pass) return alert("Fadlan buuxi Email iyo Password");
            if(document.getElementById('authTitle').innerText === 'Sign Up') createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            else signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Email/Pass khaldan"));
        };

        window.resetPassword = () => {
            const email = document.getElementById('emailInput').value;
            if(email) sendPasswordResetEmail(auth, email).then(() => alert("Link-ga password-ka waa lagu soo diray!")).catch(e => alert(e.message));
            else alert("Qor Email-kaaga marka hore");
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('bottomNav').classList.remove('hidden');
                changeLang(currentLang);
                loadData();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('bottomNav').classList.add('hidden');
            }
        });

        window.loadData = () => {
            if(!currentUser) return;
            const q = query(collection(db, "xisaabaadka"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('transactionList');
                const statsList = document.getElementById('categoryTotals');
                list.innerHTML = ''; statsList.innerHTML = '';
                let ti=0, te=0, ownerSum=0, mvaSum=0, totalFP=0;
                let catTotals = {};
                let catModes = {};

                snapshot.forEach((docSnap) => {
                    const d = docSnap.data();
                    if (!d.userId || d.userId === currentUser.uid) {
                        const entryDate = new Date(d.date);
                        const mvaThreshold = new Date("2026-05-04");

                        if(d.mode === 'income') {
                            ti += d.amount;
                            if(entryDate >= mvaThreshold) {
                                if(d.type.includes('Faktura') || d.type.includes('Annet') || d.type.includes('Wax kale')) {
                                    mvaSum += (d.amount * 0.25);
                                }
                            }
                        } else {
                            te += d.amount;
                            if(d.type.includes('Owner') || d.type.includes('Eier')) ownerSum += d.amount;
                            if(d.type.includes('Lønn') || d.type.includes('Salary') || d.type.includes('Mushaar')) totalFP += (d.amount * 0.102);
                            if(['Shidaal','Drivstoff','Fuel','Dayactir','Repair','Regnskap'].some(v => d.type.includes(v))) mvaSum += (d.amount / 5);
                        }
                        
                        catTotals[d.type] = (catTotals[d.type] || 0) + d.amount;
                        catModes[d.type] = d.mode;

                        const displayAmt = isHidden ? "**** kr" : Math.round(d.amount).toLocaleString() + " kr";
                        const borderColor = d.mode === 'income' ? 'border-green-500' : 'border-red-500';
                        const textColor = d.mode === 'income' ? 'text-green-400' : 'text-red-400';

                        list.innerHTML += `<div class="card flex justify-between items-center border-l-4 ${borderColor}">
                            <div><p class="text-[9px] text-yellow-400 font-bold uppercase">${d.name}</p><p class="text-sm font-bold">${d.type}</p><p class="text-[10px] text-gray-500">${d.date}</p></div>
                            <div class="flex items-center gap-3"><p class="font-bold ${textColor}">${displayAmt}</p>
                            <button onclick="deleteItem('${docSnap.id}')" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button></div></div>`;
                    }
                });

                for (const [cat, total] of Object.entries(catTotals)) {
                    const isInc = catModes[cat] === 'income';
                    const bCol = isInc ? 'border-green-500' : 'border-red-500';
                    const tCol = isInc ? 'text-green-400' : 'text-red-400';
                    statsList.innerHTML += `<div class="card flex justify-between border-l-4 ${bCol}"><span class="font-bold text-sm text-gray-200">${cat}</span><span class="font-bold ${tCol}">${isHidden ? "**** kr" : Math.round(total).toLocaleString() + " kr"}</span></div>`;
                }

                const format = (v) => isHidden ? "**** kr" : Math.round(v).toLocaleString() + " kr";
                document.getElementById('totalIncome').innerText = format(ti);
                document.getElementById('totalExpense').innerText = format(te);
                document.getElementById('totalOwner').innerText = format(ownerSum);
                document.getElementById('mvaTax').innerText = format(mvaSum);
                document.getElementById('ferieTax').innerText = format(totalFP);
                document.getElementById('netResult').innerText = format(ti - te - totalFP);
            });
        };

        window.saveEntry = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value), date = document.getElementById('dateInput').value;
            if(amt && date) {
                await addDoc(collection(db, "xisaabaadka"), { amount: amt, date: date, name: document.getElementById('nameInput').value || "Info", type: document.getElementById('typeInput').value, mode: mode, userId: currentUser.uid });
                document.getElementById('amountInput').value = ''; showSection('dashboard');
            }
        };

        window.setMode = (m) => {
            mode = m;
            document.getElementById('modeInc').className = m === 'income' ? 'flex-1 py-3 rounded-xl bg-green-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl bg-gray-700';
            document.getElementById('modeExp').className = m === 'expense' ? 'flex-1 py-3 rounded-xl bg-red-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl bg-gray-700';
            document.getElementById('typeInput').innerHTML = cats[m][currentLang].map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.changeLang = (lang) => {
            currentLang = lang; localStorage.setItem('appLang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[lang][el.getAttribute('data-i18n')]);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            setMode(mode);
        };

        window.showSection = (s) => {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById(s + 'Section').classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + s).classList.add('active');
        };

        window.deleteItem = async (id) => { if(confirm("Tirtir?")) await deleteDoc(doc(db, "xisaabaadka", id)); };
        window.toggleVisibility = () => { isHidden = !isHidden; loadData(); document.getElementById('eyeIcon').className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye'; };
        document.getElementById('dateInput').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
