<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Regnskap Edition</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransportPRO">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --yellow: #f1c40f;
            --green: #2ecc71;
            --red: #ff4757;
            --blue: #3b82f6;
            --text: #f8fafc;
            --border: #334155;
        }

        .light-theme {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
            transition: 0.3s;
            overflow-x: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }

        .auth-container {
            padding: 30px;
            text-align: center;
            max-width: 400px;
            margin: 40px auto;
            background: var(--card);
            border-radius: 15px;
        }

        .header-title {
            text-align: center;
            color: var(--yellow);
            font-weight: bold;
            padding: 20px 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            max-width: 800px;
            margin: auto;
        }

        .stat-box {
            background: var(--card);
            border: 1.5px solid;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-box small { font-size: 9px; display: block; margin-bottom: 5px; font-weight: bold; }

        .mva-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 15px;
            margin: 10px auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 780px;
        }

        .mva-item { text-align: center; border-right: 1px solid var(--border); }
        .mva-item:last-child { border-right: none; }

        .summary-card {
            background: var(--card);
            border: 2px solid var(--yellow);
            border-radius: 20px;
            margin: 10px auto;
            padding: 20px;
            text-align: center;
            max-width: 770px;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #64748b;
            font-size: 10px;
            cursor: pointer;
            flex: 1;
        }

        .nav-item.active { color: var(--yellow); }

        input, select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-save {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* CALCULATOR STYLES */
        .calc-container {
            max-width: 350px;
            margin: 10px auto;
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid var(--border);
        }
        .calc-display {
            width: 100%;
            height: 60px;
            background: #0f172a;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            color: var(--yellow);
            font-size: 24px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow-x: auto;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .calc-btn {
            padding: 18px;
            border-radius: 10px;
            border: none;
            background: var(--border);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-op { background: var(--blue); }
        .btn-eq { background: var(--green); grid-column: span 2; }
        .btn-clr { background: var(--red); }

        /* Rest of Styles (OCR, Scanner, etc.) */
        .status-box { display: none; background: #111827; border: 2px solid var(--yellow); padding: 12px; border-radius: 12px; margin-bottom: 15px; color: var(--yellow); text-align: center; }
        .scanner-preview { width: 100%; height: 220px; background: #000; border-radius: 10px; margin-bottom: 15px; display: none; object-fit: cover; border: 2px solid var(--yellow); }
        .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; cursor: pointer; }
        .ocr-results { display: none; background: var(--card); border: 2px solid var(--green); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page" class="auth-container">
    <h2 style="color:var(--yellow)">🚖 TRANSPORT PRO</h2>
    <br>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    <p style="color:var(--yellow); cursor:pointer; font-size:12px; margin-top:15px;" onclick="forgotPassword()">Glemt passord?</p>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">

    <div class="top-bar">
        <i class="fas fa-moon" onclick="toggleTheme()"></i>
        <div id="user-display-name" style="font-weight:bold">Laster...</div>
        <div>
            <span onclick="updateLang('no')">🇳🇴</span>
            <span onclick="updateLang('so')">🇸🇴</span>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="page-dash" class="page">
        <div class="stats-grid">
            <div class="stat-box" style="border-color:var(--green);color:var(--green)">
                <small>INNTEKT</small><span id="total-income">0 kr</span>
            </div>
            <div class="stat-box" style="border-color:var(--red);color:var(--red)">
                <small>UTGIFTER</small><span id="total-expense">0 kr</span>
            </div>
            <div class="stat-box" style="border-color:var(--blue);color:var(--blue)">
                <small>NETTO</small><span id="total-netto">0 kr</span>
            </div>
        </div>
        <div class="mva-card">
            <div class="mva-item"><small>Skyldig MVA</small><br><b id="res-mva">0 kr</b></div>
            <div class="mva-item"><small>Avskrivning</small><br><b id="res-avsk">0 kr</b></div>
        </div>
        <div class="summary-card">
            <small>RESULTAT FØR SKATT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        <div id="entries-list"></div>
    </div>

    <!-- ADD DATA & OCR -->
    <div id="page-add" class="page" style="display:none; padding:20px;">
        <div class="header-title">REGISTRER DATA</div>
        <div id="ocr-status" class="status-box">OCR READY</div>
        <button class="btn-save btn-op" style="margin-bottom:10px;" onclick="startScanner()">📸 SCAN RECEIPT</button>
        <div class="upload-area" onclick="document.getElementById('file-upload-input').click()">
            <i class="fas fa-file-image"></i><p>Geli sawirka fakturada</p>
        </div>
        <input type="file" id="file-upload-input" style="display:none" onchange="handleFileUpload(this)">
        <video id="scanner-video" class="scanner-preview" autoplay playsinline></video>
        <canvas id="scanner-canvas" style="display:none;"></canvas>
        <img id="scanned-img" class="scanner-preview"/>
        <button id="capture-btn" class="btn-save" style="display:none; background:var(--green); margin-bottom:15px;" onclick="capturePhoto()">TA SAWIRKA</button>

        <div id="ocr-results" class="ocr-results">
            <h4>✅ Aqristay</h4>
            <div id="ocr-data-content"></div>
        </div>

        <input type="date" id="entry-date">
        <select id="entry-category">
            <option value="3030">3030 - Kjøreinntekter</option>
            <option value="7000">7000 - Drivstoff</option>
            <option value="6755">6755 - Sentralavgift</option>
            <!-- Add more options here -->
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        <div class="btn-group">
            <button class="btn-save" style="background:var(--green)" onclick="saveData('income')">INNTEKT</button>
            <button class="btn-save" style="background:var(--red)" onclick="saveData('expense')">UTGIFT</button>
        </div>
    </div>

    <!-- KALKULATOR -->
    <div id="page-calc" class="page" style="display:none; padding:20px;">
        <div class="header-title">KALKULATOR</div>
        <div class="calc-container">
            <div id="calc-display" class="calc-display">0</div>
            <div class="calc-grid">
                <button class="calc-btn btn-clr" onclick="clearCalc()">C</button>
                <button class="calc-btn btn-op" onclick="appendCalc('/')">/</button>
                <button class="calc-btn btn-op" onclick="appendCalc('*')">×</button>
                <button class="calc-btn btn-clr" onclick="backspaceCalc()">⌫</button>
                <button class="calc-btn" onclick="appendCalc('7')">7</button>
                <button class="calc-btn" onclick="appendCalc('8')">8</button>
                <button class="calc-btn" onclick="appendCalc('9')">9</button>
                <button class="calc-btn btn-op" onclick="appendCalc('-')">-</button>
                <button class="calc-btn" onclick="appendCalc('4')">4</button>
                <button class="calc-btn" onclick="appendCalc('5')">5</button>
                <button class="calc-btn" onclick="appendCalc('6')">6</button>
                <button class="calc-btn btn-op" onclick="appendCalc('+')">+</button>
                <button class="calc-btn" onclick="appendCalc('1')">1</button>
                <button class="calc-btn" onclick="appendCalc('2')">2</button>
                <button class="calc-btn" onclick="appendCalc('3')">3</button>
                <button class="calc-btn" onclick="appendCalc('.')">.</button>
                <button class="calc-btn" onclick="appendCalc('0')">0</button>
                <button class="calc-btn btn-eq" onclick="calculateResult()">=</button>
            </div>
            <button class="btn-save" style="background:var(--yellow); color:black; margin-top:15px;" onclick="copyToAmount()">KOOBBIY BELØP</button>
        </div>
    </div>

    <!-- REPORTS -->
    <div id="page-reports" class="page" style="display:none; padding:20px;">
        <div class="header-title">REPORTS</div>
        <table class="report-table"><tbody id="report-body"></tbody></table>
    </div>

    <!-- PROFILE -->
    <div id="page-profile" class="page" style="display:none; padding:20px; text-align:center;">
        <div class="header-title">MY PROFILE</div>
        <h3 id="prof-name">User</h3>
        <button class="btn-save" style="background:var(--red)" onclick="logout()">LOGG UT</button>
    </div>

    <!-- NAV BAR -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-home"></i><br>Dash</div>
        <div class="nav-item" onclick="showTab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" onclick="showTab('calc')"><i class="fas fa-calculator"></i><br>Calc</div>
        <div class="nav-item" onclick="showTab('reports')"><i class="fas fa-file-alt"></i><br>Reports</div>
        <div class="nav-item" onclick="showTab('profile')"><i class="fas fa-user"></i><br>Profil</div>
    </div>
</div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
        authDomain: "mohamed-salad-transport.firebaseapp.com",
        databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mohamed-salad-transport",
        storageBucket: "mohamed-salad-transport.firebasestorage.app",
        appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // AUTH LOGIC
    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
    }
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display-name').innerText = user.email;
            loadData();
        } else {
            document.getElementById('auth-page').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });
    function logout() { auth.signOut(); }

    // TAB NAVIGATION
    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + tab).style.display = 'block';
    }

    // CALCULATOR LOGIC
    let calcExpression = '';
    function appendCalc(val) { calcExpression += val; document.getElementById('calc-display').innerText = calcExpression; }
    function clearCalc() { calcExpression = ''; document.getElementById('calc-display').innerText = '0'; }
    function backspaceCalc() { calcExpression = calcExpression.slice(0, -1); document.getElementById('calc-display').innerText = calcExpression || '0'; }
    function calculateResult() {
        try { calcExpression = eval(calcExpression).toString(); document.getElementById('calc-display').innerText = calcExpression; }
        catch { document.getElementById('calc-display').innerText = 'Error'; calcExpression = ''; }
    }
    function copyToAmount() {
        const val = document.getElementById('calc-display').innerText;
        if(val !== '0' && val !== 'Error') {
            document.getElementById('entry-amt').value = val;
            showTab('add');
        }
    }

    // DATA LOGIC (Simplified for brevity, keep your original saveData/loadData logic)
    function saveData(type) {
        const user = auth.currentUser;
        const data = {
            date: document.getElementById('entry-date').value,
            cat: document.getElementById('entry-category').value,
            desc: document.getElementById('entry-desc').value,
            amt: parseFloat(document.getElementById('entry-amt').value),
            type: type
        };
        db.ref('users/' + user.uid + '/entries').push(data).then(() => alert("Saved!"));
    }

    // OCR & SCANNER (Put your original OCR functions here)
    // ... startScanner, capturePhoto, runOCR, etc.
</script>
</body>
</html>
