<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Regnskap Edition</title>
    <!-- Dhammaan Libraries-kaaga waa sax, waxba ha ka bedelin -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS-kaaga wuu fiican yahay, waxaan ku daray xoogaa nadiifin ah -->
    <style>
        :root{--bg:#0f172a;--card:#1e293b;--yellow:#f1c40f;--green:#2ecc71;--red:#ff4757;--blue:#3b82f6;--text:#f8fafc;--border:#334155}
        .light-theme{--bg:#f1f5f9;--card:#ffffff;--text:#1e293b;--border:#cbd5e1}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0;padding-bottom:100px;transition:0.3s;overflow-x:hidden}
        .hidden-amount{filter:blur(6px);user-select:none;}
        .page{display:none; animation: fadeIn 0.3s;}
        @keyframes fadeIn {from {opacity: 0;} to {opacity: 1;}}
        /* CSS-ka kale oo dhan halkan ha joogo... */
        .auth-container, .setup-container { max-width: 400px; margin: 40px auto; padding: 30px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .btn-save { cursor: pointer; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<!-- QAYBTA SETUP/LOGIN - WAXAAN ISKU DARAY SI AY U FUDUDAATO -->
<div id="auth-pages">
    <div id="setup-page" class="setup-container" style="display:none;">
        <h2 style="color:var(--yellow); text-align:center;">SAMEE AKOON</h2>
        <input type="text" id="setup-firstname" placeholder="Magaca Hore">
        <input type="text" id="setup-lastname" placeholder="Magaca Aabaha">
        <input type="email" id="setup-email" placeholder="Email">
        <input type="password" id="setup-pass" placeholder="Password (6+ digits)">
        <button class="btn-save" style="background:var(--green); color:white;" onclick="handleSetup()">DIIWAANGELI</button>
        <p style="text-align:center; margin-top:10px;">Horey ma u lahayd? <span onclick="showLogin()" style="color:var(--yellow); cursor:pointer;">GAL</span></p>
    </div>

    <div id="auth-page" class="auth-container">
        <h2 style="color:var(--yellow); text-align:center;">TRANSPORT PRO</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-save" style="background:var(--blue); color:white;" onclick="handleAuth()">LOGG INN</button>
        <p style="text-align:center; margin-top:10px;">Account ma u baahan tahay? <span onclick="showSetup()" style="color:var(--yellow); cursor:pointer;">DIIWAANGELI</span></p>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
    <div class="top-bar" style="display:flex; justify-content:space-between; padding:15px; background:var(--card);">
        <i class="fas fa-moon" onclick="toggleTheme()" style="cursor:pointer;"></i>
        <div id="user-display-name">Loading...</div>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--red); cursor:pointer;"></i>
    </div>

    <!-- DASHBOARD -->
    <div id="page-dash" class="page" style="display:block; padding:10px;">
        <div class="stats-grid" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div class="stat-box" style="border:1px solid var(--green); padding:10px; border-radius:10px; text-align:center;">
                <small>INNTEKT</small><br><b id="total-income" class="amount-field">0 kr</b>
            </div>
            <div class="stat-box" style="border:1px solid var(--red); padding:10px; border-radius:10px; text-align:center;">
                <small>UTGIFT</small><br><b id="total-expense" class="amount-field">0 kr</b>
            </div>
            <div class="stat-box" style="border:1px solid var(--blue); padding:10px; border-radius:10px; text-align:center;">
                <small>NETTO</small><br><b id="total-netto" class="amount-field">0 kr</b>
            </div>
        </div>
        <div id="entries-list" style="margin-top:20px;"></div>
    </div>

    <!-- ADD ENTRY PAGE -->
    <div id="page-add" class="page" style="padding:20px;">
        <h3 style="color:var(--yellow)">DIIWAANGELI XOGTA</h3>
        <input type="date" id="entry-date">
        <select id="entry-category">
            <option value="3030">3030 - Kjøreinntekter</option>
            <option value="7000">7000 - Drivstoff (Shidaal)</option>
            <option value="7020">7020 - Vedlikehold (Gari-hagaajin)</option>
            <option value="7770">7770 - Bank Gebyr</option>
        </select>
        <input type="text" id="entry-desc" placeholder="Faahfaahin (e.g. Shell Shidaal)">
        <input type="number" id="entry-amt" placeholder="Lacagta (kr)">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-save" style="background:var(--green); color:white;" onclick="saveData('income')">INNTEKT (+)</button>
            <button class="btn-save" style="background:var(--red); color:white;" onclick="saveData('expense')">UTGIFT (-)</button>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-bar" style="position:fixed; bottom:0; width:100%; display:flex; background:var(--card); padding:15px 0;">
        <div style="flex:1; text-align:center;" onclick="showTab('dash')"><i class="fas fa-home"></i></div>
        <div style="flex:1; text-align:center;" onclick="showTab('add')"><i class="fas fa-plus-circle"></i></div>
    </div>
</div>

<script>
// KONFIGURASHANKA
const firebaseConfig = {
    apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
    authDomain: "mohamed-salad-transport.firebaseapp.com",
    databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mohamed-salad-transport",
    storageBucket: "mohamed-salad-transport.firebasestorage.app",
    appId: "1:608716442795:web:34cafc1a23316664717bee"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// AUTH LISTENERS
auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-pages').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('user-display-name').innerText = user.displayName || user.email;
        loadData();
    } else {
        document.getElementById('auth-pages').style.display = 'block';
        document.getElementById('main-app').style.display = 'none';
    }
});

// FUNCTIONS
function showSetup() { document.getElementById('auth-page').style.display='none'; document.getElementById('setup-page').style.display='block'; }
function showLogin() { document.getElementById('setup-page').style.display='none'; document.getElementById('auth-page').style.display='block'; }

async function handleSetup() {
    const email = document.getElementById('setup-email').value;
    const pass = document.getElementById('setup-pass').value;
    const name = document.getElementById('setup-firstname').value + " " + document.getElementById('setup-lastname').value;
    
    try {
        const res = await auth.createUserWithEmailAndPassword(email, pass);
        await res.user.updateProfile({ displayName: name });
        alert("Akoonki waa diyaar!");
    } catch(e) { alert(e.message); }
}

function handleAuth() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Cilad: " + e.message));
}

function logout() { auth.signOut(); }

function showTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById('page-' + tab).style.display = 'block';
}

function saveData(type) {
    const user = auth.currentUser;
    const data = {
        date: document.getElementById('entry-date').value,
        category: document.getElementById('entry-category').value,
        description: document.getElementById('entry-desc').value,
        amount: parseFloat(document.getElementById('entry-amt').value),
        type: type
    };

    if(!data.date || !data.amount) return alert("Fadlan taariikhda iyo lacagta geli!");

    db.ref('entries/' + user.uid).push(data).then(() => {
        alert("Waa la keydiyay!");
        showTab('dash');
        // Nadiifi form-ka
        document.getElementById('entry-desc').value = '';
        document.getElementById('entry-amt').value = '';
    });
}

function loadData() {
    const user = auth.currentUser;
    db.ref('entries/' + user.uid).on('value', snapshot => {
        const list = document.getElementById('entries-list');
        list.innerHTML = '';
        let inc = 0, exp = 0;

        snapshot.forEach(child => {
            const val = child.val();
            if(val.type === 'income') inc += val.amount; else exp += val.amount;

            const div = document.createElement('div');
            div.style = "background:var(--card); padding:10px; margin-bottom:10px; border-left: 5px solid " + (val.type==='income'?'#2ecc71':'#ff4757');
            div.innerHTML = `<b>${val.description}</b> <br> <small>${val.date}</small> <span style="float:right">${val.amount} kr</span>`;
            list.appendChild(div);
        });

        document.getElementById('total-income').innerText = inc + " kr";
        document.getElementById('total-expense').innerText = exp + " kr";
        document.getElementById('total-netto').innerText = (inc - exp) + " kr";
    });
}

function toggleTheme() { document.body.classList.toggle('light-theme'); }
</script>
</body>
</html>
