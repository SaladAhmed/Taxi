<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salad Transport</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #121826;
            --card-bg: #1e2533;
            --green: #2ecc71;
            --red: #e74c3c;
            --blue: #3498db;
            --orange: #e67e22;
        }

        body { font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Login UI */
        #auth-section { text-align: center; margin-top: 50px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 95%; padding: 12px; margin: 5px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .btn-login { background-color: var(--blue); color: white; }
        
        /* Dashboard UI (Sida image.png) */
        .header-title { color: #f1c40f; text-align: center; }
        .top-stats { display: flex; gap: 10px; justify-content: space-between; margin-bottom: 20px; }
        .stat-box { flex: 1; padding: 10px; border-radius: 10px; text-align: center; border: 2px solid #444; }
        
        /* Midabada aad codsatay */
        .income { border-color: var(--green); color: var(--green); }
        .expense { border-color: var(--red); color: var(--red); }
        .mva-blue { border-color: var(--blue); color: var(--blue); }
        .mva-orange { border-color: var(--orange); color: var(--orange); }

        .net-box { border: 2px solid #f1c40f; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        
        /* List Items */
        .item-card { background: var(--card-bg); border: 1px solid var(--red); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; position: relative; }
        .options-btn { background: none; color: white; width: auto; font-size: 20px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. Qaybta Gelitaanka -->
    <div id="auth-section">
        <h2 class="header-title">🚖 Taxi System</h2>
        <input type="email" id="userEmail" placeholder="E-Saladmohamed392@gmail.com">
        <input type="password" id="userPass" placeholder="admin123">
        <button class="btn-login" onclick="handleLogin()">Login</button>
        <button style="background:#444; color:white" onclick="handleRegister()">Register</button>
        <button style="background:none; color:var(--blue)" onclick="handleForgot()">Forgot Password?</button>
    </div>

    <!-- 2. Dashboard-ka (Wuxuu soo baxa markuu qofka galo) -->
    <div id="main-app" class="hidden">
        <h3 class="header-title">MOHAMED SALAD TRANSPORT</h3>
        
        <div class="top-stats">
            <div class="stat-box income"><h6>INCOME</h6><b id="totalIncome">0 kr</b></div>
            <div class="stat-box expense"><h6>KHARASH</h6><b id="totalExpense">0 kr</b></div>
            <div class="stat-box mva-blue"><h6>U-BAXAY (ME)</h6><b>0 kr</b></div>
        </div>

        <div class="net-box">
            <div style="display:flex; justify-content: space-around;">
                <div class="mva-orange"><h6>MVA REFUND</h6><p>0 kr</p></div>
                <div><h6>FERIEPENGER</h6><p>0 kr</p></div>
            </div>
            <h2 style="color:var(--green)">NET: <span id="netAmount">0 kr</span></h2>
        </div>

        <div id="transactionList">
            <!-- Halkan lacagaha ayaa ku soo dhacaya -->
        </div>
        
        <button class="btn-login" onclick="addEntry()">+ Geli Xogta New</button>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="changeLang('so')" style="width:auto">Somali</button>
            <button onclick="changeLang('no')" style="width:auto">Norsk</button>
            <button onclick="changeLang('en')" style="width:auto">English</button>
        </div>
    </div>
</div>

<script>
    // --- DHIG HALKAN CONFIG-GAAGA FIREBASE ---
    const firebaseConfig = {
        apiKey: "Halkan-Geli-Key-gaaga",
        authDomain: "saladahmed.firebaseapp.com",
        projectId: "saladahmed",
        storageBucket: "saladahmed.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:12345:web:12345"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Login Function
    function handleLogin() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }).catch(err => alert("Khalad: " + err.message));
    }

    // Forgot Password
    function handleForgot() {
        const email = document.getElementById('userEmail').value;
        if(!email) return alert("Fadlan qor e-mailka");
        auth.sendPasswordResetEmail(email).then(() => alert("Email ayaa laguu soo diray"));
    }

    // Register User
    function handleRegister() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        auth.createUserWithEmailAndPassword(email, pass).then(() => alert("Waa la is diwaan geliyey!"));
    }

    // Delete/Edit Simulation (3 dots)
    function showOptions(id) {
        const action = prompt("Dooro: 1. Delete, 2. Change");
        if(action == "1") {
            alert("Waa la tirtiray " + id);
            // Halkan koodhka tirtirka geli
        } else if(action == "2") {
            alert("Wax ka bedel " + id);
        }
    }

    // Luuqadaha
    function changeLang(l) {
        const dict = {
            'so': { inc: 'DAKHLI', exp: 'KHARASH' },
            'no': { inc: 'INNTEKT', exp: 'UTGIFTER' },
            'en': { inc: 'INCOME', exp: 'EXPENSE' }
        };
        alert("Luuqadda waa la bedelay: " + l);
    }
</script>

</body>
</html>
