<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Taxi App Firebase</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#0d0f1a;color:#fff;text-align:center;padding:20px}
input,button{padding:10px;margin:5px;border-radius:6px;border:none}
button{background:#2563eb;color:#fff;cursor:pointer}
.green{color:#22c55e}
.red{color:#ef4444}
.orange{color:#f97316}
</style>
</head>

<body>

<h2>🚖 Taxi System</h2>

<!-- LOGIN -->
<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
  <button onclick="forgot()">Forgot Password</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <h3 id="user"></h3>

  <input id="amount" placeholder="Amount"><br>
  <input id="desc" placeholder="Description"><br>

  <button onclick="addData()">Save</button>
  <button onclick="changePassword()">Change Password</button>
  <button onclick="logout()">Logout</button>

  <h3>Data:</h3>
  <div id="data"></div>
</div>

<script>
// 🔥 FIREBASE CONFIG (BADAL API KEYS)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "mohamed-salad-transport.firebaseapp.com",
  databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "mohamed-salad-transport",
  storageBucket: "mohamed-salad-transport.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// 🔥 REGISTER
function register(){
  const email = emailEl();
  const pass = passEl();

  auth.createUserWithEmailAndPassword(email, pass)
  .then(()=>alert("User created"))
  .catch(e=>alert(e.message));
}

// 🔥 LOGIN
function login(){
  const email = emailEl();
  const pass = passEl();

  auth.signInWithEmailAndPassword(email, pass)
  .catch(e=>alert(e.message));
}

// 🔥 AUTO LOGIN
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("user").innerText="👤 "+user.email;

    loadData();
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// 🔥 LOGOUT
function logout(){
  auth.signOut();
}

// 🔥 FORGOT PASSWORD
function forgot(){
  const email = prompt("Enter email:");

  auth.sendPasswordResetEmail(email)
  .then(()=>alert("Email sent"))
  .catch(e=>alert(e.message));
}

// 🔥 CHANGE PASSWORD
function changePassword(){
  const newPass = prompt("New password:");

  auth.currentUser.updatePassword(newPass)
  .then(()=>alert("Password changed"))
  .catch(e=>alert(e.message));
}

// 🔥 SAVE DATA
function addData(){
  const uid = auth.currentUser.uid;

  const data = {
    amount: document.getElementById("amount").value,
    desc: document.getElementById("desc").value
  };

  db.ref("data/"+uid).push(data);
}

// 🔥 LOAD DATA
function loadData(){
  const uid = auth.currentUser.uid;

  db.ref("data/"+uid).on("value", snap=>{
    const d = snap.val();
    let html="";

    for(let id in d){
      html += `<p class="green">${d[id].amount} - ${d[id].desc}</p>`;
    }

    document.getElementById("data").innerHTML = html;
  });
}

// 🔧 HELPERS
function emailEl(){return document.getElementById("email").value;}
function passEl(){return document.getElementById("password").value;}

</script>

</body>
</html>
