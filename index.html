<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #111827; --card: #1f2937; --yellow: #f1c40f; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --text: #f3f4f6; --border: #374151; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: transparent; border: 2px solid; border-radius: 12px; padding: 15px 5px; text-align: center; }
        .stat-box small { font-size: 10px; font-weight: bold; display: block; margin-bottom: 5px; }
        .stat-box span { font-size: 14px; font-weight: bold; }

        /* MVA & Ferie Info */
        .tax-info-row { display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: 20px; color: #9ca3af; font-size: 13px; }
        .tax-info-row b { color: white; font-size: 16px; display: block; margin-top: 4px; }

        /* Total Resultat */
        .result-card { border: 2px solid var(--yellow); border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px; background: var(--card); }
        .result-card small { color: var(--yellow); font-weight: bold; letter-spacing: 1px; }
        .result-card h1 { margin: 10px 0 0 0; color: var(--green); font-size: 32px; }

        /* Action Buttons */
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }

        /* Entries */
        .entry-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .entry-info small { color: #9ca3af; font-size: 12px; text-transform: uppercase; }
        .entry-info h4 { margin: 5px 0; font-size: 18px; }
        .entry-info p { margin: 0; color: #9ca3af; font-size: 12px; }
        .entry-amount { text-align: right; font-weight: bold; font-size: 18px; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111827; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { text-align: center; color: #6b7280; font-size: 11px; cursor: pointer; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--yellow); }

        /* Popups/Inputs */
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--green); color: white; font-weight: bold; }
        
        .dots-menu { color: #6b7280; padding-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-page" class="container" style="margin-top:100px; text-align:center;">
    <h2 style="color:var(--yellow)">LOGG INN</h2>
    <div onkeypress="if(event.key==='Enter') handleAuth()">
        <input type="email" id="email" placeholder="E-post">
        <input type="password" id="pass" placeholder="Passord">
        <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    </div>
</div>

<div id="main-app" style="display:none">
    <div class="container">
        <div style="text-align:center; padding: 10px 0;">
            <h4 style="color:var(--yellow); margin:0;">MOHAMED SALAAD</h4>
        </div>

        <div id="page-dash" class="page">
            <div class="stats-grid">
                <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small>INNTEKT</small><span id="top-ti">0 kr</span></div>
                <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small>UTGIFTER</small><span id="top-te">0 kr</span></div>
                <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small>NETTO</small><span id="top-nt">0 kr</span></div>
            </div>

            <div class="tax-info-row">
                <div>MVA (25%) <b id="tax-mva">0 kr</b></div>
                <div style="text-align:right">FERIEPENGER (10.2%) <b id="tax-ferie">0 kr</b></div>
            </div>

            <div class="result-card">
                <small>TOTAL RESULTAT</small>
                <h1 id="res-total">0 kr</h1>
            </div>

            <div class="btn-row">
                <button class="action-btn" style="background:var(--green)" onclick="downloadCSV()"><i class="fas fa-file-invoice"></i> Report</button>
                <button class="action-btn" style="background:var(--blue)" onclick="toggleMode()"><span id="mode-text">Modus: Total</span></button>
            </div>

            <div id="entries-list"></div>
        </div>

        <div id="page-add" class="page" style="display:none;">
            <h3 style="text-align:center">LEGG TIL</h3>
            <select id="e-type" onchange="updateCats()">
                <option value="income">INNTEKT (GREEN)</option>
                <option value="expense" selected>UTGIFTER (RED)</option>
            </select>
            <select id="e-cat"></select>
            <input type="number" id="e-amt" placeholder="Beløp (kr)">
            <input type="text" id="e-desc" placeholder="Beskrivelse (f.eks Tesla, Dnb)">
            <button class="btn-save" onclick="saveData()">LAGRE DATA</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-th-large"></i>Oversikt</div>
        <div class="nav-item" onclick="document.getElementById('cam').click()"><i class="fas fa-camera"></i>Scanner</div>
        <div class="nav-item" onclick="showTab('add')"><i class="fas fa-plus-circle"></i>Legg til</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i>Logg ut</div>
    </div>
    <input type="file" id="cam" capture="environment" accept="image/*" style="display:none" onchange="scanImage(event)">
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE", authDomain: "mohamed-salad-transport.firebaseapp.com", databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mohamed-salad-transport", storageBucket: "mohamed-salad-transport.appspot.com", appId: "1:608716442795:web:34cafc1a23316664717bee" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();

    const cats = {
        income: ["Faktura mva income", "Faktura uten mva"],
        expense: ["Drivstoff mva", "Bil fixed mva", "Regnskap mva", "Own withdrawal uten mva", "Forsikring mva", "Bil vasker mva", "Lønn + feriepenger", "Internet uten mva", "Telefon uten mva", "Dekk shift mva", "Kontor shoping mva", "Bank transaksjon uten mva"]
    };

    function updateCats() {
        const type = document.getElementById('e-type').value;
        document.getElementById('e-cat').innerHTML = cats[type].map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function handleAuth() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
    }

    function saveData() {
        const type = document.getElementById('e-type').value;
        const cat = document.getElementById('e-cat').value;
        const amt = parseFloat(document.getElementById('e-amt').value);
        const desc = document.getElementById('e-desc').value;
        if(!amt || !desc) return alert("Fyll ut alt");
        db.ref('users/'+auth.currentUser.uid+'/entries').push({ type, cat, amt, desc, date: new Date().toLocaleDateString('no-NO') });
        showTab('dash');
    }

    function loadData() {
        db.ref('users/'+auth.currentUser.uid+'/entries').on('value', snap => {
            const list = document.getElementById('entries-list'); list.innerHTML = "";
            let ti=0, te=0;
            snap.forEach(child => {
                const v = child.val();
                if(v.type==='income') ti+=v.amt; else te+=v.amt;
                list.innerHTML += `
                <div class="entry-card" style="border-left-color:${v.type==='income'?'var(--green)':'var(--red)'}">
                    <div class="entry-info">
                        <small>${v.cat}</small>
                        <h4>${v.desc}</h4>
                        <p>${v.date}</p>
                    </div>
                    <div class="entry-amount" style="color:${v.type==='income'?'var(--green)':'var(--red)'}">
                        ${v.amt.toLocaleString()} kr
                        <i class="fas fa-ellipsis-v dots-menu" onclick="deleteItem('${child.key}')"></i>
                    </div>
                </div>`;
            });
            let nt = ti - te;
            document.getElementById('top-ti').innerText = ti.toLocaleString() + " kr";
            document.getElementById('top-te').innerText = te.toLocaleString() + " kr";
            document.getElementById('top-nt').innerText = nt.toLocaleString() + " kr";
            document.getElementById('res-total').innerText = nt.toLocaleString() + " kr";
            document.getElementById('tax-mva').innerText = (nt * 0.25).toLocaleString() + " kr";
            document.getElementById('tax-ferie').innerText = (nt * 0.102).toLocaleString() + " kr";
        });
    }

    function scanImage(e) {
        alert("Scanner-ka waa uu bilaabanayaa...");
        Tesseract.recognize(e.target.files[0], 'nor').then(({ data: { text } }) => {
            const m = text.match(/\d+[\.,]\d{2}/g);
            if(m) document.getElementById('e-amt').value = m[0].replace(',', '.');
            showTab('add');
        });
    }

    function deleteItem(id) { if(confirm("Suley?")) db.ref('users/'+auth.currentUser.uid+'/entries/'+id).remove(); }
    function showTab(t) { 
        document.querySelectorAll('.page').forEach(p => p.style.display='none'); 
        document.getElementById('page-'+t).style.display='block';
        if(t==='add') updateCats();
    }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(u => { if(u) { document.getElementById('auth-page').style.display='none'; document.getElementById('main-app').style.display='block'; loadData(); } });
</script>
</body>
</html>
