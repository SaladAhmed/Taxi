<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; padding: 10px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-box { background: var(--card); border: 2px solid; border-radius: 12px; padding: 12px 5px; text-align: center; }
        .stat-box small { font-size: 9px; display: block; opacity: 0.8; }
        .stat-box span { font-size: 13px; font-weight: bold; }

        .summary-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 15px; }
        
        /* Entry Cards with 3-dots */
        .entry-card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 5px solid; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .dots-menu { cursor: pointer; padding: 5px; color: var(--text); opacity: 0.6; }
        .dropdown-content { display: none; position: absolute; right: 10px; top: 35px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .dropdown-content div { padding: 10px 15px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .dropdown-content div:hover { background: rgba(255,255,255,0.1); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }

        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 10px; }
        .btn-save { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body id="body-tag">

<div id="auth-page" class="container" style="text-align:center; margin-top:50px;">
    <h2 id="auth-title">LOGG INN</h2>
    <div onkeypress="if(event.key==='Enter') handleAuth()">
        <input type="email" id="email" placeholder="E-post">
        <input type="password" id="pass" placeholder="Passord">
        <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    </div>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-bars" onclick="showTab('profile')"></i>
        <div style="font-weight:bold; color:var(--yellow)">TRANSPORT PRO</div>
        <i class="fas fa-adjust" onclick="toggleTheme()"></i>
    </div>

    <div class="container">
        <!-- Dashboard -->
        <div id="page-dash" class="page">
            <div class="stats-grid">
                <div class="stat-box" style="border-color:var(--green); color:var(--green)"><small>INCOME</small><span id="total-income">0</span></div>
                <div class="stat-box" style="border-color:var(--red); color:var(--red)"><small>EXPENSE</small><span id="total-expense">0</span></div>
                <div class="stat-box" style="border-color:var(--blue); color:var(--blue)"><small>NETTO</small><span id="total-netto">0</span></div>
            </div>

            <div class="summary-card">
                <small>TOTAL RESULTAT</small>
                <h2 id="res-total">0 kr</h2>
            </div>

            <div id="entries-list"></div>
        </div>

        <!-- Add Entry -->
        <div id="page-add" class="page" style="display:none;">
            <div class="header-title" style="text-align:center; margin-bottom:15px;">ADD TRANSACTION</div>
            <select id="entry-type" onchange="updateCategories()">
                <option value="income">GREEN (Income)</option>
                <option value="expense">RED (Utgifter)</option>
            </select>
            <select id="entry-category">
                <!-- Categories will be injected here -->
            </select>
            <input type="number" id="entry-amt" placeholder="Amount (kr)">
            <input type="text" id="entry-note" placeholder="Note (Optional)">
            <button class="btn-save" style="background:var(--green)" onclick="saveData()">SAVE</button>
        </div>

        <!-- Profile & Languages -->
        <div id="page-profile" class="page" style="display:none; text-align:center;">
            <h3>SETTINGS</h3>
            <select id="lang-select" onchange="changeLang()">
                <option value="no">🇳🇴 Norsk</option>
                <option value="en">🇺🇸 English</option>
                <option value="ar">🇸🇦 Arabic</option>
            </select>
            <hr style="border:0.5px solid var(--border); margin:20px 0;">
            <button class="btn-save" style="background:var(--blue); margin-bottom:10px;" onclick="changePassword()">Change Password</button>
            <button class="btn-save" style="background:var(--red)" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br>Add</div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user"></i><br>Profile</div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.appspot.com",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const categories = {
        income: ["Faktura mva income", "Faktura uten mva"],
        expense: [
            "Drivstoff mva", "Bil fixed mva", "Regnskap mva", 
            "Own withdrawal uten mva", "Forsikring mva", "Bil vasker mva", 
            "Lønn + feriepenger", "Internet uten mva", "Telefon uten mva", 
            "Dekk shift mva", "Kontor shoping mva", "Bank transaksjon uten mva"
        ]
    };

    function updateCategories() {
        const type = document.getElementById('entry-type').value;
        const catSelect = document.getElementById('entry-category');
        catSelect.innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
    }

    function saveData() {
        const type = document.getElementById('entry-type').value;
        const cat = document.getElementById('entry-category').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const note = document.getElementById('entry-note').value;
        
        if(!amt) return alert("Enter amount");
        
        db.ref('users/'+auth.currentUser.uid+'/entries').push({
            type, cat, amt, note, date: new Date().toLocaleDateString()
        });
        showTab('dash');
    }

    function loadData() {
        db.ref('users/'+auth.currentUser.uid+'/entries').on('value', snap => {
            const list = document.getElementById('entries-list'); list.innerHTML = "";
            let ti=0, te=0;
            snap.forEach(child => {
                const v = child.val();
                if(v.type === 'income') ti += v.amt; else te += v.amt;
                
                list.innerHTML += `
                <div class="entry-card" style="border-left-color:${v.type==='income'?'var(--green)':'var(--red)'}">
                    <div><b>${v.cat}</b><br><small>${v.date} ${v.note?' - '+v.note:''}</small></div>
                    <div style="display:flex; align-items:center;">
                        <b style="margin-right:10px;">${v.amt} kr</b>
                        <div class="dots-menu" onclick="toggleMenu('${child.key}')"><i class="fas fa-ellipsis-v"></i></div>
                        <div id="menu-${child.key}" class="dropdown-content">
                            <div onclick="deleteItem('${child.key}')"><i class="fas fa-trash"></i> Delete</div>
                            <div onclick="alert('Edit soon')"><i class="fas fa-edit"></i> Edit</div>
                            <div onclick="alert('Change category soon')"><i class="fas fa-exchange-alt"></i> Change</div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('total-income').innerText = ti;
            document.getElementById('total-expense').innerText = te;
            document.getElementById('total-netto').innerText = ti - te;
            document.getElementById('res-total').innerText = (ti - te) + " kr";
        });
    }

    function toggleMenu(id) {
        const m = document.getElementById('menu-'+id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function deleteItem(id) {
        if(confirm("Ma tirtirtaa?")) db.ref('users/'+auth.currentUser.uid+'/entries/'+id).remove();
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display='none');
        document.getElementById('page-'+t).style.display='block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
        if(t === 'add') updateCategories();
    }

    function toggleTheme() { document.getElementById('body-tag').classList.toggle('light-theme'); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function changePassword() { auth.sendPasswordResetEmail(auth.currentUser.email).then(() => alert("Email sent")); }
    
    auth.onAuthStateChanged(u => {
        if(u) { document.getElementById('auth-page').style.display='none'; document.getElementById('main-app').style.display='block'; loadData(); }
    });
</script>
</body>
</html>
