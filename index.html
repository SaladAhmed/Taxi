<!DOCTYPE html>
<html>
<head>
  <title>Taxi System</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

  <style>
    body {
      background: #0b0f2f;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 80%;
    }
    button {
      background: #1e3a8a;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🚖 Taxi System</h1>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
<button onclick="resetPassword()">Forgot Password</button>

<p id="msg"></p>

<script type="module">

// 🔴 KU BADAL CONFIG-KAAGA HALKAN
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 👉 KA SOO QAADO FIREBASE (sawirka aad dirtay)
const firebaseConfig = {
  apiKey: "HALKAN_API_KEY_GELI",
  authDomain: "mohamed-salad-transport.firebaseapp.com",
  databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mohamed-salad-transport",
  storageBucket: "mohamed-salad-transport.appspot.com",
  messagingSenderId: "XXXXXXX",
  appId: "XXXXXXX"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Login success ✅";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
}

// REGISTER
window.register = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Account created ✅";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
}

// RESET PASSWORD
window.resetPassword = function() {
  const email = document.getElementById("email").value;

  sendPasswordResetEmail(auth, email)
    .then(() => {
      document.getElementById("msg").innerText = "Email sent ✅";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
}

</script>

</body>
</html>
