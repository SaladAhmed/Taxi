<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed Salad Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: -apple-system, sans-serif; }
        .card { background: #252945; border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid #30355a; position: relative; }
        .result-card { background: linear-gradient(135deg, #30355a 0%, #1a1c2c 100%); border: 2px solid #fbbf24; }
        input, select { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; font-size: 16px; }
        .menu-dropdown { display: none; position: absolute; right: 10px; top: 45px; background: #30355a; border: 1px solid #404677; border-radius: 8px; z-index: 50; min-width: 140px; }
        .menu-dropdown.active { display: block; }
        .menu-item { padding: 10px 15px; font-size: 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #404677; }
    </style>
</head>
<body class="pb-24">
    <div id="app" class="p-4">
        <div class="mb-6 text-center">
            <h1 class="text-xl font-bold text-yellow-400">MOHAMED SALAD TRANSPORT</h1>
            
            <div class="grid grid-cols-2 gap-3 mt-4 text-left">
                <div class="card border-l-4 border-green-500"><p class="text-[10px] text-gray-400">TOTAL INCOME</p><h2 id="totalIncome" class="text-lg font-bold text-green-400">0 kr</h2></div>
                <div class="card border-l-4 border-red-500"><p class="text-[10px] text-gray-400">TOTAL KHARASH</p><h2 id="totalExpense" class="text-lg font-bold text-red-400">0 kr</h2></div>
            </div>

            <div class="card result-card mt-2">
                <div class="grid grid-cols-2 border-b border-gray-600 pb-2 mb-2">
                    <div><p class="text-[9px] text-gray-400">MVA (25%)</p><p id="mvaTax" class="text-sm font-semibold text-orange-400">0 kr</p></div>
                    <div><p class="text-[9px] text-gray-400">FERIEPENGER (10.2%)</p><p id="ferieTax" class="text-sm font-semibold text-orange-400">0 kr</p></div>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-yellow-400 uppercase tracking-wider font-bold">Natiijada u dambaysa (Net Profit/Loss)</p>
                    <h2 id="netResult" class="text-2xl font-black mt-1">0 kr</h2>
                </div>
            </div>
        </div>
        
        <div id="dashboardSection"><div id="transactionList" class="space-y-3"></div></div>

        <div id="inputSection" class="hidden">
            <div class="card">
                <div class="flex gap-2 mb-6">
                    <button onclick="setMode('income')" id="modeInc" class="flex-1 py-3 rounded-xl font-bold bg-yellow-400 text-black">Income ↑</button>
                    <button onclick="setMode('expense')" id="modeExp" class="flex-1 py-3 rounded-xl font-bold bg-gray-700">Kharash ↓</button>
                </div>
                <div class="space-y-4">
                    <input type="hidden" id="editId">
                    <input type="date" id="dateInput">
                    <input type="number" id="amountInput" placeholder="Lacagta (Kr)">
                    <select id="typeInput"></select>
                    <button onclick="saveEntry()" id="saveBtn" class="w-full bg-yellow-400 text-black py-4 rounded-2xl font-bold mt-4">KAYDI ONLINE</button>
                    <button onclick="showSection('dashboard')" id="cancelBtn" class="hidden w-full bg-gray-600 text-white py-3 rounded-2xl font-bold mt-2">KA NOQO</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#252945] border-t border-gray-800 flex justify-around py-3">
        <button onclick="showSection('dashboard')" class="flex flex-col items-center text-yellow-400"><i class="fas fa-home text-xl"></i><span class="text-[10px]">Guudmar</span></button>
        <button onclick="showSection('input')" class="flex flex-col items-center text-gray-400"><i class="fas fa-plus-circle text-xl"></i><span class="text-[10px]">Geli Xog</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmT JEV2_WWNhIbpwbUCXZAMiN",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let mode = 'income';

        const categories = {
            income: ['Kaarka Taksi', 'Caddaan', 'Faktura (Income)', 'Wax kale'],
            expense: ['Regnskap', 'Forsikring', 'Shidaal', 'Mushaar (Lønn)', 'Sentral Avgifter', 'Faktura (Kharash)', 'Dayactir', 'Wax kale']
        };

        window.setMode = (m) => {
            mode = m;
            document.getElementById('modeInc').className = m === 'income' ? 'flex-1 py-3 rounded-xl font-bold bg-yellow-400 text-black' : 'flex-1 py-3 rounded-xl font-bold bg-gray-700';
            document.getElementById('modeExp').className = m === 'expense' ? 'flex-1 py-3 rounded-xl font-bold bg-red-500 text-white' : 'flex-1 py-3 rounded-xl font-bold bg-gray-700';
            const select = document.getElementById('typeInput');
            select.innerHTML = categories[m].map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.showSection = (s) => {
            document.getElementById('dashboardSection').classList.toggle('hidden', s !== 'dashboard');
            document.getElementById('inputSection').classList.toggle('hidden', s !== 'input');
        };

        window.toggleMenu = (id) => {
            document.getElementById('menu-'+id).classList.toggle('active');
        };

        window.saveEntry = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value);
            const date = document.getElementById('dateInput').value;
            if(!amt || !date) return alert("Buuxi xogta!");
            const payload = { amount: amt, date: date, type: document.getElementById('typeInput').value, mode: mode };
            await addDoc(collection(db, "xisaabaadka"), payload);
            showSection('dashboard');
        };

        window.deleteItem = async (id) => { if(confirm("Ma tirtirtaa?")) await deleteDoc(doc(db, "xisaabaadka", id)); };

        const q = query(collection(db, "xisaabaadka"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('transactionList'); list.innerHTML = '';
            let ti=0, te=0;
            snapshot.forEach((doc) => {
                const d = doc.data();
                if(d.mode === 'income') ti += d.amount; else te += d.amount;
                list.innerHTML += `
                    <div class="card flex justify-between items-center border-l-4 ${d.mode==='income'?'border-green-500':'border-red-500'}">
                        <div><p class="text-sm font-bold">${d.type}</p><p class="text-[10px] text-gray-500">${d.date}</p></div>
                        <div class="flex items-center gap-4">
                            <p class="font-bold ${d.mode==='income'?'text-green-400':'text-red-400'}">${d.amount.toLocaleString()} kr</p>
                            <button onclick="toggleMenu('${doc.id}')" class="text-gray-400"><i class="fas fa-ellipsis-v"></i></button>
                            <div id="menu-${doc.id}" class="menu-dropdown shadow-xl border">
                                <div class="menu-item text-red-500" onclick="deleteItem('${doc.id}')"><i class="fas fa-trash"></i> Tirtir</div>
                            </div>
                        </div>
                    </div>`;
            });

            // XISAABTA NET-KA
            const mva = ti * 0.25;
            const ferie = ti * 0.102;
            const finalNet = ti - te - mva - ferie;

            document.getElementById('totalIncome').innerText = ti.toLocaleString() + ' kr';
            document.getElementById('totalExpense').innerText = te.toLocaleString() + ' kr';
            document.getElementById('mvaTax').innerText = mva.toLocaleString() + ' kr';
            document.getElementById('ferieTax').innerText = ferie.toLocaleString() + ' kr';
            
            const netEl = document.getElementById('netResult');
            netEl.innerText = finalNet.toLocaleString() + ' kr';
            netEl.style.color = finalNet >= 0 ? '#4ade80' : '#f87171'; // Green hadduu faa'iido yahay, Red hadduu qasaaro yahay
        });

        document.getElementById('dateInput').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
