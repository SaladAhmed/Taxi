<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Advanced</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .stat-box { background: var(--card); border: 2px solid; border-radius: 12px; padding: 15px; text-align: center; }
        .stat-box.mva-red { border-color: var(--red); color: var(--red); }

        .summary-card { background: var(--card); border: 3px solid var(--yellow); border-radius: 20px; margin: 15px; padding: 20px; text-align: center; }
        
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--yellow); object-fit: cover; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }
        
        .scan-btn { background: var(--blue); color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; color: white; background: var(--green); }
    </style>
</head>
<body>

<div id="main-app">
    <div class="top-bar">
        <i class="fas fa-adjust" onclick="toggleTheme()"></i>
        <div>
            <span onclick="updateLang('no')">🇳🇴</span>
            <span onclick="updateLang('so')">🇸🇴</span>
            <span onclick="updateLang('en')">🇺🇸</span>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="page-dash" class="page">
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small id="l-inc">Dakhli</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small id="l-exp">Kharash</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box mva-red"><small>MVA (25%)</small><span id="res-mva">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small id="l-net">Netto</small><span id="total-netto">0 kr</span></div>
        </div>
        
        <div class="summary-card">
            <small id="l-res" style="color:var(--yellow)">TOTAL RESULTAT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        <div id="entries-list"></div>
    </div>

    <!-- ADD DATA -->
    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="scan-btn" onclick="document.getElementById('scan-input').click()">
            <i class="fas fa-camera"></i> <span id="l-scan">SMART SCAN</span>
        </div>
        <input type="file" id="scan-input" accept="image/*" style="display:none" onchange="performScan(event)">
        
        <input type="date" id="entry-date">
        <select id="entry-category">
            <optgroup label="DRIFTSINNTEKTER (Dakhli)">
                <option value="3030">3030 - Kjøreinntekter</option>
                <option value="3110">3110 - Tips</option>
            </optgroup>
            <optgroup label="DRIFTSKOSTNADER (Kharash)">
                <option value="5000">5000 - Lønn</option>
                <option value="7000">7000 - Drivstoff</option>
                <option value="7770">7770 - Bankgebyr</option>
            </optgroup>
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        <button class="btn-save" onclick="saveData()" id="l-save-btn">LAGRE</button>
    </div>

    <!-- PROFILE -->
    <div id="page-profile" class="page" style="display:none; padding: 20px; text-align: center;">
        <img id="display-pic" src="https://via.placeholder.com/150" class="profile-img" onclick="document.getElementById('pic-input').click()">
        <input type="file" id="pic-input" style="display:none" onchange="uploadPic(event)">
        <h3 id="user-name">Mohamed Salad</h3>
        <hr style="border: 1px solid var(--border)">
        <button class="btn-save" style="background:var(--blue); margin-bottom:10px" onclick="forgotPassword()">Change Password</button>
        <button class="btn-save" style="background:var(--red)" onclick="logout()">Logout</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-chart-line"></i><br><span id="n-dash">Oversikt</span></div>
        <div class="nav-item" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br><span id="n-add">Legg til</span></div>
        <div class="nav-item" onclick="showTab('profile')"><i class="fas fa-user"></i><br><span id="n-prof">Profile</span></div>
    </div>
</div>

<script>
    // Config same as before
    const firebaseConfig = { apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE", authDomain: "mohamed-salad-transport.firebaseapp.com", databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mohamed-salad-transport", storageBucket: "mohamed-salad-transport.firebasestorage.app", appId: "1:608716442795:web:34cafc1a23316664717bee" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const storage = firebase.storage();

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
    }

    function performScan(event) {
        const file = event.target.files[0];
        if(!file) return;
        Tesseract.recognize(file, 'nor').then(({ data: { text } }) => {
            alert("Scan dhammaystiran! Waxaa la helay: " + text.substring(0, 50));
            // Halkan waxaad ku dari kartaa logic aad qiimaha uga soo saarayso
        });
    }

    function uploadPic(event) {
        const file = event.target.files[0];
        const ref = storage.ref('users/' + auth.currentUser.uid + '/profile.jpg');
        ref.put(file).then(() => ref.getDownloadURL().then(url => {
            document.getElementById('display-pic').src = url;
            db.ref('users/' + auth.currentUser.uid + '/profile/pic').set(url);
        }));
    }

    function forgotPassword() {
        const email = auth.currentUser.email;
        auth.sendPasswordResetEmail(email).then(() => alert("Email loogu talagalay beddelka password-ka waa laguu soo diray!"));
    }

    // Translation Logic
    const dict = {
        so: { inc: "DAKHLI", exp: "KHARASH", net: "NETTO", res: "NATIIJADA GUUD", save: "KEYDI", scan: "SMART SCAN" },
        no: { inc: "INNTEKT", exp: "UTGIFTER", net: "NETTO", res: "TOTAL RESULTAT", save: "LAGRE", scan: "SMART SCAN" }
    };

    function updateLang(l) {
        const d = dict[l] || dict.no;
        document.getElementById('l-inc').innerText = d.inc;
        document.getElementById('l-save-btn').innerText = d.save;
        document.getElementById('l-scan').innerText = d.scan;
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
