<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salad Transport PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Auth Styles */
        .auth-container { max-width: 400px; margin: 50px auto; padding: 20px; text-align: center; }
        .hidden { display: none !important; }
        
        /* Dashboard */
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 15px; font-size: 18px; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 12px; }
        .stat-box { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; text-align: center; }
        .stat-box small { font-size: 8px; display: block; color: #94a3b8; font-weight: bold; }
        .stat-box span { font-weight: bold; font-size: 11px; }

        .main-result { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 15px; padding: 20px; text-align: center; position: relative; }
        .sub-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 10px; }

        /* Entry Cards */
        .entry-card { background: var(--card); border-radius: 15px; padding: 12px; margin: 0 15px 10px 15px; border-left: 5px solid; display: flex; justify-content: space-between; align-items: center; }
        .entry-info h4 { margin: 0; font-size: 14px; color: var(--text); }
        .entry-info small { color: #64748b; font-size: 11px; }

        /* Inputs & Buttons */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #334155; z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; cursor: pointer; font-size: 10px; flex: 1; }
        .nav-item.active { color: var(--yellow); }
    </style>
</head>
<body>

<div id="page-auth" class="auth-container">
    <h1 style="color:var(--yellow)">🚖 TAXI PRO</h1>
    
    <div id="login-form">
        <input type="email" id="login-email" placeholder="Emailkaaga">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn" style="background:var(--blue); color:white" onclick="login()">GAL APP-KA (LOGIN)</button>
        <p onclick="toggleAuth('reg')" style="color:var(--yellow); cursor:pointer; font-size:13px; margin-top:15px;">Ma haysatid account? Samayso hadda</p>
        <p onclick="forgotPassword()" style="color:#64748b; cursor:pointer; font-size:12px;">Forgot Password?</p>
    </div>

    <div id="reg-form" class="hidden">
        <input type="text" id="reg-fname" placeholder="Magaca Koowaad">
        <input type="text" id="reg-lname" placeholder="Magaca Aabbaha">
        <input type="email" id="reg-email" placeholder="Email Cusub">
        <input type="password" id="reg-pass" placeholder="Password (6+ characters)">
        <button class="btn" style="background:var(--green); color:white" onclick="register()">DIIWAANGELI (REGISTER)</button>
        <p onclick="toggleAuth('login')" style="color:var(--yellow); cursor:pointer; font-size:13px; margin-top:15px;">Hubaal ma leedahay account? Login</p>
    </div>
</div>

<div id="app-content" class="hidden">
    <div id="page-dash" class="page active">
        <div class="header-title" id="user-welcome">GUUDMARKA</div>
        <div class="stats-grid">
            <div class="stat-box" style="border-color:var(--green)"><small>INCOME (MVA)</small><span id="stat-sentral">0</span></div>
            <div class="stat-box" style="border-color:var(--blue)"><small>OWN (NO MVA)</small><span id="stat-own">0</span></div>
            <div class="stat-box" style="border-color:var(--red)"><small>KHARASH</small><span id="stat-exp">0</span></div>
        </div>
        <div class="main-result">
            <div class="sub-stats">
                <div><small>MVA REFUND</small><br><span id="res-mva" style="color:var(--yellow); font-weight:bold;">0 kr</span></div>
                <div><small>FERIEPENGER (10.2%)</small><br><span id="res-ferie" style="color:var(--yellow); font-weight:bold;">0 kr</span></div>
            </div>
            <small>LØNN (NETTO RESULT)</small>
            <h1 id="res-net" style="color:var(--green); margin:5px 0;">0 kr</h1>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="page-add" class="page hidden" style="padding:20px;">
        <h2 style="text-align:center; color:var(--yellow)">GELI XOG CUSUB</h2>
        <select id="entry-type">
            <option value="inc-mva">Faktura Income (Fra Sentral - MVA 12%)</option>
            <option value="inc-no">Own Income (No MVA)</option>
            <option value="exp-mva">Regnskapsfører / Biler / Bom (MVA 25%)</option>
            <option value="exp-no">Bank Transaction / Anet (No MVA)</option>
            <option value="exp-fuel">Drivstoff (Fuel MVA)</option>
        </select>
        <input type="text" id="entry-cat" placeholder="Maxay tahay? (Tusaale: Shidaal)">
        <input type="number" id="entry-amount" placeholder="Lacagta (kr)">
        <button class="btn" style="background:var(--green); color:white; margin-bottom:10px;" onclick="saveEntry('income')">KEYDI DAKHLI (INCOME)</button>
        <button class="btn" style="background:var(--red); color:white" onclick="saveEntry('expense')">KEYDI KHARASH (EXPENSE)</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('dash')"><i class="fas fa-chart-line"></i><br>Dash</div>
        <div class="nav-item" onclick="switchTab('add')"><i class="fas fa-plus-circle"></i><br>Geli Xog</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><br>Ka bax</div>
    </div>
</div>

<script>
    // FIREBASE CONFIG - ISTIICMAAL TAADA SAXDA AH
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // AUTH LOGIC
    function toggleAuth(mode) {
        document.getElementById('login-form').classList.toggle('hidden', mode === 'reg');
        document.getElementById('reg-form').classList.toggle('hidden', mode === 'login');
    }

    function register() {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const fname = document.getElementById('reg-fname').value;
        const lname = document.getElementById('reg-lname').value;

        if(!email || !pass || !fname) return alert("Fadlan buuxi meelaha banaan");

        auth.createUserWithEmailAndPassword(email, pass).then(cred => {
            return db.ref('users/' + cred.user.uid + '/profile').set({
                firstName: fname, lastName: lname
            });
        }).catch(err => alert(err.message));
    }

    function login() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Email ama Password waa khalad"));
    }

    function forgotPassword() {
        const email = prompt("Geli email-kaaga si password loogu soo diro:");
        if(email) auth.sendPasswordResetEmail(email).then(() => alert("Email ayaa laguu soo diray")).catch(err => alert(err.message));
    }

    function logout() { auth.signOut(); location.reload(); }

    // APP LOGIC
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            loadUserData(user.uid);
            loadEntries(user.uid);
        } else {
            document.getElementById('page-auth').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
        }
    });

    function loadUserData(uid) {
        db.ref('users/' + uid + '/profile').once('value', snap => {
            const data = snap.val();
            if(data) document.getElementById('user-welcome').innerText = "SOO DHAWAW, " + data.firstName.toUpperCase();
        });
    }

    function saveEntry(actionType) {
        const type = document.getElementById('entry-type').value;
        const cat = document.getElementById('entry-cat').value;
        const amount = parseFloat(document.getElementById('entry-amount').value);
        const uid = auth.currentUser.uid;

        if(!cat || !amount) return alert("Fadlan buuxi xogta");

        db.ref('users/' + uid + '/entries').push({
            type, cat, amount, actionType, date: new Date().toLocaleDateString('no-NO')
        }).then(() => {
            document.getElementById('entry-cat').value = "";
            document.getElementById('entry-amount').value = "";
            switchTab('dash');
        });
    }

    function loadEntries(uid) {
        db.ref('users/' + uid + '/entries').on('value', snap => {
            const list = document.getElementById('list-container');
            list.innerHTML = "";
            let s_inc=0, o_inc=0, exp_total=0, mva_refund=0;

            snap.forEach(child => {
                const d = child.val();
                const clr = d.actionType === 'income' ? (d.type==='inc-mva'?'var(--green)':'var(--blue)') : 'var(--red)';
                
                // Calculations
                if(d.actionType === 'income') {
                    if(d.type === 'inc-mva') { s_inc += d.amount; mva_refund += (d.amount * 12 / 112); }
                    else o_inc += d.amount;
                } else {
                    exp_total += d.amount;
                    if(d.type === 'exp-mva' || d.type === 'exp-fuel') mva_refund += (d.amount / 5);
                }

                list.innerHTML += `
                    <div class="entry-card" style="border-left-color:${clr}">
                        <div class="entry-info">
                            <small>${d.date} | ${d.type.toUpperCase()}</small>
                            <h4>${d.cat}</h4>
                        </div>
                        <div style="color:${clr}; font-weight:bold;">
                            ${d.amount.toLocaleString()} kr
                            <i class="fas fa-trash" style="margin-left:10px; font-size:12px; color:#444; cursor:pointer" onclick="deleteEntry('${child.key}')"></i>
                        </div>
                    </div>`;
            });

            document.getElementById('stat-sentral').innerText = s_inc.toLocaleString();
            document.getElementById('stat-own').innerText = o_inc.toLocaleString();
            document.getElementById('stat-exp').innerText = exp_total.toLocaleString();
            document.getElementById('res-mva').innerText = Math.floor(mva_refund).toLocaleString() + " kr";
            document.getElementById('res-ferie').innerText = Math.floor((s_inc + o_inc) * 0.102).toLocaleString() + " kr";
            document.getElementById('res-net').innerText = ((s_inc + o_inc) - exp_total).toLocaleString() + " kr";
        });
    }

    function deleteEntry(id) {
        if(confirm("Ma tirtirtaa xogtan?")) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).remove();
    }

    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + tab).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
