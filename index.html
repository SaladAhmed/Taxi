<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .card-pro { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .input-pro { background: #334155 !important; border: 1px solid #475569 !important; color: white !important; border-radius: 12px; padding: 14px; width: 100%; outline: none; }
        .nav-tab.active { color: var(--primary); border-top: 3px solid var(--primary); opacity: 1 !important; }
        .hidden { display: none !important; }
        .privacy-blur { filter: blur(8px); pointer-events: none; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1e293b; min-width: 130px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); z-index: 100; border-radius: 12px; border: 1px solid #475569; overflow: hidden; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body class="pb-24">

    <!-- AUTH SECTION -->
    <div id="authSection" class="fixed inset-0 bg-[#0f172a] z-[5000] flex items-center justify-center p-6 overflow-y-auto">
        <div class="bg-[#1e293b] p-8 rounded-[35px] w-full max-w-md shadow-2xl border-t-8 border-yellow-500 text-center">
            <i class="fas fa-truck-fast text-5xl text-yellow-500 mb-3"></i>
            <h1 class="text-2xl font-black mb-6 uppercase">M. Salad <span class="text-yellow-500">PRO</span></h1>
            <input type="email" id="emailInput" class="input-pro mb-3" placeholder="E-post / Email">
            <input type="password" id="passInput" class="input-pro mb-4" placeholder="Passord / Password">
            <button id="mainAuthBtn" onclick="handleAuth()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black shadow-lg uppercase mb-4">Logg Inn</button>
            <div class="flex flex-col gap-3 text-[10px] font-bold uppercase text-gray-400">
                <button onclick="toggleAuthMode('forgot')">Glemt passord?</button>
                <button onclick="toggleAuthMode('signup')" class="text-yellow-500">Opprett ny konto (Sign Up)</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">
        <header class="p-4 flex justify-between items-center sticky top-0 z-[1000] bg-[#0f172a]/80 backdrop-blur-md">
            <div>
                <h2 class="text-lg font-black text-yellow-500 uppercase">M. SALAD</h2>
                <p id="userDisplay" class="text-[8px] text-gray-500 font-mono"></p>
            </div>
            <div class="flex gap-2 items-center">
                <select onchange="updateLanguage(this.value)" class="bg-gray-800 text-[10px] border border-gray-600 rounded px-1 py-1 text-white">
                    <option value="no">🇳🇴 NO</option>
                    <option value="so">🇸🇴 SO</option>
                    <option value="en">🇺🇸 EN</option>
                </select>
                <button onclick="togglePrivacy()" class="bg-gray-800 p-2 rounded-lg text-yellow-500"><i id="eyeIcon" class="fas fa-eye"></i></button>
                <button onclick="logout()" class="bg-red-500/10 text-red-500 p-2 rounded-lg"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <main class="p-4 space-y-4">
            <!-- Totals -->
            <div class="grid grid-cols-2 gap-3">
                <div class="card-pro p-4 border-l-4 border-green-500">
                    <p class="text-[10px] text-gray-400 font-black uppercase" id="lbl-income">Dakhli</p>
                    <h3 id="totalIncome" class="text-xl font-black text-green-400 balance-text">0 kr</h3>
                </div>
                <div class="card-pro p-4 border-l-4 border-red-500">
                    <p class="text-[10px] text-gray-400 font-black uppercase" id="lbl-expense">Kharash</p>
                    <h3 id="totalExpense" class="text-xl font-black text-red-400 balance-text">0 kr</h3>
                </div>
            </div>

            <!-- Employee Payroll -->
            <div class="card-pro p-4">
                <p class="text-[10px] text-yellow-500 font-black uppercase mb-3" id="lbl-payroll-title"><i class="fas fa-users mr-2"></i>Mushahar & Fasax</p>
                <div id="employeeStats" class="space-y-2 text-[11px]"></div>
            </div>

            <div class="grid grid-cols-2 gap-2 text-center">
                <div class="card-pro p-3 bg-blue-500/5">
                    <p class="text-[8px] text-blue-400 font-bold uppercase" id="lbl-mva">MVA (25%)</p>
                    <p id="stat-mva" class="text-[11px] font-black balance-text text-blue-400">0 kr</p>
                </div>
                <div class="card-pro p-3 bg-purple-500/5">
                    <p class="text-[8px] text-purple-400 font-bold uppercase" id="lbl-net">Faa'ido Nadiif ah</p>
                    <p id="totalNet" class="text-[11px] font-black balance-text text-purple-400">0 kr</p>
                </div>
            </div>

            <!-- List -->
            <div id="listSection" class="section space-y-2 pb-16"></div>

            <!-- Add Entry -->
            <div id="addSection" class="section hidden">
                <div class="card-pro p-6">
                    <div class="flex gap-2 mb-6">
                        <button onclick="setMode('income')" id="btn-inc" class="flex-1 py-4 rounded-xl font-black bg-green-600 text-xs">INNTEKT</button>
                        <button onclick="setMode('expense')" id="btn-exp" class="flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs">UTGIFT</button>
                    </div>
                    <div class="space-y-3">
                        <input type="date" id="inDate" class="input-pro">
                        <input type="text" id="inName" class="input-pro" placeholder="Sharaxaad (f.eks. Shidaal)">
                        <div id="employeeField" class="hidden">
                            <input type="text" id="inEmployee" class="input-pro border-yellow-500/50" placeholder="Magaca Shaqaalaha">
                        </div>
                        <input type="number" id="inAmount" class="input-pro" placeholder="Lacagta (Beløp)">
                        <select id="inType" class="input-pro" onchange="checkType(this.value)"></select>
                        <button onclick="saveEntry()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black mt-4 uppercase" id="lbl-save">Kaydi</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-[#1e293b] border-t border-white/5 flex justify-around py-5 z-[4000]">
            <button onclick="showPage('list')" id="nav-list" class="nav-tab active flex flex-col items-center gap-1 opacity-40">
                <i class="fas fa-home text-xl"></i><span class="text-[10px] font-bold" id="lbl-nav-home">Home</span>
            </button>
            <button onclick="showPage('add')" id="nav-add" class="nav-tab flex flex-col items-center gap-1 opacity-40">
                <i class="fas fa-plus-circle text-xl"></i><span class="text-[10px] font-bold" id="lbl-nav-add">Add</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentLang = 'no', authMode = 'login', currentMode = 'income', isPrivate = false;

        const langData = {
            no: { income: "Inntekt", expense: "Utgift", payroll: "Lønn & Feriepenger", mva: "MVA (Tax)", net: "Faa'ido", home: "Hjem", add: "Legg til", save: "Lagre", desc: "Beskrivelse", amt: "Beløp", emp: "Navn på ansatt", deleteMsg: "Slette?", editMsg: "Endre:" },
            so: { income: "Dakhli", expense: "Kharash", payroll: "Mushahar & Fasax", mva: "Cansuur (MVA)", net: "Nadiif", home: "Guudmar", add: "Geli Xog", save: "Kaydi", desc: "Sharaxaad", amt: "Lacagta", emp: "Magaca Shaqaalaha", deleteMsg: "Ma tirtirtaa?", editMsg: "Bedel:" },
            en: { income: "Income", expense: "Expense", payroll: "Payroll & Vacation", mva: "VAT (25%)", net: "Net Profit", home: "Home", add: "Add New", save: "Save", desc: "Description", amt: "Amount", emp: "Employee Name", deleteMsg: "Delete?", editMsg: "Edit:" }
        };

        window.updateLanguage = (lang) => {
            currentLang = lang; const d = langData[lang];
            document.getElementById('lbl-income').innerText = d.income;
            document.getElementById('lbl-expense').innerText = d.expense;
            document.getElementById('lbl-payroll-title').innerHTML = `<i class="fas fa-users mr-2"></i>${d.payroll}`;
            document.getElementById('lbl-mva').innerText = d.mva;
            document.getElementById('lbl-net').innerText = d.net;
            document.getElementById('lbl-nav-home').innerText = d.home;
            document.getElementById('lbl-nav-add').innerText = d.add;
            document.getElementById('lbl-save').innerText = d.save;
            document.getElementById('inName').placeholder = d.desc;
            document.getElementById('inAmount').placeholder = d.amt;
            document.getElementById('inEmployee').placeholder = d.emp;
            fetchData();
        };

        window.toggleAuthMode = (mode) => {
            authMode = mode; const btnMain = document.getElementById('mainAuthBtn');
            btnMain.innerText = mode === 'signup' ? 'Sign Up' : (mode === 'forgot' ? 'Reset' : 'Logg Inn');
        };

        window.handleAuth = async () => {
            const e = document.getElementById('emailInput').value, p = document.getElementById('passInput').value;
            try {
                if(authMode === 'login') await signInWithEmailAndPassword(auth, e, p);
                else if(authMode === 'signup') await createUserWithEmailAndPassword(auth, e, p);
                else if(authMode === 'forgot') { await sendPasswordResetEmail(auth, e); alert("Email Sent!"); }
            } catch (err) { alert(err.message); }
        };

        onAuthStateChanged(auth, user => {
            if(user) { document.getElementById('authSection').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); document.getElementById('userDisplay').innerText = user.email; updateLanguage('no'); }
            else { document.getElementById('authSection').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
        });

        window.fetchData = () => {
            onSnapshot(query(collection(db, "pro_records"), orderBy("date", "desc")), snap => {
                const list = document.getElementById('listSection');
                const empStatsDiv = document.getElementById('employeeStats');
                list.innerHTML = ''; let ti=0, te=0, tmva=0, employees = {};

                snap.forEach(docSnap => {
                    const d = docSnap.data(); const amt = Number(d.amount);
                    if(d.mode === 'income') {
                        ti += amt;
                        if(d.type === 'Faktura med MVA') tmva -= (amt - (amt / 1.25)); // Income MVA to pay
                    } else {
                        te += amt;
                        // Expense MVA to get back
                        if(['Drivstoff med MVA', 'Biler / Fix med MVA'].includes(d.type)) tmva += (amt - (amt / 1.25));
                        if(d.type === 'Lønn' && d.employee) employees[d.employee] = (employees[d.employee] || 0) + amt;
                    }

                    list.innerHTML += `
                        <div class="card-pro p-4 flex justify-between items-center border-l-4 ${d.mode === 'income' ? 'border-green-500' : 'border-red-500'} mb-2">
                            <div><p class="text-xs font-black uppercase">${d.name} ${d.employee ? '('+d.employee+')' : ''}</p><p class="text-[9px] text-gray-500">${d.date} • ${d.type}</p></div>
                            <div class="flex items-center gap-3">
                                <p class="font-black balance-text ${d.mode === 'income' ? 'text-green-400' : 'text-red-400'}">${amt.toLocaleString()} kr</p>
                                <div class="dropdown">
                                    <button class="text-gray-500 p-2"><i class="fas fa-ellipsis-v"></i></button>
                                    <div class="dropdown-content">
                                        <button onclick="editEntry('${docSnap.id}', '${d.name}', ${amt})" class="w-full text-left p-3 text-blue-400 text-xs border-b border-gray-700">Edit</button>
                                        <button onclick="deleteEntry('${docSnap.id}')" class="w-full text-left p-3 text-red-500 text-xs">Slett</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });

                empStatsDiv.innerHTML = Object.keys(employees).length ? '' : '<p class="text-gray-500 italic">No payroll.</p>';
                for (let n in employees) {
                    empStatsDiv.innerHTML += `<div class="flex justify-between border-b border-white/5 pb-1"><span>${n}:</span><span><b>${employees[n].toLocaleString()} kr</b> | Ferie: <b class="text-orange-400">${(employees[n]*0.102).toLocaleString()} kr</b></span></div>`;
                }
                document.getElementById('totalIncome').innerText = ti.toLocaleString() + ' kr';
                document.getElementById('totalExpense').innerText = te.toLocaleString() + ' kr';
                document.getElementById('stat-mva').innerText = Math.round(tmva).toLocaleString() + ' kr';
                document.getElementById('totalNet').innerText = (ti - te).toLocaleString() + ' kr';
            });
        };

        window.saveEntry = async () => {
            const a = document.getElementById('inAmount').value, n = document.getElementById('inName').value, d = document.getElementById('inDate').value;
            if(!a || !n || !d) return;
            await addDoc(collection(db, "pro_records"), { amount: parseFloat(a), name: n, date: d, type: document.getElementById('inType').value, employee: document.getElementById('inEmployee').value, mode: currentMode, user: auth.currentUser.email });
            document.getElementById('inAmount').value = ''; document.getElementById('inName').value = ''; showPage('list');
        };

        window.checkType = (val) => { document.getElementById('employeeField').className = (val === 'Lønn' ? '' : 'hidden'); };
        window.setMode = (m) => {
            currentMode = m;
            document.getElementById('btn-inc').className = m === 'income' ? 'flex-1 py-4 rounded-xl font-black bg-green-600 text-xs' : 'flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs';
            document.getElementById('btn-exp').className = m === 'expense' ? 'flex-1 py-4 rounded-xl font-black bg-red-600 text-xs' : 'flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs';
            const opts = m === 'income' ? ['Faktura med MVA', 'Kontanter (No MVA)'] : ['Drivstoff med MVA', 'Lønn', 'Bank Transaction (No MVA)', 'Biler / Fix med MVA', 'Annet (No MVA)'];
            document.getElementById('inType').innerHTML = opts.map(o => `<option value="${o}" class="bg-[#1e293b]">${o}</option>`).join('');
            checkType(document.getElementById('inType').value);
        };

        window.deleteEntry = async (id) => { if(confirm("Slette?")) await deleteDoc(doc(db, "pro_records", id)); };
        window.editEntry = async (id, oldN, oldA) => { const n = prompt("Edit:", oldN); const a = prompt("Amount:", oldA); if(n && a) await updateDoc(doc(db, "pro_records", id), { name: n, amount: parseFloat(a) }); };
        window.showPage = (p) => { document.querySelectorAll('.section').forEach(s => s.classList.add('hidden')); document.getElementById(p + 'Section').classList.remove('hidden'); document.getElementById('nav-list').classList.toggle('active', p === 'list'); document.getElementById('nav-add').classList.toggle('active', p === 'add'); };
        window.logout = () => signOut(auth);
        window.togglePrivacy = () => { isPrivate = !isPrivate; document.querySelectorAll('.balance-text').forEach(el => isPrivate ? el.classList.add('privacy-blur') : el.classList.remove('privacy-blur')); document.getElementById('eyeIcon').className = isPrivate ? 'fas fa-eye-slash' : 'fas fa-eye'; };
        document.getElementById('inDate').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
