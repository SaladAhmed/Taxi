<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed Salad Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: -apple-system, sans-serif; }
        .card { background: #252945; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #30355a; position: relative; }
        .result-card { background: linear-gradient(135deg, #30355a 0%, #1a1c2c 100%); border: 2px solid #fbbf24; }
        input, select { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; font-size: 16px; }
        .menu-dropdown { display: none; position: absolute; right: 10px; top: 45px; background: #30355a; border: 1px solid #404677; border-radius: 8px; z-index: 50; min-width: 140px; }
        .menu-dropdown.active { display: block; }
        #authSection { position: fixed; inset: 0; background: #1a1c2c; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .hidden { display: none !important; }
        .lang-btn { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .lang-active { background: #fbbf24 !important; color: black !important; }
    </style>
</head>
<body class="pb-24">

    <!-- AUTH SCREEN -->
    <div id="authSection">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-2xl font-bold text-yellow-400 mb-6 uppercase tracking-widest">M. Salad Transport</h1>
            <div class="card p-6 border-t-4 border-yellow-400">
                <h2 id="authTitle" class="text-white font-bold mb-4 uppercase">Login</h2>
                <input type="email" id="emailInput" placeholder="Email" class="mb-3">
                <input type="password" id="passInput" placeholder="Password" class="mb-4">
                
                <button id="mainAuthBtn" onclick="handleAuth()" class="w-full bg-yellow-400 text-black py-4 rounded-xl font-bold uppercase shadow-lg mb-4">Login</button>
                
                <div class="flex flex-col gap-3">
                    <button id="toggleAuthBtn" onclick="toggleAuthMode()" class="text-gray-400 text-xs font-bold uppercase">Ma haysatid Account? Sign Up</button>
                    <button onclick="resetPassword()" class="text-yellow-400 text-[10px] font-bold uppercase hover:underline">Forgot Password?</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden p-4">
        <div class="mb-4">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2">
                    <button onclick="changeLang('so')" id="btn-so" class="lang-btn bg-gray-700 text-white">SO</button>
                    <button onclick="changeLang('en')" id="btn-en" class="lang-btn bg-gray-700 text-white">EN</button>
                    <button onclick="changeLang('no')" id="btn-no" class="lang-btn bg-gray-700 text-white">NO</button>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleVisibility()" class="text-yellow-400 text-xl"><i id="eyeIcon" class="fas fa-eye"></i></button>
                    <button onclick="logout()" data-i18n="logout" class="text-red-400 font-bold border border-red-900/30 px-3 py-1 rounded text-xs uppercase">Ka Bax</button>
                </div>
            </div>
            
            <h1 class="text-lg font-black text-yellow-400 uppercase tracking-tighter text-center">Mohamed Salad Transport</h1>
            
            <div class="grid grid-cols-3 gap-2 mt-4 text-center">
                <div class="card border-l-4 border-green-500 p-2"><p data-i18n="income" class="text-[8px] text-gray-400 uppercase font-bold">Income</p><h2 id="totalIncome" class="text-xs font-bold text-green-400 money-val">0 kr</h2></div>
                <div class="card border-l-4 border-red-500 p-2"><p data-i18n="expense" class="text-[8px] text-gray-400 uppercase font-bold">Kharash</p><h2 id="totalExpense" class="text-xs font-bold text-red-400 money-val">0 kr</h2></div>
                <div class="card border-l-4 border-blue-400 p-2"><p data-i18n="owner" class="text-[8px] text-gray-400 uppercase font-bold text-blue-400">Owner</p><h2 id="totalOwner" class="text-xs font-bold text-blue-400 money-val">0 kr</h2></div>
            </div>

            <div class="card result-card mt-2">
                <div class="grid grid-cols-2 border-b border-gray-600 pb-2 mb-2 text-orange-400 font-bold text-center">
                    <div><p data-i18n="mva_refund" class="text-[9px] text-gray-400 uppercase">MVA Refund (1/5)</p><p id="mvaTax" class="text-sm money-val">0 kr</p></div>
                    <div><p data-i18n="feriepenger" class="text-[9px] text-gray-400 uppercase">Feriepenger</p><p id="ferieTax" class="text-sm money-val">0 kr</p></div>
                </div>
                <div class="text-center"><p data-i18n="net_result" class="text-[10px] text-yellow-400 uppercase font-bold">Net Result</p><h2 id="netResult" class="text-2xl font-black mt-1 money-val">0 kr</h2></div>
            </div>
        </div>
        
        <div id="dashboardSection" class="section"><div id="transactionList" class="space-y-2"></div></div>
        <div id="statsSection" class="section hidden"><div id="categoryTotals" class="space-y-2"></div></div>

        <div id="inputSection" class="section hidden">
            <div class="card p-4">
                <div class="flex gap-2 mb-6 font-bold uppercase text-xs">
                    <button onclick="setMode('income')" id="modeInc" class="flex-1 py-3 rounded-xl">Income ↑</button>
                    <button onclick="setMode('expense')" id="modeExp" class="flex-1 py-3 rounded-xl">Kharash ↓</button>
                </div>
                <div class="space-y-4">
                    <input type="date" id="dateInput">
                    <input type="text" id="nameInput">
                    <input type="number" id="amountInput">
                    <select id="typeInput"></select>
                    <button onclick="saveEntry()" id="btnSave" class="w-full bg-yellow-400 text-black py-4 rounded-2xl font-black mt-4 uppercase">Kaydi</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="bottomNav" class="fixed bottom-0 w-full bg-[#252945] border-t border-gray-800 flex justify-around py-3 z-50 hidden">
        <button onclick="showSection('dashboard')" id="nav-dashboard" class="nav-btn flex flex-col items-center"><i class="fas fa-list-ul text-xl"></i><span data-i18n="nav_summary" class="text-[10px]">Guudmar</span></button>
        <button onclick="showSection('stats')" id="nav-stats" class="nav-btn flex flex-col items-center"><i class="fas fa-chart-pie text-xl"></i><span data-i18n="nav_report" class="text-[10px]">Warbixin</span></button>
        <button onclick="showSection('input')" id="nav-input" class="nav-btn flex flex-col items-center"><i class="fas fa-plus-circle text-xl"></i><span data-i18n="nav_add" class="text-[10px]">Geli Xog</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee",
            measurementId: "G-VJTX0THFK5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let isSignUpMode = false;
        let currentUser = null;
        let mode = 'income';
        let currentLang = localStorage.getItem('appLang') || 'so';
        let isHidden = false;

        // Toggle Login / Sign Up
        window.toggleAuthMode = () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authTitle').innerText = isSignUpMode ? 'Sign Up' : 'Login';
            document.getElementById('mainAuthBtn').innerText = isSignUpMode ? 'Create Account' : 'Login';
            document.getElementById('toggleAuthBtn').innerText = isSignUpMode ? 'Haysataa Account? Login' : 'Ma haysatid Account? Sign Up';
        };

        window.handleAuth = () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            if(!email || !pass) return alert("Fadlan buuxi meelaha banaan");

            if(isSignUpMode) {
                createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            } else {
                signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Email ama Password khaldan"));
            }
        };

        window.resetPassword = () => {
            const email = document.getElementById('emailInput').value;
            if (!email) return alert("Qor emailkaaga marka hore");
            sendPasswordResetEmail(auth, email).then(() => alert("Link-ga bedelka password-ka waa la diray")).catch(e => alert(e.message));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('bottomNav').classList.remove('hidden');
                changeLang(currentLang);
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('bottomNav').classList.add('hidden');
            }
        });

        // Koodhka kale ee muhiimka ah (Categories, i18n, etc.)
        const i18n = {
            so: { income: "Dakhli", expense: "Kharash", owner: "Owner", mva_refund: "MVA Refund (1/5)", feriepenger: "Feriepenger", net_result: "Net Result", logout: "Ka Bax", nav_summary: "Guudmar", nav_report: "Warbixin", nav_add: "Geli Xog", placeholder_name: "Magaca", placeholder_amt: "Lacagta (Kr)", btn_save: "Kaydi Xogta" },
            en: { income: "Income", expense: "Expense", owner: "Owner", mva_refund: "VAT Refund", feriepenger: "Holiday Pay", net_result: "Net Profit", logout: "Logout", nav_summary: "Summary", nav_report: "Report", nav_add: "Add Entry", placeholder_name: "Name", placeholder_amt: "Amount (Kr)", btn_save: "Save Data" },
            no: { income: "Inntekt", expense: "Utgift", owner: "Eier", mva_refund: "MVA Refund", feriepenger: "Feriepenger", net_result: "Netto Resultat", logout: "Logg ut", nav_summary: "Oversikt", nav_report: "Rapport", nav_add: "Legg til", placeholder_name: "Navn", placeholder_amt: "Beløp (Kr)", btn_save: "Lagre" }
        };

        const categories = {
            income: { so: ['Kaarka Taksi', 'Caddaan', 'Faktura (Income)', 'Wax kale'], en: ['Taxi Card', 'Cash', 'Invoice', 'Other'], no: ['Taxi Kort', 'Kontanter', 'Faktura', 'Annet'] },
            expense: { so: ['Mushaar (Lønn)', 'Bankuttak (Owner)', 'Skatt', 'Transaksjonsgebyr', 'Shidaal', 'Dayactir', 'Regnskap', 'Sentral Avgifter', 'Forsikring', 'Wax kale'], en: ['Salary', 'Withdrawal', 'Tax', 'Fee', 'Fuel', 'Repair', 'Accounting', 'Base Fees', 'Insurance', 'Other'], no: ['Lønn', 'Eieruttak', 'Skatt', 'Gebyr', 'Drivstoff', 'Reparasjon', 'Regnskap', 'Avgifter', 'Forsikring', 'Annet'] }
        };

        window.toggleVisibility = () => { isHidden = !isHidden; loadData(); document.getElementById('eyeIcon').className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye'; };

        window.changeLang = (lang) => {
            currentLang = lang; localStorage.setItem('appLang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[lang][el.getAttribute('data-i18n')]);
            document.getElementById('nameInput').placeholder = i18n[lang].placeholder_name;
            document.getElementById('amountInput').placeholder = i18n[lang].placeholder_amt;
            document.getElementById('btnSave').innerText = i18n[lang].btn_save;
            setMode(mode); loadData();
        };

        window.setMode = (m) => {
            mode = m;
            document.getElementById('modeInc').className = m === 'income' ? 'flex-1 py-3 rounded-xl bg-green-500 text-white' : 'flex-1 py-3 rounded-xl bg-gray-700';
            document.getElementById('modeExp').className = m === 'expense' ? 'flex-1 py-3 rounded-xl bg-red-500 text-white' : 'flex-1 py-3 rounded-xl bg-gray-700';
            document.getElementById('typeInput').innerHTML = categories[m][currentLang].map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.showSection = (s) => {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById(s + 'Section').classList.remove('hidden');
        };

        window.saveEntry = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value);
            const date = document.getElementById('dateInput').value;
            if(!amt || !date || !currentUser) return;
            await addDoc(collection(db, "xisaabaadka"), { 
                amount: amt, date: date, name: document.getElementById('nameInput').value || "Info", 
                type: document.getElementById('typeInput').value, mode: mode, 
                userId: currentUser.uid // Tani waxay ku xiraysaa xogta qofka hadda galay
            });
            document.getElementById('amountInput').value = ''; showSection('dashboard');
        };

        window.deleteItem = async (id) => { if(confirm("Tirtir?")) await deleteDoc(doc(db, "xisaabaadka", id)); };
        window.toggleMenu = (id) => document.getElementById('menu-'+id).classList.toggle('active');

        function loadData() {
            if(!currentUser) return;
            // HALKAN AYAA UGU MUHIIMSAN: Kaliya soo saar xogta uu leeyahay currentUser.uid
            const q = query(collection(db, "xisaabaadka"), where("userId", "==", currentUser.uid), orderBy("date", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('transactionList');
                const statsList = document.getElementById('categoryTotals');
                list.innerHTML = ''; statsList.innerHTML = '';
                let ti=0, te=0, ownerSum=0, mvaSum=0, totalFP=0;
                let catTotals = {};

                snapshot.forEach((docSnap) => {
                    const d = docSnap.data();
                    if(d.mode === 'income') ti += d.amount;
                    else {
                        te += d.amount;
                        if(d.type.includes('Owner') || d.type.includes('Eier')) ownerSum += d.amount;
                        if(d.type.includes('Lønn') || d.type.includes('Salary')) totalFP += (d.amount * 0.102);
                        if(['Shidaal','Drivstoff','Fuel','Dayactir','Repair','Regnskap','Accounting'].some(v => d.type.includes(v))) mvaSum += (d.amount / 5);
                    }
                    catTotals[d.type] = (catTotals[d.type] || 0) + d.amount;
                    
                    const displayAmt = isHidden ? "**** kr" : Math.round(d.amount).toLocaleString() + " kr";
                    list.innerHTML += `<div class="card flex justify-between items-center border-l-4 ${d.mode==='income'?'border-green-500':'border-red-500'}">
                        <div><p class="text-[9px] text-yellow-400 font-bold uppercase">${d.name}</p><p class="text-sm font-bold">${d.type}</p><p class="text-[10px] text-gray-500">${d.date}</p></div>
                        <div class="flex items-center gap-3"><p class="font-bold ${d.mode==='income'?'text-green-400':'text-red-400'}">${displayAmt}</p>
                        <button onclick="toggleMenu('${docSnap.id}')" class="text-gray-500"><i class="fas fa-ellipsis-v"></i></button>
                        <div id="menu-${docSnap.id}" class="menu-dropdown"><div class="p-3 text-red-500 text-sm font-bold" onclick="deleteItem('${docSnap.id}')">TIRTIR</div></div></div></div>`;
                });

                for (const [cat, total] of Object.entries(catTotals)) {
                    const displayTotal = isHidden ? "**** kr" : Math.round(total).toLocaleString() + " kr";
                    statsList.innerHTML += `<div class="card flex justify-between border-r-4 border-yellow-500">
                        <span class="text-sm">${cat}</span><span class="font-bold">${displayTotal}</span></div>`;
                }

                const format = (v) => isHidden ? "**** kr" : Math.round(v).toLocaleString() + " kr";
                document.getElementById('totalIncome').innerText = format(ti);
                document.getElementById('totalExpense').innerText = format(te);
                document.getElementById('totalOwner').innerText = format(ownerSum);
                document.getElementById('mvaTax').innerText = format(mvaSum);
                document.getElementById('ferieTax').innerText = format(totalFP);
                const net = ti - te - totalFP;
                document.getElementById('netResult').innerText = format(net);
            });
        }
        document.getElementById('dateInput').valueAsDate = new Date();
    </script>
</body>
</html>
