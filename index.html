<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .card { background: #252945; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #30355a; }
        .lang-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; background: #374151; color: white; }
        .active-lang { background: #fbbf24 !important; color: black !important; }
        .nav-active { color: #fbbf24 !important; }
        .hidden { display: none !important; }
        input, select { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 10px; font-size: 16px; }
        #authSection { position: fixed; inset: 0; background: #1a1c2c; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="pb-24">

    <div id="authSection" class="hidden">
        <div class="bg-[#252945] p-6 rounded-2xl w-full max-w-sm border-t-4 border-yellow-400">
            <h2 id="authTitle" class="text-center font-bold mb-4 uppercase">Login</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="handleAuth()" id="authBtn" class="w-full bg-yellow-400 text-black py-3 rounded-xl font-bold uppercase">Gudaha Gal</button>
        </div>
    </div>

    <div id="mainApp" class="p-4">
        <!-- Header & Lang -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-1">
                <button onclick="changeLang('so')" id="btn-so" class="lang-btn">SO</button>
                <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
                <button onclick="changeLang('no')" id="btn-no" class="lang-btn">NO</button>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="togglePrivacy()" class="text-yellow-400 text-lg"><i id="eyeIcon" class="fas fa-eye"></i></button>
                <button onclick="logout()" class="text-red-500 text-[10px] font-bold border border-red-500/30 px-2 py-1 rounded">KA BAX</button>
            </div>
        </div>

        <h1 class="text-center font-black text-yellow-400 tracking-tighter mb-6 uppercase">M. Salad Transport</h1>

        <!-- Top Dashboard -->
        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="card border-l-4 border-green-500 text-center">
                <p id="label-inc" class="text-[8px] text-gray-400 uppercase">Income</p>
                <h2 id="totalIncome" class="text-xs font-bold text-green-400">0 kr</h2>
            </div>
            <div class="card border-l-4 border-red-500 text-center">
                <p id="label-exp" class="text-[8px] text-gray-400 uppercase">Expense</p>
                <h2 id="totalExpense" class="text-xs font-bold text-red-400">0 kr</h2>
            </div>
            <div class="card border-l-4 border-blue-400 text-center">
                <p id="label-own" class="text-[8px] text-gray-400 uppercase">Owner</p>
                <h2 id="totalOwner" class="text-xs font-bold text-blue-400">0 kr</h2>
            </div>
        </div>

        <!-- Middle Result -->
        <div class="card border-2 border-yellow-400/50 bg-gradient-to-br from-[#30355a] to-[#1a1c2c] p-4">
            <div class="flex justify-around border-b border-gray-700 pb-2 mb-2 text-center">
                <div><p id="label-mva" class="text-[8px] text-gray-400 uppercase">VAT Refund</p><p id="mvaTax" class="text-orange-400 font-bold">0 kr</p></div>
                <div><p id="label-fer" class="text-[8px] text-gray-400 uppercase">Holiday Pay</p><p id="ferieTax" class="text-orange-400 font-bold">0 kr</p></div>
            </div>
            <div class="text-center">
                <p id="label-net" class="text-[10px] text-yellow-400 font-bold uppercase">Net Profit</p>
                <h2 id="netResult" class="text-2xl font-black">0 kr</h2>
            </div>
        </div>

        <!-- Sections -->
        <div id="dashboardSection" class="section mt-4 space-y-2"></div>
        <div id="reportSection" class="section hidden mt-4 space-y-2"></div>
        <div id="inputSection" class="section hidden mt-4">
            <div class="card p-4">
                <div class="flex gap-2 mb-4">
                    <button onclick="setMode('income')" id="modeInc" class="flex-1 py-3 rounded-xl font-bold bg-green-600">INCOME ↑</button>
                    <button onclick="setMode('expense')" id="modeExp" class="flex-1 py-3 rounded-xl font-bold bg-gray-700">EXPENSE ↓</button>
                </div>
                <input type="date" id="dateInput">
                <input type="text" id="nameInput" placeholder="Name">
                <input type="number" id="amountInput" placeholder="Amount (kr)">
                <select id="typeInput"></select>
                <button onclick="saveData()" id="btn-save" class="w-full bg-yellow-400 text-black py-4 rounded-xl font-black uppercase mt-2">Lagre</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-0 w-full bg-[#252945] border-t border-gray-800 flex justify-around py-4">
        <button onclick="showSection('dashboard')" id="nav-dash" class="nav-active flex flex-col items-center gap-1">
            <i class="fas fa-list-ul"></i><span id="nav-text-1" class="text-[10px]">Summary</span>
        </button>
        <button onclick="showSection('report')" id="nav-rep" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-chart-pie"></i><span id="nav-text-2" class="text-[10px]">Report</span>
        </button>
        <button onclick="showSection('input')" id="nav-inp" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-plus-circle"></i><span id="nav-text-3" class="text-[10px]">Add Entry</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null, currentLang = localStorage.getItem('lang') || 'no', currentMode = 'income', isHidden = false;

        const langData = {
            so: { inc: "DAKHLI", exp: "KHARASH", own: "OWNER", mva: "MVA CELISH", fer: "LACAG FASAX", net: "FAA'IIDO", n1: "Guudmar", n2: "Warbixin", n3: "Geli Xog", save: "KAYDI", name: "Magaca", amt: "Lacagta" },
            en: { inc: "INCOME", exp: "EXPENSE", own: "OWNER", mva: "VAT REFUND", fer: "HOLIDAY PAY", net: "NET PROFIT", n1: "Summary", n2: "Report", n3: "Add Entry", save: "SAVE", name: "Name", amt: "Amount" },
            no: { inc: "INNTEKT", exp: "UTGIFT", own: "EIER", mva: "MVA REFUND", fer: "FERIEPENGER", net: "NETTO RESULTAT", n1: "Oversikt", n2: "Rapport", n3: "Legg til", save: "LAGRE", name: "Navn", amt: "Beløp" }
        };

        const categories = {
            income: { TaxiCard: {so:'Kaarka', en:'Card', no:'Kort'}, Cash: {so:'Caddaan', en:'Cash', no:'Kontanter'}, Invoice: {so:'Faktura', en:'Invoice', no:'Faktura'}, Other: {so:'Kale', en:'Other', no:'Annet'} },
            expense: { Salary: {so:'Mushaar', en:'Salary', no:'Lønn'}, Withdrawal: {so:'Lacag bixid', en:'Withdrawal', no:'Eieruttak'}, Tax: {so:'Cansuur', en:'Tax', no:'Skatt'}, Fuel: {so:'Shidaal', en:'Fuel', no:'Drivstoff'}, Repair: {so:'Dayactir', en:'Repair', no:'Reparasjon'}, Insurance: {so:'Forsikring', en:'Insurance', no:'Forsikring'}, Other: {so:'Kale', en:'Other', no:'Annet'} }
        };

        onAuthStateChanged(auth, u => {
            user = u;
            if(u) { document.getElementById('authSection').classList.add('hidden'); changeLang(currentLang); loadData(); }
            else { document.getElementById('authSection').classList.remove('hidden'); }
        });

        window.changeLang = (l) => {
            currentLang = l; localStorage.setItem('lang', l);
            const d = langData[l];
            document.getElementById('label-inc').innerText = d.inc;
            document.getElementById('label-exp').innerText = d.exp;
            document.getElementById('label-own').innerText = d.own;
            document.getElementById('label-mva').innerText = d.mva;
            document.getElementById('label-fer').innerText = d.fer;
            document.getElementById('label-net').innerText = d.net;
            document.getElementById('nav-text-1').innerText = d.n1;
            document.getElementById('nav-text-2').innerText = d.n2;
            document.getElementById('nav-text-3').innerText = d.n3;
            document.getElementById('btn-save').innerText = d.save;
            document.getElementById('nameInput').placeholder = d.name;
            document.getElementById('amountInput').placeholder = d.amt;

            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
            document.getElementById('btn-'+l).classList.add('active-lang');
            setMode(currentMode); loadData();
        };

        window.setMode = (m) => {
            currentMode = m;
            document.getElementById('modeInc').className = m === 'income' ? 'flex-1 py-3 rounded-xl font-bold bg-green-600' : 'flex-1 py-3 rounded-xl font-bold bg-gray-700';
            document.getElementById('modeExp').className = m === 'expense' ? 'flex-1 py-3 rounded-xl font-bold bg-red-600' : 'flex-1 py-3 rounded-xl font-bold bg-gray-700';
            
            let opts = '';
            for(let key in categories[m]) {
                opts += `<option value="${key}">${categories[m][key][currentLang]}</option>`;
            }
            document.getElementById('typeInput').innerHTML = opts;
        };

        window.showSection = (s) => {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById(s+'Section').classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-gray-500'));
            const activeNav = {dashboard: 'nav-dash', report: 'nav-rep', input: 'nav-inp'};
            document.getElementById(activeNav[s]).classList.add('nav-active');
        };

        window.saveData = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value);
            const name = document.getElementById('nameInput').value || "Xog";
            const type = document.getElementById('typeInput').value;
            const date = document.getElementById('dateInput').value;
            if(!amt || !date) return alert("Buuxi meelaha banaan");

            await addDoc(collection(db, "xisaabaadka"), {
                userId: user.uid, amount: amt, name, typeKey: type, mode: currentMode, date
            });
            document.getElementById('amountInput').value = '';
            showSection('dashboard');
        };

        window.loadData = () => {
            if(!user) return;
            const q = query(collection(db, "xisaabaadka"), orderBy("date", "desc"));
            onSnapshot(q, snap => {
                let ti=0, te=0, to=0, mva=0, ferie=0;
                let reports = {};
                const list = document.getElementById('dashboardSection');
                list.innerHTML = '';

                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    if(d.userId !== user.uid) return;

                    const amt = Number(d.amount);
                    const typeLabel = categories[d.mode][d.typeKey] ? categories[d.mode][d.typeKey][currentLang] : d.typeKey;

                    if(d.mode === 'income') {
                        ti += amt;
                        if(d.typeKey === 'Invoice') mva += (amt * 0.25);
                    } else {
                        te += amt;
                        if(d.typeKey === 'Withdrawal') to += amt;
                        if(d.typeKey === 'Salary') ferie += (amt * 0.102);
                        if(['Fuel','Repair'].includes(d.typeKey)) mva += (amt / 5);
                    }

                    reports[typeLabel] = (reports[typeLabel] || 0) + amt;

                    list.innerHTML += `<div class="card flex justify-between items-center border-l-4 ${d.mode === 'income' ? 'border-green-500' : 'border-red-500'}">
                        <div><p class="text-[10px] text-yellow-400 font-bold uppercase">${d.name}</p><p class="font-bold">${typeLabel}</p><p class="text-[9px] text-gray-500">${d.date}</p></div>
                        <div class="flex items-center gap-4"><p class="font-black ${d.mode === 'income' ? 'text-green-400' : 'text-red-400'}">${isHidden ? '***' : amt.toLocaleString()} kr</p>
                        <button onclick="deleteDoc(doc(db, 'xisaabaadka', '${docSnap.id}'))" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button></div>
                    </div>`;
                });

                const repList = document.getElementById('reportSection');
                repList.innerHTML = '';
                for(let label in reports) {
                    repList.innerHTML += `<div class="card flex justify-between font-bold"><span>${label}</span><span class="text-yellow-400">${isHidden ? '***' : reports[label].toLocaleString()} kr</span></div>`;
                }

                const fmt = (v) => isHidden ? '*** kr' : Math.round(v).toLocaleString() + ' kr';
                document.getElementById('totalIncome').innerText = fmt(ti);
                document.getElementById('totalExpense').innerText = fmt(te);
                document.getElementById('totalOwner').innerText = fmt(to);
                document.getElementById('mvaTax').innerText = fmt(mva);
                document.getElementById('ferieTax').innerText = fmt(ferie);
                document.getElementById('netResult').innerText = fmt(ti - te - ferie);
            });
        };

        window.handleAuth = () => {
            const e = document.getElementById('emailInput').value, p = document.getElementById('passInput').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Cillad: " + err.message));
        };
        window.logout = () => signOut(auth);
        window.togglePrivacy = () => { isHidden = !isHidden; loadData(); document.getElementById('eyeIcon').className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye'; };
        document.getElementById('dateInput').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
