<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransportPRO">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: 0.3s; overflow-x: hidden; }
        .container { max-width: 1000px; margin: auto; padding: 10px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .auth-container { padding: 40px 20px; text-align: center; max-width: 400px; margin: 60px auto; background: var(--card); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat-box { background: var(--card); border: 2px solid; border-radius: 15px; padding: 20px 10px; text-align: center; }
        .stat-box small { font-size: 10px; display: block; margin-bottom: 8px; font-weight: bold; opacity: 0.8; }
        .stat-box span { font-size: 16px; font-weight: bold; }

        /* MVA & Feriepenger Row */
        .tax-row { display: flex; justify-content: space-between; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); font-size: 12px; }
        .tax-item b { display: block; color: var(--yellow); font-size: 14px; }

        .summary-card { background: var(--card); border: 3px solid var(--yellow); border-radius: 25px; padding: 30px; text-align: center; margin-bottom: 25px; }

        .entry-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 15px; border-left: 8px solid; display: flex; justify-content: space-between; align-items: center; position: relative; }
        
        /* Menu Dots Styling */
        .menu-dots { cursor: pointer; padding: 5px 10px; color: #64748b; }
        .menu-dropdown { display: none; position: absolute; right: 10px; top: 40px; background: #2d3748; border-radius: 8px; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.3); min-width: 100px; }
        .menu-dropdown div { padding: 10px; border-bottom: 1px solid #4a5568; font-size: 13px; cursor: pointer; }
        .menu-dropdown div:last-child { border-bottom: none; color: var(--red); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; display: block; }
        .nav-item.active { color: var(--yellow); }
        
        input, select { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; }
        .btn-save { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; color: white; }
    </style>
</head>
<body id="body-tag">

<div id="auth-page" class="auth-container">
    <h2 id="auth-title">LOGG INN</h2>
    <div id="reg-fields" style="display:none">
        <input type="text" id="fname" placeholder="Fornavn">
        <input type="text" id="lname" placeholder="Etternavn">
    </div>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    <p onclick="toggleAuth()" style="color:var(--yellow); cursor:pointer; margin-top:15px; font-size:14px;">Registrer deg</p>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon" onclick="toggleTheme()"></i>
        <div class="header-title" style="padding:0; font-size:14px;">TRANSPORT PRO</div>
        <div>🇳🇴 🇸🇴</div>
    </div>

    <div class="container">
        <div id="page-dash" class="page">
            <div class="header-title" style="color:var(--text); text-align:left; font-size:16px;">
                👋 <span id="user-display-name">...</span>
            </div>

            <div class="stats-grid">
                <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small>INNTEKT</small><span id="total-income">0</span></div>
                <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small>UTGIFTER</small><span id="total-expense">0</span></div>
                <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small>NETTO</small><span id="total-netto">0</span></div>
            </div>

            <!-- MVA & FERIEPENGER Section -->
            <div class="tax-row">
                <div class="tax-item">MVA (25%) <b id="tax-mva">0 kr</b></div>
                <div class="tax-item" style="text-align:right">FERIEPENGER (10.2%) <b id="tax-ferie">0 kr</b></div>
            </div>

            <div class="summary-card">
                <small>TOTAL RESULTAT</small>
                <h1 id="res-total" style="color:var(--green)">0 kr</h1>
            </div>
            
            <div id="entries-list"></div>
        </div>

        <!-- Add Data Page -->
        <div id="page-add" class="page" style="display:none;">
            <div class="header-title">REGISTRER NY DATA</div>
            <select id="entry-category">
                <option value="inc-mva">Inntekt (MVA 25%)</option>
                <option value="exp-fuel">Drivstoff (MVA 25%)</option>
                <option value="exp-fixed">Reparasjon (MVA 25%)</option>
            </select>
            <input type="text" id="entry-desc" placeholder="Beskrivelse">
            <input type="number" id="entry-amt" placeholder="Beløp (kr)">
            <button class="btn-save" style="background:var(--green); margin-bottom:10px;" onclick="saveData('income')">SAVE INCOME</button>
            <button class="btn-save" style="background:var(--red)" onclick="saveData('expense')">SAVE EXPENSE</button>
        </div>

        <!-- Profile Page -->
        <div id="page-profile" class="page" style="display:none; text-align:center;">
            <button class="btn-save" style="background:var(--red)" onclick="logout()">LOGG UT</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-chart-line"></i>Dash</div>
        <div class="nav-item" onclick="document.getElementById('camera-file').click()"><i class="fas fa-camera"></i>Scanner</div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i>Add</div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user-cog"></i>User</div>
    </div>
    <input type="file" id="camera-file" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)">
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE", authDomain: "mohamed-salad-transport.firebaseapp.com", databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mohamed-salad-transport", storageBucket: "mohamed-salad-transport.appspot.com", appId: "1:608716442795:web:34cafc1a23316664717bee" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();

    function toggleTheme() { document.getElementById('body-tag').classList.toggle('light-theme'); }
    function toggleAuth() {
        const rf = document.getElementById('reg-fields');
        rf.style.display = rf.style.display === 'none' ? 'block' : 'none';
    }

    function handleAuth() {
        const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
        if(document.getElementById('reg-fields').style.display === 'none') {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            const fn = document.getElementById('fname').value, ln = document.getElementById('lname').value;
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.ref('users/' + u.user.uid + '/profile').set({ fullName: fn + " " + ln });
            }).catch(e => alert(e.message));
        }
    }

    function saveData(mainCat) {
        const desc = document.getElementById('entry-desc').value, amt = parseFloat(document.getElementById('entry-amt').value), subCat = document.getElementById('entry-category').value;
        if(!desc || !amt) return alert("Fyll ut!");
        db.ref('users/' + auth.currentUser.uid + '/entries').push({ desc, amt, subCat, mainCat, date: new Date().toLocaleDateString('no-NO') });
        document.getElementById('entry-desc').value = ""; document.getElementById('entry-amt').value = "";
        showTab('dash');
    }

    function loadData() {
        db.ref('users/' + auth.currentUser.uid + '/profile/fullName').on('value', s => { document.getElementById('user-display-name').innerText = s.val() || "User"; });
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            const list = document.getElementById('entries-list'); list.innerHTML = "";
            let ti=0, te=0;
            snap.forEach(child => {
                const v = child.val(), id = child.key;
                if(v.mainCat === 'income') ti += v.amt; else te += v.amt;
                list.innerHTML += `
                <div class="entry-card" style="border-left-color:${v.mainCat==='income'?'var(--green)':'var(--red)'}">
                    <div class="entry-info"><h4>${v.desc}</h4><small>${v.date}</small></div>
                    <div style="display:flex; align-items:center;">
                        <b style="margin-right:10px">${v.amt.toLocaleString()} kr</b>
                        <div class="menu-dots" onclick="toggleMenu('${id}')"><i class="fas fa-ellipsis-v"></i></div>
                        <div id="menu-${id}" class="menu-dropdown">
                            <div onclick="editItem('${id}')">Edit</div>
                            <div onclick="delEntry('${id}')">Delete</div>
                            <div onclick="toggleMenu('${id}')">Exit</div>
                        </div>
                    </div>
                </div>`;
            });
            let netto = ti - te;
            document.getElementById('total-income').innerText = ti.toLocaleString() + " kr";
            document.getElementById('total-expense').innerText = te.toLocaleString() + " kr";
            document.getElementById('total-netto').innerText = netto.toLocaleString() + " kr";
            document.getElementById('res-total').innerText = netto.toLocaleString() + " kr";
            // Calculations for MVA & Feriepenger
            document.getElementById('tax-mva').innerText = (netto * 0.25).toLocaleString() + " kr";
            document.getElementById('tax-ferie').innerText = (netto * 0.102).toLocaleString() + " kr";
        });
    }

    function toggleMenu(id) {
        const m = document.getElementById('menu-'+id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function delEntry(id) { if(confirm("Tirtir?")) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).remove(); }
    
    function editItem(id) {
        const newAmt = prompt("Geli lacagta cusub:");
        if(newAmt) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).update({ amt: parseFloat(newAmt) });
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
    }

    function logout() { auth.signOut().then(() => window.location.reload()); }

    auth.onAuthStateChanged(u => {
        if(u) { document.getElementById('auth-page').style.display='none'; document.getElementById('main-app').style.display='block'; loadData(); }
        else { document.getElementById('auth-page').style.display='block'; document.getElementById('main-app').style.display='none'; }
    });
</script>
</body>
</html>
