<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Full Regnskap</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransportPRO">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; overflow-x: hidden; }
        .rtl { direction: rtl; text-align: right; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .lang-btn { cursor: pointer; font-size: 18px; margin-left: 10px; }
        .theme-toggle { cursor: pointer; font-size: 20px; color: var(--yellow); }

        .auth-container { padding: 30px; text-align: center; max-width: 400px; margin: 40px auto; background: var(--card); border-radius: 15px; }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .stat-box { background: var(--card); border: 1.5px solid; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-box small { font-size: 9px; display: block; margin-bottom: 5px; font-weight: bold; }

        .mva-card { background: var(--card); border: 2px solid var(--border); border-radius: 15px; margin: 10px auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 780px; }
        .mva-item { text-align: center; border-right: 1px solid var(--border); }
        .mva-item:last-child { border-right: none; }

        .summary-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 10px auto; padding: 20px; text-align: center; max-width: 770px; }
        
        .view-toggle { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 0 20px; gap: 10px; max-width: 800px; margin: auto; }
        #month-filter { background: var(--card); color: var(--text); border: 1px solid var(--yellow); padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 0 15px 12px 15px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }
        
        .pass-wrapper { position: relative; width: 100%; }
        .pass-wrapper i { position: absolute; right: 15px; top: 18px; cursor: pointer; color: #64748b; }

        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; }
        
        /* Scanner UI */
        #scanner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #camera-feed { width: 90%; max-width: 400px; border-radius: 15px; }

        .profile-pic-container { text-align: center; margin: 20px 0; position: relative; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--yellow); }
        .upload-btn { position: absolute; bottom: 0; right: 35%; background: var(--blue); color: white; padding: 5px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body id="body-tag">

<div id="auth-page" class="auth-container">
    <h2 id="auth-title">LOGG INN</h2>
    <input type="text" id="reg-name" placeholder="Fullt navn" style="display:none">
    <input type="email" id="email" placeholder="E-post">
    <div class="pass-wrapper">
        <input type="password" id="pass" placeholder="Passord">
        <i class="fas fa-eye" id="togglePass" onclick="togglePassView()"></i>
    </div>
    <button id="auth-btn" class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    <p id="auth-toggle-text" onclick="toggleAuthMode()" style="margin-top:20px; cursor:pointer; font-size:12px;">Ingen konto? Registrer deg her</p>
    <p onclick="forgotPassword()" style="margin-top:10px; cursor:pointer; font-size:11px; color:var(--yellow)">Glemt passord?</p>
</div>

<div id="scanner-overlay">
    <video id="camera-feed" autoplay playsinline></video>
    <canvas id="camera-canvas" style="display:none;"></canvas>
    <div style="margin-top:20px;">
        <button class="btn-save" style="background:var(--green); width:auto;" onclick="captureImage()">SNAP</button>
        <button class="btn-save" style="background:var(--red); width:auto;" onclick="stopScanner()">AVBRYT</button>
    </div>
    <p id="scanner-status" style="color:white; margin-top:10px;">Venter på bilde...</p>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        <div>
            <span class="lang-btn" onclick="updateLang('no')">🇳🇴</span>
            <span class="lang-btn" onclick="updateLang('so')">🇸🇴</span>
            <span class="lang-btn" onclick="updateLang('en')">🇺🇸</span>
            <span class="lang-btn" onclick="updateLang('ar')">🇸🇦</span>
        </div>
    </div>

    <div id="page-dash" class="page">
        <div class="header-title"><span id="user-display-name">Laster...</span></div>
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small id="l-inc">INNTEKT</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small id="l-exp">UTGIFTER</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small id="l-net">NETTO</small><span id="total-netto">0 kr</span></div>
        </div>
        <div class="mva-card">
            <div class="mva-item"><small id="l-mva">Skyldig MVA</small><br><b id="res-mva">0 kr</b></div>
            <div class="mva-item"><small id="l-aga">AGA (14.1%)</small><br><b id="res-aga">0 kr</b></div>
            <div class="mva-item"><small id="l-fp">Feriepenger</small><br><b id="res-fp">0 kr</b></div>
            <div class="mva-item"><small id="l-avsk">Avskrivning</small><br><b id="res-avsk">0 kr</b></div>
        </div>
        <div class="summary-card">
            <small id="l-res">TOTAL RESULTAT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        <div class="view-toggle">
            <select id="month-filter" onchange="loadData()"></select>
            <button class="btn-save" style="width:auto; padding:8px 15px; background:var(--green)" onclick="downloadReport()"><i class="fas fa-file-csv"></i> Report</button>
            <button id="toggle-hide" class="btn-save" style="width:auto; padding:8px 15px; background:var(--blue)" onclick="toggleHideValues()"><i class="fas fa-eye"></i></button>
        </div>
        <div id="entries-list"></div>
    </div>

    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="header-title" id="l-add-title">REGISTRER DATA</div>
        <button class="btn-save" style="background:var(--blue); margin-bottom:15px;" onclick="startScanner()">
            <i class="fas fa-camera"></i> SMART SCAN
        </button>
        <input type="date" id="entry-date">
        <select id="entry-category" onchange="updateSaveBtnColor()">
            <optgroup label="DRIFTSINNTEKTER">
                <option value="3030">3030 - Kjøreinntekter, lav sats</option>
                <option value="3031">3031 - Kjøreinntekter kontant</option>
                <option value="3032">3032 - Kjøreinntekter NAV</option>
                <option value="3033">3033 - Kjøreinntekter skole</option>
                <option value="3039">3039 - Bomtur, lav sats</option>
                <option value="3110">3110 - Tips</option>
            </optgroup>
            <optgroup label="DRIFTSKOSTNADER">
                <option value="5000">5000 - Lønn til ansatte</option>
                <option value="5400">5400 - Arbeidsgiveravgift</option>
                <option value="5920">5920 - Yrkesskadeforsikring</option>
                <option value="6010">6010 - Avskrivning på transport</option>
                <option value="6705">6705 - Regnskapshonorar</option>
                <option value="6755">6755 - Sentralavgift</option>
                <option value="6800">6800 - Kontorrekvisita</option>
                <option value="6900">6900 - Telefon</option>
                <option value="6907">6907 - Datakommunikasjon</option>
                <option value="7000">7000 - Drivstoff</option>
                <option value="7020">7020 - Vedlikehold transport</option>
                <option value="7040">7040 - Forsikring transport</option>
                <option value="7140">7140 - Reisekostnad</option>
                <option value="7400">7400 - Kontingent</option>
                <option value="7770">7770 - Bank- og kortgebyr</option>
                <option value="7798">7798 - Annen kostnad</option>
            </optgroup>
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        <button class="btn-save" style="background:var(--green)" onclick="saveData()" id="l-save-btn">LAGRE</button>
    </div>

    <div id="page-profile" class="page" style="display:none; padding: 20px;">
        <div class="header-title">PROFILE</div>
        <div class="profile-pic-container">
            <img id="user-profile-pic" class="profile-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <label for="profile-upload" class="upload-btn"><i class="fas fa-camera"></i></label>
            <input type="file" id="profile-upload" style="display:none" accept="image/*" onchange="uploadProfilePic(this)">
        </div>
        <input type="text" id="profile-name-update" placeholder="Fullt navn">
        <button class="btn-save" style="background:var(--blue)" onclick="updateProfileName()">OPPDATER NAVN</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-th-large"></i><br><span id="n-dash">Oversikt</span></div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br><span id="n-add">Legg til</span></div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user-circle"></i><br><span id="n-prof">Profile</span></div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i><br><span id="n-exit">Logg ut</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const storage = firebase.storage();

    let isHidden = false;
    let isRegisterMode = false;
    let currentStream = null;

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('reg-name').style.display = isRegisterMode ? 'block' : 'none';
        document.getElementById('auth-title').innerText = isRegisterMode ? 'REGISTRER DEG' : 'LOGG INN';
        document.getElementById('auth-btn').innerText = isRegisterMode ? 'REGISTRER' : 'LOGG INN';
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(isRegisterMode) {
            auth.createUserWithEmailAndPassword(e, p).then(cred => {
                db.ref('users/' + cred.user.uid + '/profile').set({ fullName: document.getElementById('reg-name').value });
            }).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }
    }

    function forgotPassword() {
        const e = document.getElementById('email').value;
        if(!e) return alert("Skriv e-post!");
        auth.sendPasswordResetEmail(e).then(() => alert("E-post sendt!")).catch(err => alert(err.message));
    }

    function togglePassView() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    function uploadProfilePic(input) {
        if (input.files && input.files[0]) {
            const ref = storage.ref('profile_pics/' + auth.currentUser.uid);
            ref.put(input.files[0]).then(() => {
                ref.getDownloadURL().then(url => {
                    db.ref('users/' + auth.currentUser.uid + '/profile').update({ profilePic: url });
                    document.getElementById('user-profile-pic').src = url;
                });
            });
        }
    }

    function updateProfileName() {
        db.ref('users/' + auth.currentUser.uid + '/profile').update({ fullName: document.getElementById('profile-name-update').value });
    }

    async function startScanner() {
        document.getElementById('scanner-overlay').style.display = 'flex';
        currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('camera-feed').srcObject = currentStream;
    }

    function stopScanner() {
        if(currentStream) currentStream.getTracks().forEach(track => track.stop());
        document.getElementById('scanner-overlay').style.display = 'none';
    }

    function captureImage() {
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('camera-canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        document.getElementById('scanner-status').innerText = "Scanner...";
        Tesseract.recognize(canvas.toDataURL('image/jpeg'), 'eng').then(({ data: { text } }) => {
            const numbers = text.match(/\d+[\.,]\d+/g);
            if(numbers) document.getElementById('entry-amt').value = Math.max(...numbers.map(n => parseFloat(n.replace(',', '.'))));
            stopScanner();
        });
    }

    function updateSaveBtnColor() {
        const cat = parseInt(document.getElementById('entry-category').value);
        document.getElementById('l-save-btn').style.background = cat < 4000 ? 'var(--green)' : 'var(--red)';
    }

    function setupFilter() {
        const months = ["Jan", "Feb", "Mar", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Des"];
        let options = '<option value="all">Alt tid</option>';
        for(let i=0; i<12; i++) options += `<option value="${i+1}-2026">${months[i]} 2026</option>`;
        document.getElementById('month-filter').innerHTML = options;
        document.getElementById('month-filter').value = (new Date().getMonth()+1) + "-2026";
        document.getElementById('entry-date').valueAsDate = new Date();
    }

    function saveData() {
        const cat = document.getElementById('entry-category').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const date = new Date(document.getElementById('entry-date').value);
        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            desc: document.getElementById('entry-desc').value,
            amt: amt, subCat: cat, mainCat: parseInt(cat) < 4000 ? 'income' : 'expense',
            date: date.toLocaleDateString('no-NO'),
            filterKey: (date.getMonth()+1) + "-" + date.getFullYear()
        });
        showTab('dash');
    }

    function loadData() {
        const filter = document.getElementById('month-filter').value;
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            let ti=0, te=0, mvaIn=0, mvaOut=0, aga=0, fp=0;
            const list = document.getElementById('entries-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const v = child.val();
                if(filter === "all" || v.filterKey === filter) {
                    if(v.mainCat === 'income') {
                        ti += v.amt;
                        if(v.subCat !== '3110') mvaIn += (v.amt * 0.1071);
                    } else {
                        te += v.amt;
                        if(['7000', '6755', '7020'].includes(v.subCat)) mvaOut += (v.amt * 0.20);
                        if(v.subCat === '5000') { aga += (v.amt * 0.141); fp += (v.amt * 0.102); }
                    }
                    list.innerHTML += `<div class="entry-card" style="border-left-color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}">
                        <div><b>${v.desc || v.subCat}</b><br><small>${v.date}</small></div>
                        <div style="color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}"><b>${formatVal(v.amt)}</b></div>
                    </div>`;
                }
            });
            document.getElementById('total-income').innerText = formatVal(ti);
            document.getElementById('total-expense').innerText = formatVal(te);
            document.getElementById('total-netto').innerText = formatVal(ti - te);
            document.getElementById('res-mva').innerText = formatVal(mvaIn - mvaOut);
            document.getElementById('res-aga').innerText = formatVal(aga);
            document.getElementById('res-fp').innerText = formatVal(fp);
            document.getElementById('res-total').innerText = formatVal(ti - te - aga - fp);
        });
    }

    function formatVal(v) { return isHidden ? "**** kr" : Math.round(v).toLocaleString() + " kr"; }
    function toggleHideValues() { isHidden = !isHidden; loadData(); }

    function downloadReport() {
        db.ref('users/' + auth.currentUser.uid + '/entries').once('value', snap => {
            let csv = "\uFEFFDato,Kategori,Beskrivelse,Beloep\n";
            snap.forEach(c => { const v = c.val(); csv += `${v.date},${v.subCat},${v.desc},${v.amt}\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Regnskap_Report.csv";
            link.click();
        });
    }

    function updateLang(l) {
        const d = dict[l] || dict.no;
        for (let k in d) { const el = document.getElementById('l-'+k) || document.getElementById('n-'+k); if(el) el.innerText = d[k]; }
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display='none';
            document.getElementById('main-app').style.display='block';
            db.ref('users/'+user.uid+'/profile').on('value', s => {
                const d = s.val() || {};
                document.getElementById('user-display-name').innerText = d.fullName || "Bruker";
                if(d.profilePic) document.getElementById('user-profile-pic').src = d.profilePic;
            });
            setupFilter(); loadData();
        } else {
            document.getElementById('auth-page').style.display='block';
            document.getElementById('main-app').style.display='none';
        }
    });

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
