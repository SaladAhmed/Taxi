<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// DNB PDF READER
async function handlePDF(input){
    const file = input.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = async function(e){
        const typedarray = new Uint8Array(e.target.result);

        const pdf = await pdfjsLib.getDocument({data:typedarray}).promise;

        let fullText = '';

        for(let p=1;p<=pdf.numPages;p++){
            const page = await pdf.getPage(p);
            const txt = await page.getTextContent();

            fullText += txt.items.map(i=>i.str).join(' ') + '\n';
        }

        parseDNB(fullText);
    };

    reader.readAsArrayBuffer(file);
}

function parseDNB(text){

    bItems = [];

    const lines = text.split('\n');

    lines.forEach(line=>{

        // AGDER TAXI = INCOME
        if(line.includes('Agder Taxi AS')){

            const amt = line.match(/(\d{1,3}(\.\d{3})*,\d{2})/g);

            if(amt && amt.length){

                const amount = amt[amt.length-1]
                    .replace(/\./g,'')
                    .replace(',','.');

                bItems.push({
                    type:'income',
                    desc:'Agder Taxi AS',
                    amount:parseFloat(amount),
                    category:'3030',
                    date:new Date().toISOString().split('T')[0]
                });
            }
        }

        // ALL EXPENSES
        else if(
            line.includes('Tesla') ||
            line.includes('Uno-x') ||
            line.includes('Circle k') ||
            line.includes('Skatteetaten') ||
            line.includes('Fortum') ||
            line.includes('Santander') ||
            line.includes('Fevik') ||
            line.includes('Vibb') ||
            line.includes('Lyse') ||
            line.includes('DNB Livsforsikring') ||
            line.includes('Power Arendal') ||
            line.includes('Nextgentel') ||
            line.includes('Arendal Kommune') ||
            line.includes('Matrix Insurance') ||
            line.includes('Regnskapstjenester')
        ){

            const amt = line.match(/(\d{1,3}(\.\d{3})*,\d{2})/g);

            if(amt && amt.length){

                const amount = amt[amt.length-1]
                    .replace(/\./g,'')
                    .replace(',','.');

                bItems.push({
                    type:'expense',
                    desc:line.substring(0,40),
                    amount:parseFloat(amount),
                    category:'7000',
                    date:new Date().toISOString().split('T')[0]
                });
            }
        }

    });

    renderBankItems();
}

function renderBankItems(){

    const wrap = document.getElementById('bitems');

    wrap.innerHTML = '';

    if(!bItems.length){
        wrap.innerHTML = '<p style="color:red">Wax xog ah lama helin</p>';
        return;
    }

    bItems.forEach((i,idx)=>{

        wrap.innerHTML += `
        <div class="oi sel" onclick="this.classList.toggle('sel');checkBtns()">

            <div class="oii">

                <div class="nm" style="color:${i.type==='income'?'#2ecc71':'#ff4757'}">
                    ${i.desc}
                </div>

                <small>
                    ${i.type==='income'?'INNTEKT':'UTGIFT'}
                </small>

            </div>

            <div class="oiamt"
                 style="color:${i.type==='income'?'#2ecc71':'#ff4757'}">

                 ${i.amount} kr

            </div>

        </div>
        `;
    });

    document.getElementById('btn-bi').style.display='block';

    checkBtns();
}

function importBank(){

    const uid = auth.currentUser.uid;

    const sels = document.querySelectorAll('#bitems .oi.sel');

    let saved = 0;

    sels.forEach((el,idx)=>{

        const item = bItems[idx];

        db.ref('entries/'+uid).push(item);

        saved++;
    });

    alert(saved + ' transaksjoner waa la keydiyay');

    document.getElementById('bitems').innerHTML='';

    document.getElementById('btn-bi').style.display='none';
}
</script>
