<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Salaad App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #334155; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--blue); color: white; }
        .item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border-left: 6px solid; }
        .plus { border-left-color: var(--green); color: var(--green); }
        .minus { border-left-color: var(--red); color: var(--red); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-page" class="box">
    <h1 style="color: #f1c40f;">🚖 Taxi Salaad</h1>
    <input type="email" id="email" placeholder="Emailkaaga">
    <input type="password" id="pass" placeholder="Password (6+ xaraf)">
    <button class="btn-blue" onclick="handleAuth('login')">Login (Giriş)</button>
    <button style="background:#334155; color:white;" onclick="handleAuth('reg')">Create New Account</button>
</div>

<div id="app-page" class="hidden">
    <div class="box">
        <h2 id="u-name"></h2>
        <input type="text" id="cat" placeholder="Maxay tahay? (Tusaale: Shidaal)">
        <input type="number" id="amount" placeholder="Lacagta (kr)">
        <button class="btn-blue" onclick="saveData()">Keydi Xogta</button>
        <button style="background:var(--red);" onclick="location.reload()">Logout</button>
    </div>
    <div id="list" style="margin-top:20px;"></div>
</div>

<script>
    // XALKA KAMA DAMBEYSTA AH: 
    // DHEX DHIG API KEY-GAAGA CALAAMADAHA "" EE HOOSE
 // Nuqulkan waa midka cusub ee ku shaqaynaya Firebase SDK v7.20.0+
const firebaseConfig = {
  apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
  authDomain: "mohamed-salad-transport.firebaseapp.com",
  databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mohamed-salad-transport",
  storageBucket: "mohamed-salad-transport.firebasestorage.app",
  messagingSenderId: "608716442795",
  appId: "1:608716442795:web:34cafc1a23316664717bee",
  measurementId: "G-YN3RKFE194"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
};
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function handleAuth(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(type === 'reg') auth.createUserWithEmailAndPassword(e,p).then(s => showApp()).catch(err => alert(err.message));
        else auth.signInWithEmailAndPassword(e,p).then(s => showApp()).catch(err => alert("Khalad: Hubi Emailka iyo Passwordka"));
    }

    function showApp() {
        document.getElementById('auth-page').className = 'hidden';
        document.getElementById('app-page').className = '';
        document.getElementById('u-name').innerText = "Soo dhowaad, " + auth.currentUser.email.split('@')[0];
        loadData();
    }

    function saveData() {
        const c = document.getElementById('cat').value;
        const a = document.getElementById('amount').value;
        if(c && a) {
            db.ref('user_data/' + auth.currentUser.uid).push({
                category: c, amount: a, date: new Date().toLocaleDateString()
            });
            document.getElementById('cat').value = "";
            document.getElementById('amount').value = "";
        }
    }

    function loadData() {
        db.ref('user_data/' + auth.currentUser.uid).on('value', snap => {
            const l = document.getElementById('list'); l.innerHTML = "";
            snap.forEach(ch => {
                const d = ch.val();
                l.innerHTML += `<div class="item plus"><span>${d.category} (${d.date})</span><b>${d.amount} kr</b></div>`;
            });
        });
    }
</script>
</body>
</html>
