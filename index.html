<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Full System</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .auth-container { padding: 30px; text-align: center; max-width: 400px; margin: 40px auto; background: var(--card); border-radius: 15px; }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .stat-box { background: var(--card); border: 1.5px solid; border-radius: 12px; padding: 12px; text-align: center; }
        .summary-card { background: var(--card); border: 3px solid var(--yellow); border-radius: 20px; margin: 15px; padding: 20px; text-align: center; }

        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 0 15px 12px 15px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; }
        .entry-actions { display: flex; gap: 10px; color: #64748b; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }
        
        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; box-sizing: border-box; }
        .btn-save { padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 14px; width: 100%; }
        .flex-btns { display: flex; gap: 10px; margin-top: 10px; }

        /* Profile Styles */
        .profile-pic-container { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; border: 3px solid var(--yellow); border-radius: 50%; overflow: hidden; background: #334155; }
        .profile-pic-container img { width: 100%; height: 100%; object-fit: cover; }
        .profile-pic-container i { font-size: 40px; line-height: 100px; color: #94a3b8; }
    </style>
</head>
<body>

<div id="auth-page" class="auth-container">
    <h2 style="color:var(--yellow)">LOGG INN</h2>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon" onclick="toggleTheme()" style="color:var(--yellow); cursor:pointer"></i>
        <div>
            <span onclick="updateLang('no')">🇳🇴</span>
            <span onclick="updateLang('so')">🇸🇴</span>
            <span onclick="updateLang('en')">🇺🇸</span>
            <span onclick="updateLang('ar')">🇸🇦</span>
        </div>
    </div>

    <div id="page-dash" class="page">
        <div class="header-title"><span id="user-display-name">Mohamed Salad</span></div>
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small id="l-inc">INNTEKT</small><br><b id="total-income">0 kr</b></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small id="l-exp">UTGIFTER</small><br><b id="total-expense">0 kr</b></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small id="l-net">NETTO</small><br><b id="total-netto">0 kr</b></div>
        </div>
        <div class="summary-card">
            <small id="l-res">TOTAL RESULTAT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        <div id="entries-list"></div>
    </div>

    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="header-title" id="l-add-title">REGISTRER DATA</div>
        <input type="date" id="entry-date">
        <select id="entry-category">
            <optgroup label="DRIFTSINNTEKTER">
                <option value="3030">3030 - Kjøreinntekter, lav sats</option>
                <option value="3031">3031 - Kjøreinntekter kontant</option>
                <option value="3032">3032 - Kjøreinntekter NAV</option>
                <option value="3033">3033 - Kjøreinntekter skole</option>
                <option value="3039">3039 - Bomtur</option>
                <option value="3110">3110 - Tips</option>
            </optgroup>
            <optgroup label="DRIFTSKOSTNADER">
                <option value="5000">5000 - Lønn til ansatte</option>
                <option value="5400">5400 - Arbeidsgiveravgift</option>
                <option value="5920">5920 - Yrkesskadeforsikring</option>
                <option value="6010">6010 - Avskrivning</option>
                <option value="6705">6705 - Regnskapshonorar</option>
                <option value="6755">6755 - Sentralavgift</option>
                <option value="6800">6800 - Kontorrekvisita</option>
                <option value="6900">6900 - Telefon</option>
                <option value="7000">7000 - Drivstoff</option>
                <option value="7020">7020 - Vedlikehold</option>
                <option value="7040">7040 - Forsikring</option>
                <option value="7770">7770 - Bankgebyr</option>
                <option value="7798">7798 - Annen kostnad</option>
            </optgroup>
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        
        <div class="flex-btns">
            <button class="btn-save" style="background:var(--green); flex:1" onclick="saveEntry('income')" id="l-save-inc">LAGRE INNTEKT</button>
            <button class="btn-save" style="background:var(--red); flex:1" onclick="saveEntry('expense')" id="l-save-exp">LAGRE UTGIFT</button>
        </div>
    </div>

    <div id="page-scan" class="page" style="display:none; padding: 20px; text-align: center;">
        <div class="header-title">SMART SCAN</div>
        <div style="border: 2px dashed var(--border); padding: 40px; border-radius: 15px; margin-bottom: 20px;">
            <i class="fas fa-camera" style="font-size: 40px; color: var(--blue);"></i>
            <p>Scan kvittering</p>
            <input type="file" id="scan-input" accept="image/*" style="opacity: 0; position: absolute; width: 100px; height: 100px; cursor: pointer;">
        </div>
        <p id="scan-status" style="font-size: 12px; color: var(--yellow);"></p>
    </div>

    <div id="page-profile" class="page" style="display:none; padding: 20px; text-align: center;">
        <div class="header-title">PROFILE</div>
        <div class="profile-pic-container" onclick="document.getElementById('profile-upload').click()">
            <img id="profile-img" src="" style="display:none">
            <i id="profile-placeholder" class="fas fa-user"></i>
            <input type="file" id="profile-upload" style="display:none" accept="image/*" onchange="uploadProfilePic(this)">
        </div>
        <h3 id="profile-name">Mohamed Salad</h3>
        <button class="btn-save" style="background:var(--blue); margin-bottom: 10px;" onclick="changePassword()">Change Password</button>
        <button class="btn-save" style="background:var(--red);" onclick="logout()">Logout</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-th-large"></i><br><span id="n-dash">Oversikt</span></div>
        <div class="nav-item" id="nav-scan" onclick="showTab('scan')"><i class="fas fa-camera"></i><br><span>Scanner</span></div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br><span id="n-add">Legg til</span></div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user"></i><br><span>Profile</span></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE", authDomain: "mohamed-salad-transport.firebaseapp.com", databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mohamed-salad-transport", storageBucket: "mohamed-salad-transport.firebasestorage.app", appId: "1:608716442795:web:34cafc1a23316664717bee" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const storage = firebase.storage();

    function saveEntry(type) {
        const desc = document.getElementById('entry-desc').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const cat = document.getElementById('entry-category').value;
        const dateInput = document.getElementById('entry-date').value;
        if(!desc || isNaN(amt) || !dateInput) return alert("Fadlan buuxi meelaha banaan!");

        const dateObj = new Date(dateInput);
        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            desc, amt, subCat: cat, mainCat: type,
            date: dateObj.toLocaleDateString('no-NO'),
            filterKey: (dateObj.getMonth()+1) + "-" + dateObj.getFullYear()
        });
        document.getElementById('entry-desc').value = "";
        document.getElementById('entry-amt').value = "";
        showTab('dash');
    }

    function deleteEntry(id) {
        if(confirm("Ma hubtaa inaad tirtirto?")) {
            db.ref('users/' + auth.currentUser.uid + '/entries/' + id).remove();
        }
    }

    function loadData() {
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            let ti=0, te=0;
            const list = document.getElementById('entries-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const v = child.val();
                const id = child.key;
                if(v.mainCat === 'income') ti += v.amt; else te += v.amt;
                list.innerHTML += `
                <div class="entry-card" style="border-left-color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}">
                    <div><b>${v.desc}</b><br><small>${v.subCat} | ${v.date}</small></div>
                    <div style="text-align:right">
                        <div style="color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}"><b>${v.amt.toLocaleString()} kr</b></div>
                        <div class="entry-actions">
                            <i class="fas fa-trash" onclick="deleteEntry('${id}')"></i>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('total-income').innerText = ti.toLocaleString() + " kr";
            document.getElementById('total-expense').innerText = te.toLocaleString() + " kr";
            document.getElementById('total-netto').innerText = (ti - te).toLocaleString() + " kr";
            document.getElementById('res-total').innerText = (ti - te).toLocaleString() + " kr";
        });
    }

    function uploadProfilePic(input) {
        const file = input.files[0];
        if(!file) return;
        const ref = storage.ref('users/' + auth.currentUser.uid + '/profile.jpg');
        ref.put(file).then(() => ref.getDownloadURL().then(url => {
            db.ref('users/' + auth.currentUser.uid + '/profile/photo').set(url);
            document.getElementById('profile-img').src = url;
            document.getElementById('profile-img').style.display = 'block';
            document.getElementById('profile-placeholder').style.display = 'none';
        }));
    }

    function changePassword() {
        const newPass = prompt("Geli password-ka cusub:");
        if(newPass && newPass.length >= 6) {
            auth.currentUser.updatePassword(newPass).then(() => alert("Password-ka waa la bedelay!")).catch(e => alert(e.message));
        }
    }

    const dict = {
        so: { inc: "DAKHLI", exp: "KHARASH", net: "NETTO", res: "NATIIJADA GUUD", add: "GELI XOGTA", dash: "Guudmar", nadd: "Geli Xog", exit: "Ka Bax", saveInc: "KEYDI DAKHLI", saveExp: "KEYDI KHARASH" },
        no: { inc: "INNTEKT", exp: "UTGIFTER", net: "NETTO", res: "TOTAL RESULTAT", add: "REGISTRER DATA", dash: "Oversikt", nadd: "Legg til", exit: "Logg ut", saveInc: "LAGRE INNTEKT", saveExp: "LAGRE UTGIFT" }
    };

    function updateLang(l) {
        const d = dict[l] || dict['no'];
        document.getElementById('l-inc').innerText = d.inc;
        document.getElementById('l-exp').innerText = d.exp;
        document.getElementById('l-net').innerText = d.net;
        document.getElementById('l-res').innerText = d.res;
        document.getElementById('l-add-title').innerText = d.add;
        document.getElementById('n-dash').innerText = d.dash;
        document.getElementById('n-add').innerText = d.nadd;
        document.getElementById('n-exit').innerText = d.exit;
        document.getElementById('l-save-inc').innerText = d.saveInc;
        document.getElementById('l-save-exp').innerText = d.saveExp;
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display='none';
            document.getElementById('main-app').style.display='block';
            document.getElementById('entry-date').valueAsDate = new Date();
            db.ref('users/' + user.uid + '/profile/photo').on('value', s => {
                if(s.val()) {
                    document.getElementById('profile-img').src = s.val();
                    document.getElementById('profile-img').style.display = 'block';
                    document.getElementById('profile-placeholder').style.display = 'none';
                }
            });
            loadData();
        } else {
            document.getElementById('auth-page').style.display='block';
            document.getElementById('main-app').style.display='none';
        }
    });

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
