<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root{--bg:#0f172a;--card:#1e293b;--y:#f1c40f;--g:#2ecc71;--r:#ff4757;--b:#3b82f6;--t:#f8fafc;--br:#334155}
        .lt{--bg:#f1f5f9;--card:#fff;--t:#1e293b;--br:#cbd5e1}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--t);margin:0;padding-bottom:90px}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--card);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:100}
        .authbox{padding:28px;text-align:center;max-width:400px;margin:40px auto;background:var(--card);border-radius:15px}
        .htitle{text-align:center;color:var(--y);font-weight:bold;padding:14px 0 8px;font-size:16px;text-transform:uppercase;letter-spacing:1px}

        /* Stats */
        .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
        .sbox{background:var(--card);border:1.5px solid;border-radius:12px;padding:12px;text-align:center}
        .sbox small{font-size:9px;display:block;margin-bottom:5px;font-weight:bold}
        .sbox span{font-size:14px;font-weight:bold}
        .sumcard{background:var(--card);border:2px solid var(--y);border-radius:18px;margin:8px 10px;padding:18px;text-align:center}
        .sumcard small{font-size:10px;color:#94a3b8;letter-spacing:1px;text-transform:uppercase}
        .sumcard h1{margin:6px 0 0;font-size:26px}

        /* Entry cards */
        .ecard{background:var(--card);border-radius:13px;padding:13px 15px;margin:0 10px 10px;border-left:6px solid;display:flex;justify-content:space-between;align-items:center;gap:10px}
        .einfo{flex:1;min-width:0}
        .einfo .etitle{font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .einfo .esub{font-size:11px;color:#94a3b8;margin-top:2px}
        .eact{display:flex;gap:12px;align-items:center;flex-shrink:0}
        .eamt{font-weight:bold;font-size:14px;white-space:nowrap}
        .eact i{cursor:pointer;color:#64748b;font-size:14px}
        .eact i:hover{color:var(--y)}

        /* Navbar */
        .navbar{position:fixed;bottom:0;width:100%;background:var(--card);display:flex;justify-content:space-around;padding:10px 0 14px;border-top:1px solid var(--br);z-index:200}
        .ni{text-align:center;color:#64748b;font-size:10px;cursor:pointer;flex:1}
        .ni.on{color:var(--y)}
        .ni i{display:block;font-size:19px;margin-bottom:2px}

        /* Form */
        input,select{width:100%;padding:14px;border-radius:10px;border:1px solid var(--br);background:var(--bg);color:var(--t);margin-bottom:13px;font-size:14px;font-family:inherit;-webkit-appearance:none}
        .btn{width:100%;padding:16px;border-radius:12px;border:none;font-weight:bold;cursor:pointer;color:#fff;font-size:14px;font-family:inherit}
        .btn2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}

        /* PDF Upload box */
        .pdfbox{background:var(--card);border:2px solid var(--b);border-radius:15px;padding:16px;margin-bottom:16px}
        .pdfbox h4{color:var(--b);margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:1px}
        .uzone{border:2px dashed var(--br);border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:12px;display:block;width:100%;background:transparent;font-family:inherit}
        .uzone:hover{border-color:var(--b);background:rgba(59,130,246,.05)}
        .uzone i{font-size:32px;color:#64748b;display:block;margin-bottom:8px}
        .uzone .uz-title{font-size:15px;font-weight:bold;color:var(--b);margin-bottom:4px}
        .uzone p{font-size:12px;color:#64748b;margin:2px 0}
        .uzone .uz-btn{display:inline-flex;align-items:center;gap:6px;background:var(--b);color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;margin-top:10px}

        /* Status */
        #bstat{background:#111827;border:2px solid var(--b);border-radius:10px;padding:11px;text-align:center;font-size:13px;font-weight:bold;color:var(--b);display:none;margin-bottom:12px}

        /* Import preview */
        .impctrl{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;color:#94a3b8}
        .impctrl button{background:none;border:1px solid var(--br);border-radius:7px;color:var(--t);padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit}
        .impctrl button:hover{border-color:var(--b);color:var(--b)}
        .bitem{background:var(--bg);border:1.5px solid var(--br);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:.15s}
        .bitem.sel{border-color:var(--g);background:rgba(46,204,113,.06)}
        .bitem-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
        .bitem-desc{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .bitem-amt{font-weight:700;font-size:14px;white-space:nowrap;flex-shrink:0}
        .bitem-meta{font-size:11px;color:#94a3b8;margin-top:3px;display:flex;gap:8px;align-items:center}
        .typebadge{font-size:10px;font-weight:bold;padding:1px 7px;border-radius:20px}
        .inc-badge{background:rgba(46,204,113,.15);color:var(--g)}
        .exp-badge{background:rgba(255,71,87,.15);color:var(--r)}
        .bitem select{margin-top:7px;width:100%;padding:6px 9px;border:1px solid var(--br);border-radius:6px;font-size:11px;background:var(--bg);color:var(--t);font-family:inherit}

        /* Report */
        .rtbl{width:100%;border-collapse:collapse;font-size:12px}
        .rtbl th{background:var(--br);color:var(--y);padding:9px 8px;text-align:left}
        .rtbl td{padding:8px;border-bottom:1px solid var(--br)}

        #fpdfi{display:none}
        .ha{filter:blur(6px);user-select:none}
    </style>
</head>
<body>

<!-- AUTH -->
<div id="pg-auth" style="display:none">
<div class="authbox">
    <h2 style="color:var(--y);margin-bottom:4px">🚕 TRANSPORT PRO</h2>
    <p style="color:#94a3b8;font-size:12px;margin-bottom:18px">Mohamed Salad Transport</p>
    <input type="email" id="em" placeholder="E-post">
    <input type="password" id="pw" placeholder="Passord">
    <button class="btn" style="background:var(--b);margin-bottom:10px" onclick="doLogin()">LOGG INN</button>
    <p style="color:var(--y);cursor:pointer;font-size:12px" onclick="forgotPw()">Glemt passord?</p>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div class="topbar">
    <i class="fas fa-moon" style="cursor:pointer;font-size:16px" onclick="toggleTheme()"></i>
    <span id="uname" style="font-weight:bold;font-size:14px">...</span>
    <button onclick="deleteAll()" style="background:none;border:1px solid var(--r);border-radius:8px;color:var(--r);padding:5px 11px;font-size:11px;font-weight:bold;cursor:pointer">
        <i class="fas fa-trash"></i> Slett alle

</div>

<!-- DASHBOARD -->
<div id="pg-dash" class="pg">
    <div class="sgrid">
        <div class="sbox" style="border-color:var(--g);color:var(--g)"><small>INNTEKT</small><span id="s-inc">0 kr</span></div>
        <div class="sbox" style="border-color:var(--r);color:var(--r)"><small>UTGIFTER</small><span id="s-exp">0 kr</span></div>
        <div class="sbox" style="border-color:var(--b);color:var(--b)"><small>NETTO</small><span id="s-net">0 kr</span></div>
    </div>
    <div class="sumcard">
        <small>RESULTAT FØR SKATT (NETTO)</small>
        <h1 id="s-tot" style="color:var(--g)">0 kr</h1>
    </div>
    <div id="elist" style="margin-top:6px"></div>
</div>

<!-- ADD / IMPORT -->
<div id="pg-add" class="pg" style="display:none;padding:15px">
    <div class="htitle">REGISTRER DATA</div>

    <!-- DNB PDF Import -->
    <div class="pdfbox">
        <h4><i class="fas fa-university"></i> DNB Bank PDF Import</h4>
        <div id="bstat"></div>

        <label for="fpdfi" class="uzone">
            <i class="fas fa-file-pdf" style="color:#dc2626"></i>
            <div class="uz-title">DNB PDF Kontoutskrift</div>
            <p>Velg PDF-fil fra nettbanken</p>
            <p style="font-size:11px;color:#64748b">Alle transaksjoner leses automatisk</p>
            <div class="uz-btn"><i class="fas fa-upload"></i> Velg PDF-fil</div>
        </label>
        <input type="file" id="fpdfi" accept=".pdf,application/pdf" onchange="handlePDF(this)">

        <!-- Preview list -->
        <div id="bprev" style="display:none">
            <div class="impctrl">
                <span id="bcount" style="font-weight:600"></span>
                <div style="display:flex;gap:6px">
                    <button onclick="bAll()">Velg alle</button>
                    <button onclick="bNone()">Fjern valg</button>
                </div>
            </div>
            <div id="bitems" style="max-height:400px;overflow-y:auto"></div>
            <button class="btn" id="btn-lagre" style="background:var(--g);display:none;margin-top:10px" onclick="lagreValgte()">
                <i class="fas fa-save"></i> LAGRE VALGTE
            </button>
        </div>
    </div>

    <!-- Manual -->
    <div style="border-top:1px solid var(--br);padding-top:14px">
    <div class="htitle" style="font-size:13px;padding:4px 0 10px">MANUELL REGISTRERING</div>
    <input type="hidden" id="eid">
    <input type="date" id="edate">
    <select id="ecat">
        <optgroup label="INNTEKT">
            <option value="3030">3030 - Kjøreinntekter (Agder Taxi)</option>
            <option value="3031">3031 - Kjøreinntekter kontant</option>

        </optgroup>
        <optgroup label="UTGIFTER">
            <option value="5000">5000 - Lønn til ansatte</option>
            <option value="5400">5400 - Skatt / Arbeidsgiveravgift</option>
            <option value="6010">6010 - Avskrivning</option>
            <option value="6755">6755 - Sentralavgift</option>
            <option value="6900">6900 - Telefon</option>
            <option value="6907">6907 - Datakommunikasjon</option>
            <option value="7000">7000 - Drivstoff / Lading</option>
            <option value="7020">7020 - Vedlikehold</option>
            <option value="7040">7040 - Forsikring</option>
            <option value="7140">7140 - Reisekostnad</option>
            <option value="7400">7400 - Kontingent</option>
            <option value="7770">7770 - Bank og kortgebyr</option>
            <option value="7790">7790 - Annen kostnad</option>
            <option value="7797">7797 - Kontoutskrift / Overføring</option>
        </optgroup>
    </select>
    <input type="text" id="edesc" placeholder="Beskrivelse">
    <input type="number" id="eamt" placeholder="Beløp (kr)" step="0.01">
    <div class="btn2">
        <button class="btn" style="background:var(--g)" onclick="saveE('income')">LAGRE INNTEKT</button>
        <button class="btn" style="background:var(--r)" onclick="saveE('expense')">LAGRE UTGIFT</button>
    </div>
    </div>
</div>

<!-- REPORTS -->
<div id="pg-reports" class="pg" style="display:none;padding:15px">
    <div class="htitle">REGNSKAP REPORTS</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn" style="background:var(--g);width:auto;padding:10px 18px;font-size:12px" onclick="dlCSV()"><i class="fas fa-file-csv"></i> CSV</button>
        <button class="btn" style="background:var(--r);width:auto;padding:10px 18px;font-size:12px" onclick="dlPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
    </div>
    <table class="rtbl">
        <thead><tr><th>Dato</th><th>Konto</th><th>Beskrivelse</th><th>Beløp</th></tr></thead>
        <tbody id="rtbody"></tbody>
    </table>
</div>

<!-- PROFILE -->
<div id="pg-profile" class="pg" style="display:none;padding:15px;text-align:center">
    <div class="htitle">MIN PROFIL</div>
    <h3 id="pname">Bruker</h3>
    <p id="pemail" style="color:#94a3b8;font-size:13px;margin-bottom:18px"></p>
    <button class="btn" style="background:var(--r)" onclick="doLogout()">LOGG UT</button>
</div>

<div class="navbar">
    <div class="ni on" id="ni-dash" onclick="showPg('dash')"><i class="fas fa-chart-line"></i>Dash</div>
    <div class="ni" id="ni-add" onclick="showPg('add')"><i class="fas fa-plus"></i>Add PDF</div>
    <div class="ni" id="ni-reports" onclick="showPg('reports')"><i class="fas fa-file-alt"></i>Reports</div>
    <div class="ni" id="ni-profile" onclick="showPg('profile')"><i class="fas fa-user"></i>Profil</div>
</div>
</div><!-- /app -->

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

firebase.initializeApp({
    apiKey:"AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
    authDomain:"mohamed-salad-transport.firebaseapp.com",
    databaseURL:"https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"mohamed-salad-transport",
    storageBucket:"mohamed-salad-transport.firebasestorage.app",
    appId:"1:608716442795:web:34cafc1a23316664717bee"
});
const db=firebase.database(),auth=firebase.auth();
let entries=[],bItems=[];

const E=id=>document.getElementById(id);
const V=id=>E(id).value;
const T=(id,v)=>{if(E(id))E(id).textContent=v;};
const fmt=n=>n.toLocaleString('nb-NO',{minimumFractionDigits:2,maximumFractionDigits:2})+' kr';

// ── AUTH ──
auth.onAuthStateChanged(u=>{
    if(u){
        E('pg-auth').style.display='none';E('app').style.display='block';
        T('uname',u.displayName||u.email);T('pname',u.displayName||'Bruker');T('pemail',u.email);
        loadData();
    }else{E('pg-auth').style.display='block';E('app').style.display='none';}
});
function doLogin(){auth.signInWithEmailAndPassword(V('em').trim(),V('pw')).catch(err=>alert(err.message));}
function forgotPw(){const e=V('em').trim();if(!e)return alert('Skriv inn e-post!');auth.sendPasswordResetEmail(e).then(()=>alert('Lenke sendt!')).catch(err=>alert(err.message));}
function doLogout(){auth.signOut();}
function toggleTheme(){document.body.classList.toggle('lt');}

// ── NAV ──
function showPg(pg){
    document.querySelectorAll('.pg').forEach(p=>p.style.display='none');
    document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
    E('pg-'+pg).style.display='block';
    E('ni-'+pg)?.classList.add('on');
}

// ── DATA ──
function loadData(){
    const u=auth.currentUser;if(!u)return;
    db.ref('entries/'+u.uid).on('value',snap=>{
        entries=[];
        snap.forEach(c=>entries.push({id:c.key,...c.val()}));
        entries.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
        renderDash();renderRep();
    });
}

function renderDash(){
    let inc=0,exp=0;
    const el=E('elist');el.innerHTML='';
    entries.forEach(e=>{
        const a=parseFloat(e.amount)||0;
        if(e.type==='income')inc+=a;else exp+=a;
        const isI=e.type==='income',col=isI?'var(--g)':'var(--r)';
        const c=document.createElement('div');c.className='ecard';c.style.borderLeftColor=col;
        const desc=(e.description||'').length>42?(e.description||'').substring(0,42)+'...':e.description||'—';
        c.innerHTML=`
        <div class="einfo">
            <div class="etitle">${e.category} · ${desc}</div>
            <div class="esub">📅 ${e.date||'—'}</div>
        </div>
        <div class="eact">
            <span class="eamt" style="color:${col}">${isI?'+':'−'}${fmt(a)}</span>
            <i class="fas fa-edit" onclick="editE('${e.id}')"></i>
            <i class="fas fa-trash" onclick="delE('${e.id}')"></i>
        </div>`;
        el.appendChild(c);
    });
    const net=inc-exp;
    T('s-inc',fmt(inc));T('s-exp',fmt(exp));T('s-net',fmt(net));T('s-tot',fmt(net));
    E('s-net').style.color=net>=0?'var(--g)':'var(--r)';
    E('s-tot').style.color=net>=0?'var(--g)':'var(--r)';
}

function renderRep(){
    const tb=E('rtbody');tb.innerHTML='';
    entries.forEach(e=>{
        const a=parseFloat(e.amount)||0,isI=e.type==='income';
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${e.date||''}</td><td>${e.category||''}</td><td>${e.description||''}</td>
        <td style="color:${isI?'var(--g)':'var(--r)'};font-weight:bold">${isI?'+':'−'}${fmt(a)}</td>`;
        tb.appendChild(tr);
    });
}

// ── CRUD ──
function saveE(type){
    const u=auth.currentUser;if(!u)return;
    const eid=V('eid');
    const entry={date:V('edate'),category:V('ecat'),description:V('edesc'),amount:parseFloat(V('eamt'))||0,type};
    if(!entry.date||!entry.amount)return alert('Fyll inn dato og beløp!');
    const ref=eid?db.ref('entries/'+u.uid+'/'+eid):db.ref('entries/'+u.uid).push();
    ref.set(entry).then(()=>{E('eid').value='';E('edate').value='';E('edesc').value='';E('eamt').value='';showPg('dash');}).catch(err=>alert(err.message));
}
function delE(id){if(!confirm('Slett?'))return;db.ref('entries/'+auth.currentUser.uid+'/'+id).remove();}
function editE(id){
    const e=entries.find(x=>x.id===id);if(!e)return;
    E('eid').value=id;E('edate').value=e.date;E('ecat').value=e.category;
    E('edesc').value=e.description||'';E('eamt').value=e.amount;showPg('add');
}
function deleteAll(){
    const u=auth.currentUser;if(!u)return;
    const n=entries.length;if(!n)return alert('Ingen transaksjoner!');
    if(!confirm('⚠️ Slett alle '+n+' transaksjoner?\nKan ikke angres!'))return;
    db.ref('entries/'+u.uid).remove().then(()=>alert('✅ '+n+' slettet!')).catch(err=>alert(err.message));
}

// ════════════════════════════════════════════════════
//  DNB PDF PARSER v3 — Column-position based
//  Reads EVERY transaction individually with correct amounts
// ════════════════════════════════════════════════════

async function handlePDF(inp){
    const f=inp.files[0];if(!f)return;
    showStat('📄 Leser PDF...');bItems=[];
    try{
        const buf=await f.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:buf}).promise;
        showStat('📄 '+pdf.numPages+' sider — analyserer...');
        // Collect ALL words with exact x,y positions from every page
        const allWords=[];
        for(let p=1;p<=pdf.numPages;p++){
            const pg=await pdf.getPage(p);
            const con=await pg.getTextContent();
            const vp=pg.getViewport({scale:1});
            con.items.forEach(it=>{
                if(!it.str||!it.str.trim())return;
                allWords.push({
                    text:it.str.trim(),
                    x0:it.transform[4],
                    x1:it.transform[4]+it.width,
                    top:vp.height-it.transform[5],
                    page:p,
                    pgW:vp.width
                });
            });
        }
        parseDNBv4(allWords);
    }catch(err){showStat('❌ '+err.message);console.error(err);}
    inp.value='';
}

function parseDNBv4(allWords){
    bItems=[];
    if(!allWords.length){showStat('❌ Tom PDF');return;}

    // Group words into lines by page+top (bucket every 3pt)
    const lineMap={};
    for(const w of allWords){
        const key=w.page+'_'+Math.round(w.top/3)*3;
        if(!lineMap[key])lineMap[key]={page:w.page,top:w.top,words:[]};
        lineMap[key].words.push(w);
    }
    const lines=Object.values(lineMap).sort((a,b)=>a.page!==b.page?a.page-b.page:a.top-b.top);
    for(const ln of lines) ln.words.sort((a,b)=>a.x0-b.x0);

    // Auto-detect "Ut av konto" and "Inn på konto" column x-positions
    let utX=310, innX=390;  // DNB default
    for(const ln of lines){
        const txt=ln.words.map(w=>w.text).join(' ');
        if(/ut av konto/i.test(txt)){
            const idx=ln.words.findIndex(w=>/^ut$/i.test(w.text));
            if(idx>=0) utX=ln.words[idx].x0;
            const idx2=ln.words.findIndex(w=>/^inn$/i.test(w.text));
            if(idx2>=0) innX=ln.words[idx2].x0;
            break;
        }
    }

    const dateRe=/^\d{2}\.\d{2}\.\d{2,4}$/;
    const amtRe=/^\d{1,3}(?:[.\s]\d{3})*,\d{2}$/;

    // Skip patterns
    const SKIP=/^(dato|tekst|saldo|side|rentedato|arkivref|bruk|bokf|dronning|pb\.|oslo|telefon|foretaks|dnb\.no|kontoutskrift|internasjonalt|iban|bic|forts\.|renter|innskudd|kreditt|opptjente|skyldige|provisjon|rapportering|henhold|lovdata|returadresse|utskrifts|mohammed|mohamed|møllebakken|4841|arendal|ny saldo|saldo forrige|bedriftskonto)/i;

    const txGroups=[];let cur=null;

    for(const ln of lines){
        const lineText=ln.words.map(w=>w.text).join(' ');
        if(SKIP.test(lineText.trim()))continue;

        // Find date words at left side
        const leftDates=ln.words.filter(w=>dateRe.test(w.text)&&w.x0<utX*0.45);

        if(leftDates.length>=2){
            // New transaction starts
            if(cur)txGroups.push(cur);
            leftDates.sort((a,b)=>a.x0-b.x0);
            const bokDate=convertDate(leftDates[1].text)||convertDate(leftDates[0].text);

            // Description words: left of utX, not dates, not arkivref numbers
            const descW=ln.words.filter(w=>
                w.x1<utX &&
                !dateRe.test(w.text) &&
                !/^\d{6,}$/.test(w.text)
            );
            const desc=descW.map(w=>w.text).join(' ').trim();

            // Amount words: between utX and innX (UT column)
            const utW=ln.words.filter(w=>w.x0>=utX&&w.x0<innX-5&&amtRe.test(w.text.replace(/\s/g,'')));
            // Amount words: right of innX (INN column)
            const innW=ln.words.filter(w=>w.x0>=innX-5&&amtRe.test(w.text.replace(/\s/g,'')));

            const utAmt=utW.length?norNum(utW.map(w=>w.text).join('')):0;
            const innAmt=innW.length?norNum(innW.map(w=>w.text).join('')):0;

            cur={date:bokDate,descParts:[desc],utAmt,innAmt};

        }else if(cur){
            // Continuation line
            const descW=ln.words.filter(w=>
                w.x1<utX &&
                !dateRe.test(w.text) &&
                !/^\d{6,}$/.test(w.text) &&
                !/^\d{2}\.\d{2}\.\d{2}/.test(w.text)
            );
            if(descW.length){
                const cont=descW.map(w=>w.text).join(' ').trim();
                if(cont&&!/^\d+$/.test(cont)) cur.descParts.push(cont);
            }
            // Pick up missing amounts from continuation lines
            if(cur.utAmt===0){
                const utW=ln.words.filter(w=>w.x0>=utX&&w.x0<innX-5&&amtRe.test(w.text.replace(/\s/g,'')));
                if(utW.length) cur.utAmt=norNum(utW.map(w=>w.text).join(''));
            }
            if(cur.innAmt===0){
                const innW=ln.words.filter(w=>w.x0>=innX-5&&amtRe.test(w.text.replace(/\s/g,'')));
                if(innW.length) cur.innAmt=norNum(innW.map(w=>w.text).join(''));
            }
        }
    }
    if(cur)txGroups.push(cur);

    // Build bItems from txGroups
    const seen=new Set();
    for(const tx of txGroups){
        if(!tx.date)continue;
        const desc=[...new Set(tx.descParts)].filter(s=>s.length>0).join(' ').replace(/\s+/g,' ').trim();
        if(!desc||desc.length<2)continue;
        if(/^(saldo|kontoutskrift|bedriftskonto)/i.test(desc))continue;

        let finalAmt=0, finalType='expense';
        if(tx.innAmt>0&&tx.utAmt<=0){finalAmt=tx.innAmt;finalType='income';}
        else if(tx.utAmt>0&&tx.innAmt<=0){finalAmt=tx.utAmt;finalType='expense';}
        else if(tx.innAmt>0&&tx.utAmt>0){
            // Both — use description to decide
            finalType=guessType(desc);
            finalAmt=finalType==='income'?tx.innAmt:tx.utAmt;
        }else continue;

        if(finalAmt<0.01||finalAmt>9999999)continue;

        // Override: Agder Taxi = always income
        if(desc.toLowerCase().includes('agder taxi'))finalType='income';

        const cat=guesscat(desc,finalType);
        const key=tx.date+'|'+finalAmt.toFixed(2)+'|'+desc.substring(0,30);
        if(!seen.has(key)){
            seen.add(key);
            bItems.push({date:tx.date,desc,amount:finalAmt,type:finalType,category:cat});
        }
    }

    if(!bItems.length){showStat('❌ Ingen transaksjoner funnet');return;}
    showStat('✅ '+bItems.length+' transaksjoner funnet!',true);
    renderBItems();
}

function convertDate(s){
    if(!s)return null;
    const m=s.match(/^(\d{2})\.(\d{2})\.(\d{2,4})$/);if(!m)return null;
    const y=m[3].length===2?'20'+m[3]:m[3];
    return`${y}-${m[2]}-${m[1]}`;
}

function norNum(r){
    if(!r)return 0;
    let s=String(r).trim().replace(/\s/g,'');
    s=s.replace(/\./g,'').replace(',','.');
    return parseFloat(s)||0;
}

// parseD = alias for convertDate (backward compatibility)
function parseD(r){
    if(!r)return null;r=r.trim();
    let m=r.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);if(m)return m[3]+'-'+m[2]+'-'+m[1];
    m=r.match(/^(\d{2})\.(\d{2})\.(\d{2})$/);if(m)return'20'+m[3]+'-'+m[2]+'-'+m[1];
    m=r.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return r;
    return null;
}

function guessType(desc){
    const d=(desc||'').toLowerCase();
    if(d.includes('agder taxi'))return'income';
    if(d.includes('skatt')||d.includes('skatteinnkrevin')||d.includes('arbeidsavgift'))return'expense';
    if(d.includes('kamal')||d.includes('haytham')||d.includes('altaieb')||d.includes('salad ahmed'))return'expense';
    if(d.includes('santander')||d.includes('uno-x')||d.includes('nextgentel')||d.includes('autosync'))return'expense';
    if(d.includes('fortum')||d.includes('eviny')||d.includes('lyse')||d.includes('forsikring'))return'expense';
    if(d.includes('vibb')||d.includes('tyholmen')||d.includes('leringsverkstedet')||d.includes('msg cleaning'))return'expense';
    if(d.includes('livsforsikring')||d.includes('kommune'))return'expense';
    if(/^visa/i.test(desc)||d.includes('tesla')||d.includes('wash world')||d.includes('eviny'))return'expense';
    if(d.includes('telenor')||d.includes('telia')||d.includes('shell')||d.includes('circle k'))return'expense';
    if(d.includes('kontoregulering'))return'expense';
    return'expense';
}

// ── Category auto-assign ──
function guesscat(desc,type){
    const d=(desc||'').toLowerCase();
    if(type==='income')return d.includes('agder taxi')?'3030':'3030';
    if(d.includes('tesla')||d.includes('wash world')||d.includes('shell')||d.includes('circle k')||d.includes('uno-x')||d.includes('eviny'))return'7000';
    if(d.includes('forsikring')||d.includes('gjensidige')||d.includes('tryg')||d.includes('livsforsikring')||d.includes('ra forsikring'))return'7040';
    if(d.includes('autosync'))return'7020';
    if(d.includes('telenor')||d.includes('telia')||d.includes('lyse tele'))return'6900';
    if(d.includes('nextgentel'))return'6907';
    if(d.includes('gebyr')||d.includes('kortgebyr')||d.includes('omkostning'))return'7770';
    if(d.includes('skatt')||d.includes('arbeidsavgift')||d.includes('skatteinnkrevin'))return'5400';
    if(d.includes('fortum')||d.includes('eviny'))return'7000';
    if(d.includes('vibb')||d.includes('lyse'))return'7000';
    if(d.includes('arendal kommune')||d.includes('kommune'))return'7400';
    if(d.includes('santander'))return'7790';
    if(d.includes('kontoregulering')||d.includes('til 15'))return'7797';
    if(d.includes('kamal')||d.includes('haytham')||d.includes('altaieb')||d.includes('salad ahmed'))return'5000';
    if(d.includes('tyholmen')||d.includes('leringsverkstedet'))return'7140';
    if(d.includes('msg cleaning'))return'7790';
    return'7790';
}

// ── Render import preview ──
function renderBItems(){
    const con=E('bitems');con.innerHTML='';
    E('bprev').style.display='block';
    T('bcount',bItems.length+' transaksjoner funnet');

    bItems.forEach((item,i)=>{
        const isI=item.type==='income';
        const sign=isI?'+':'−';
        const d=document.createElement('div');d.className='bitem sel';d.id='bi-'+i;

        d.innerHTML=`
        <div class="bitem-top" onclick="toggleBI(${i})" style="cursor:pointer">
            <span class="bitem-desc">${item.desc}</span>
            <span class="bitem-amt" style="color:${isI?'var(--g)':'var(--r)'}">${sign}${fmt(item.amount)}</span>
        </div>
        <div class="bitem-meta">
            <span>📅 ${item.date}</span>
            <span class="typebadge ${isI?'inc-badge':'exp-badge'}">${isI?'↑ Inntekt':'↓ Utgift'}</span>
        </div>
        <select id="bc-${i}" onclick="event.stopPropagation()"
            onchange="bItems[${i}].category=this.value;bItems[${i}].type=parseInt(this.value)<4000?'income':'expense'">${catOptsHTML()}</select>`;

        con.appendChild(d);
        setTimeout(()=>{const s=E('bc-'+i);if(s)s.value=item.category;},0);
    });
    updateBBtn();
}

function toggleBI(i){E('bi-'+i).classList.toggle('sel');updateBBtn();}
function updateBBtn(){
    const n=document.querySelectorAll('#bitems .bitem.sel').length;
    E('btn-lagre').style.display=n>0?'block':'none';
    T('bcount',n+' / '+bItems.length+' valgt');
}
function bAll(){document.querySelectorAll('#bitems .bitem').forEach(el=>el.classList.add('sel'));updateBBtn();}
function bNone(){document.querySelectorAll('#bitems .bitem').forEach(el=>el.classList.remove('sel'));updateBBtn();}

// ── SAVE — batch update with guaranteed unique keys ──
async function lagreValgte(){
    const u=auth.currentUser;if(!u)return;
    const selected=[];
    document.querySelectorAll('#bitems .bitem.sel').forEach(el=>{
        const i=parseInt(el.id.replace('bi-',''));
        if(!isNaN(i)&&bItems[i])selected.push(bItems[i]);
    });
    if(!selected.length){showStat('Ingen valgt!');return;}

    const total=selected.length;
    showStat('⏳ Lagrer '+total+' transaksjoner...');
    E('btn-lagre').disabled=true;

    try{
        const base=Date.now();
        const batch={};
        selected.forEach((item,n)=>{
            const type=parseInt(item.category)<4000?'income':'expense';
            // n makes each key UNIQUE — no duplicates possible
            const key='e'+String(base+n).padStart(16,'0')+'_'+String(n).padStart(5,'0');
            batch[key]={
                date:item.date,
                category:item.category,
                description:item.desc,
                amount:item.amount,
                type
            };
        });
        // ONE single Firebase write — all entries at once
        await db.ref('entries/'+u.uid).update(batch);
        showStat('✅ Alle '+total+' lagret!',true);
        E('bprev').style.display='none';
        bItems=[];
        setTimeout(()=>showPg('dash'),1000);
    }catch(err){
        showStat('❌ '+err.message);
        console.error(err);
    }
    E('btn-lagre').disabled=false;
}

// ── DOWNLOADS ──
function dlCSV(){
    const rows=[['Dato','Konto','Kontonavn','Beskrivelse','Type','Beløp']];
    entries.forEach(e=>rows.push([
        e.date||'',e.category||'',katNavn(e.category),
        (e.description||'').replace(/,/g,' '),
        e.type==='income'?'Inntekt':'Utgift',
        parseFloat(e.amount||0).toFixed(2)
    ]));
    const csv=rows.map(r=>r.join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='regnskap-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
    URL.revokeObjectURL(url);
}
