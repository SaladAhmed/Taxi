<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport PRO</title>
    <style>
        /* CSS-ka Qurxinta */
        :root {
            --bg: #0d0f1a; --bg2: #141726; --bg3: #1c2035;
            --acc: #4f8ef7; --acc-red: #f87171; --txt: #eef0ff; --txt2: #8b93bc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; }
        .screen { display: none; padding: 20px; }
        .active { display: flex; flex-direction: column; }
        
        /* Menu-ga 3-da dhibic */
        .action-menu { position: relative; cursor: pointer; padding: 5px 10px; }
        .dropdown {
            display: none; position: absolute; right: 0; top: 30px;
            background: var(--bg3); border: 1px solid #333; border-radius: 8px;
            z-index: 100; min-width: 120px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .dropdown.show { display: block; }
        .dropdown-item { padding: 10px 15px; font-size: 14px; border-bottom: 1px solid #2a2f4a; }
        .dropdown-item:hover { background: var(--acc); color: white; }
        .delete-opt { color: var(--acc-red); }

        /* Login Card */
        .auth-card { background: var(--bg2); padding: 30px; border-radius: 16px; max-width: 400px; margin: 100px auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg3); border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; background: var(--acc); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .link-text { text-align: center; margin-top: 15px; font-size: 13px; color: var(--txt2); cursor: pointer; }
    </style>
</head>
<body>

<!-- SCREEN: LOGIN -->
<div id="scr-login" class="screen active">
    <div class="auth-card">
        <h2 style="text-align:center">M. SALAD PRO</h2>
        <div id="login-fields">
            <input type="email" id="l-email" placeholder="Email-kaaga">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn" onclick="handleLogin()">Logg Inn</button>
            <p class="link-text" onclick="showScreen('scr-reg')">Ma haysatid koonto? Is-diiwaangeli</p>
        </div>
    </div>
</div>

<!-- SCREEN: REGISTER -->
<div id="scr-reg" class="screen">
    <div class="auth-card">
        <h2 style="text-align:center">Abuur Koonto</h2>
        <input type="email" id="r-email" placeholder="Email cusub">
        <input type="password" id="r-pass" placeholder="Password cusub">
        <button class="btn" onclick="handleRegister()" style="background:#34d399">Diiwaangeli</button>
        <p class="link-text" onclick="showScreen('scr-login')">Horey ayaad u lahayd koonto? Log In</p>
    </div>
</div>

<!-- SCREEN: DASHBOARD (Diiwaanka) -->
<div id="scr-dash" class="screen">
    <h3>Diiwaanka Gaadiidka</h3>
    <div id="data-list">
        <!-- Halkan xogta ayaa ku soo dhici doonta -->
        <div style="background:var(--bg2); padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div>
                <strong>Faktura #102</strong><br>
                <span style="font-size:12px; color:var(--txt2)">1,500 NOK - 05/05/2026</span>
            </div>
            <div class="action-menu" onclick="toggleMenu(this)">
                ⋮
                <div class="dropdown">
                    <div class="dropdown-item" onclick="alert('Edit clicked')">✏️ Edit</div>
                    <div class="dropdown-item" onclick="alert('Change clicked')">🔄 Change</div>
                    <div class="dropdown-item delete-opt" onclick="confirmDelete(this)">🗑️ Delete</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const MASTER_ADMIN = "Saladmohamed392@gmail.com";

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Nidaamka 3-da Dhibic
    function toggleMenu(el) {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        el.querySelector('.dropdown').classList.toggle('show');
    }

    // Xir menu-ga haddii meel kale la taabto
    window.onclick = function(event) {
        if (!event.target.matches('.action-menu')) {
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        }
    }

    function handleLogin() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;

        if(email === MASTER_ADMIN && pass === "admin123") {
            alert("Ku soo dhawaaw, Master Admin!");
            showScreen('scr-dash');
        } else {
            // Halkan waxaad dhigi kartaa hubinta dadka kale ee is-diiwaangeliyay
            alert("Waa lagu aqoonsaday!");
            showScreen('scr-dash');
        }
    }

    function handleRegister() {
        const email = document.getElementById('r-email').value;
        if(email) {
            alert("Waad ku mahadsantahay is-diiwaangelinta: " + email);
            showScreen('scr-login');
        }
    }

    function confirmDelete(el) {
        if(confirm("Ma hubtaa inaad rabto inaad tirtirto xogtan?")) {
            el.closest('.action-menu').parentElement.remove();
        }
    }
</script>
</body>
</html>
