<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card-pro { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .input-pro { background: #334155 !important; border: 1px solid #475569 !important; color: white !important; border-radius: 12px; padding: 14px; width: 100%; outline: none; }
        .nav-tab.active { color: var(--primary); border-top: 3px solid var(--primary); opacity: 1 !important; }
        .hidden { display: none !important; }
        .privacy-blur { filter: blur(12px) !important; opacity: 0.1 !important; pointer-events: none !important; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #1e293b; min-width: 130px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); z-index: 100; border-radius: 12px; border: 1px solid #475569; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body class="pb-24">

    <div id="authSection" class="fixed inset-0 bg-[#0f172a] z-[5000] flex items-center justify-center p-6 overflow-y-auto">
        <div class="bg-[#1e293b] p-8 rounded-[35px] w-full max-w-md shadow-2xl border-t-8 border-yellow-500 text-center">
            <i class="fas fa-truck-fast text-5xl text-yellow-500 mb-3"></i>
            <h1 class="text-2xl font-black mb-6 uppercase">M. Salad <span class="text-yellow-500">PRO</span></h1>
            <input type="email" id="emailInput" class="input-pro mb-3" placeholder="E-post / Email">
            <input type="password" id="passInput" class="input-pro mb-4" placeholder="Passord / Password">
            <button id="mainAuthBtn" onclick="handleAuth()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black shadow-lg uppercase mb-4">Logg Inn</button>
            <div class="flex flex-col gap-3 text-[10px] font-bold uppercase text-gray-400">
                <button onclick="toggleAuthMode('forgot')">Glemt passord?</button>
                <button onclick="toggleAuthMode('signup')" class="text-yellow-500">Opprett ny konto (Setup)</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-4 flex justify-between items-center sticky top-0 z-[1000] bg-[#0f172a]/80 backdrop-blur-md">
            <div>
                <h2 class="text-lg font-black text-yellow-500 uppercase">M. SALAD</h2>
                <p id="userDisplay" class="text-[8px] text-gray-500 font-mono"></p>
            </div>
            <div class="flex gap-2 items-center">
                <select id="langSwitcher" onchange="updateLanguage(this.value)" class="bg-gray-800 text-[10px] border border-gray-600 rounded px-1 py-1 text-white font-bold">
                    <option value="no">🇳🇴 Norsk</option>
                    <option value="so">🇸🇴 Somali</option>
                    <option value="en">🇺🇸 English</option>
                </select>
                <button onclick="togglePrivacy()" class="bg-gray-800 p-2 rounded-lg text-yellow-500"><i id="eyeIcon" class="fas fa-eye"></i></button>
                <button onclick="logout()" class="bg-red-500/10 text-red-500 p-2 rounded-lg"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <main class="p-4 space-y-4">
            <div class="card-pro p-4 bg-slate-800/50 border border-yellow-500/20">
                <p class="text-[10px] text-yellow-500 font-black uppercase mb-4 border-b border-white/5 pb-2" id="lbl-dashboard">Regnskap Totallada</p>
                <div class="grid grid-cols-2 gap-y-4 gap-x-2">
                    <div class="dash-item">
                        <p class="text-[8px] text-gray-500 uppercase" id="lbl-total-faktura">Faktura (Income)</p>
                        <p id="dash-faktura" class="text-xs font-bold balance-text">0 kr</p>
                    </div>
                    <div class="dash-item">
                        <p class="text-[8px] text-gray-500 uppercase" id="lbl-total-fuel">Drivstoff</p>
                        <p id="dash-fuel" class="text-xs font-bold balance-text text-red-400">0 kr</p>
                    </div>
                    <div class="dash-item">
                        <p class="text-[8px] text-gray-500 uppercase" id="lbl-total-pay">Lønn + Feriepenger</p>
                        <p id="dash-pay" class="text-xs font-bold balance-text text-orange-400">0 kr</p>
                    </div>
                    <div class="dash-item">
                        <p class="text-[8px] text-gray-500 uppercase" id="lbl-total-bom">Bompenger</p>
                        <p id="dash-bom" class="text-xs font-bold balance-text text-blue-400">0 kr</p>
                    </div>
                    <div class="dash-item">
                        <p class="text-[8px] text-gray-500 uppercase" id="lbl-total-fixed">Fixed Biler</p>
                        <p id="dash-fixed" class="text-xs font-bold balance-text text-green-400">0 kr</p>
                    </div>
                    <div class="dash-item">
                        <p class="text-[8px] text-gray-400 uppercase">MVA Refusjon</p>
                        <p id="stat-mva" class="text-xs font-bold balance-text text-yellow-500">0 kr</p>
                    </div>
                </div>
            </div>

            <div class="card-pro p-6 bg-gradient-to-br from-yellow-500 to-amber-600 text-black text-center">
                <p class="text-xs font-black uppercase opacity-60" id="lbl-net">Faa'ido Nadiif (Net Profit)</p>
                <h2 id="totalNet" class="text-4xl font-black tracking-tighter balance-text">0 kr</h2>
            </div>

            <div id="listSection" class="section space-y-2 pb-24"></div>

            <div id="addSection" class="section hidden">
                <div class="card-pro p-6">
                    <div class="flex gap-2 mb-6">
                        <button onclick="setMode('income')" id="btn-inc" class="flex-1 py-4 rounded-xl font-black bg-green-600 text-xs">INNTEKT</button>
                        <button onclick="setMode('expense')" id="btn-exp" class="flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs">UTGIFT</button>
                    </div>
                    <div class="space-y-3">
                        <input type="date" id="inDate" class="input-pro">
                        <input type="text" id="inName" class="input-pro" placeholder="Beskrivelse">
                        <div id="employeeField" class="hidden">
                            <input type="text" id="inEmployee" class="input-pro border-yellow-500/50" placeholder="Magaca Shaqaalaha">
                        </div>
                        <input type="number" id="inAmount" class="input-pro" placeholder="Beløp">
                        <select id="inType" class="input-pro" onchange="checkType(this.value)"></select>
                        <button onclick="saveEntry()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black mt-4 uppercase" id="lbl-save">Kaydi</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-[#1e293b] border-t border-white/5 flex justify-around py-5 z-[4000]">
            <button onclick="showPage('list')" id="nav-list" class="nav-tab active flex flex-col items-center gap-1 opacity-40">
                <i class="fas fa-home text-xl"></i><span class="text-[10px] font-bold" id="lbl-nav-home">Hjem</span>
            </button>
            <button onclick="showPage('add')" id="nav-add" class="nav-tab flex flex-col items-center gap-1 opacity-40">
                <i class="fas fa-plus-circle text-xl"></i><span class="text-[10px] font-bold" id="lbl-nav-add">Geli Xog</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentLang = 'no', authMode = 'login', currentMode = 'income', isPrivate = false;

        const langData = {
            no: { dash: "Dashboard Totallada", fak: "Faktura Income (MVA)", fuel: "Drivstoff (MVA)", pay: "Lønn + Ferie", bom: "Bompenger (MVA)", fix: "Fixed Biler (MVA)", net: "Nadiif ah", save: "Lagre", home: "Hjem", add: "Legg til" },
            so: { dash: "Warbixinta Totalka", fak: "Dakhli Faktura", fuel: "Wadarta Shidaalka", pay: "Mushahar + Fasax", bom: "Wadada (Bompenger)", fix: "Baabuur Hagaajin", net: "Faa'ido", save: "Kaydi", home: "Guudmar", add: "Geli Xog" },
            en: { dash: "Dashboard Summary", fak: "Invoice Income", fuel: "Fuel Total", pay: "Payroll + Vacation", bom: "Toll Road", fix: "Car Repairs", net: "Net Profit", save: "Save", home: "Home", add: "Add New" }
        };

        window.updateLanguage = (lang) => {
            currentLang = lang; const d = langData[lang];
            document.getElementById('lbl-dashboard').innerText = d.dash;
            document.getElementById('lbl-total-faktura').innerText = d.fak;
            document.getElementById('lbl-total-fuel').innerText = d.fuel;
            document.getElementById('lbl-total-pay').innerText = d.pay;
            document.getElementById('lbl-total-bom').innerText = d.bom;
            document.getElementById('lbl-total-fixed').innerText = d.fix;
            document.getElementById('lbl-net').innerText = d.net;
            document.getElementById('lbl-save').innerText = d.save;
            document.getElementById('lbl-nav-home').innerText = d.home;
            document.getElementById('lbl-nav-add').innerText = d.add;
            fetchData();
        };

        window.handleAuth = async () => {
            const e = document.getElementById('emailInput').value, p = document.getElementById('passInput').value;
            try {
                if(authMode === 'login') await signInWithEmailAndPassword(auth, e, p);
                else if(authMode === 'signup') await createUserWithEmailAndPassword(auth, e, p);
                else if(authMode === 'forgot') { await sendPasswordResetEmail(auth, e); alert("Reset email sent!"); }
            } catch (err) { alert(err.message); }
        };

        onAuthStateChanged(auth, user => {
            if(user) { document.getElementById('authSection').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); document.getElementById('userDisplay').innerText = user.email; updateLanguage('no'); }
            else { document.getElementById('authSection').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
        });

        window.fetchData = () => {
            onSnapshot(query(collection(db, "pro_records"), orderBy("date", "desc")), snap => {
                const list = document.getElementById('listSection');
                list.innerHTML = '';
                let ti=0, te=0, tmva=0, tFuel=0, tPay=0, tBom=0, tFak=0, tFix=0;

                snap.forEach(docSnap => {
                    const d = docSnap.data(); const amt = Number(d.amount);
                    if(d.mode === 'income') {
                        ti += amt;
                        if(d.type.includes('Faktura')) { tFak += amt; tmva -= (amt - (amt / 1.25)); }
                    } else {
                        te += amt;
                        if(d.type.includes('Drivstoff')) { tFuel += amt; tmva += (amt - (amt / 1.25)); }
                        if(d.type.includes('Bompenger')) { tBom += amt; tmva += (amt - (amt / 1.25)); }
                        if(d.type.includes('Fixed')) { tFix += amt; tmva += (amt - (amt / 1.25)); }
                        if(d.type.includes('Lønn')) { tPay += (amt * 1.102); }
                    }

                    list.innerHTML += `
                        <div class="card-pro p-4 flex justify-between items-center border-l-4 ${d.mode === 'income' ? 'border-green-500' : 'border-red-500'} mb-2">
                            <div class="${isPrivate ? 'privacy-blur' : ''}">
                                <p class="text-xs font-black uppercase">${d.name} ${d.employee ? '('+d.employee+')' : ''}</p>
                                <p class="text-[9px] text-gray-500">${d.date} • ${d.type}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <p class="font-black balance-text ${d.mode === 'income' ? 'text-green-400' : 'text-red-400'}">${amt.toLocaleString()} kr</p>
                                <button onclick="deleteEntry('${docSnap.id}')" class="text-gray-600 text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });

                document.getElementById('dash-faktura').innerText = tFak.toLocaleString() + ' kr';
                document.getElementById('dash-fuel').innerText = tFuel.toLocaleString() + ' kr';
                document.getElementById('dash-pay').innerText = Math.round(tPay).toLocaleString() + ' kr';
                document.getElementById('dash-bom').innerText = tBom.toLocaleString() + ' kr';
                document.getElementById('dash-fixed').innerText = tFix.toLocaleString() + ' kr';
                document.getElementById('stat-mva').innerText = Math.round(tmva).toLocaleString() + ' kr';
                document.getElementById('totalNet').innerText = (ti - te).toLocaleString() + ' kr';
                
                if(isPrivate) { document.querySelectorAll('.dash-item p').forEach(p => p.classList.add('privacy-blur')); }
                else { document.querySelectorAll('.dash-item p').forEach(p => p.classList.remove('privacy-blur')); }
            });
        };

        window.saveEntry = async () => {
            const a = document.getElementById('inAmount').value, n = document.getElementById('inName').value, d = document.getElementById('inDate').value;
            if(!a || !n || !d) return;
            await addDoc(collection(db, "pro_records"), { amount: parseFloat(a), name: n, date: d, type: document.getElementById('inType').value, employee: document.getElementById('inEmployee').value, mode: currentMode, user: auth.currentUser.email });
            document.getElementById('inAmount').value = ''; document.getElementById('inName').value = ''; showPage('list');
        };

        window.checkType = (v) => { document.getElementById('employeeField').className = (v === 'Lønn' ? '' : 'hidden'); };
        window.setMode = (m) => {
            currentMode = m;
            document.getElementById('btn-inc').className = m === 'income' ? 'flex-1 py-4 rounded-xl font-black bg-green-600 text-xs' : 'flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs';
            document.getElementById('btn-exp').className = m === 'expense' ? 'flex-1 py-4 rounded-xl font-black bg-red-600 text-xs' : 'flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs';
            const opts = m === 'income' ? ['Faktura med MVA', 'Kontanter'] : ['Drivstoff med MVA', 'Lønn', 'Bompenger med MVA', 'Fixed Biler med MVA', 'Bank Transactions (Uten MVA)', 'Annet (Uten MVA)'];
            document.getElementById('inType').innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
            checkType(document.getElementById('inType').value);
        };

        window.deleteEntry = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "pro_records", id)); };
        window.showPage = (p) => { document.querySelectorAll('.section').forEach(s => s.classList.add('hidden')); document.getElementById(p + 'Section').classList.remove('hidden'); document.getElementById('nav-list').classList.toggle('active', p === 'list'); document.getElementById('nav-add').classList.toggle('active', p === 'add'); };
        window.logout = () => signOut(auth);
        window.togglePrivacy = () => { isPrivate = !isPrivate; document.getElementById('eyeIcon').className = isPrivate ? 'fas fa-eye-slash' : 'fas fa-eye'; fetchData(); };
        window.toggleAuthMode = (mode) => { authMode = mode; document.getElementById('mainAuthBtn').innerText = mode === 'signup' ? 'Setup Account' : (mode === 'forgot' ? 'Reset' : 'Logg Inn'); };

        document.getElementById('inDate').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
