<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salad Transport PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        /* Language Selector */
        .lang-bar { display: flex; justify-content: flex-end; padding: 10px 15px; gap: 10px; background: #1e293b; border-bottom: 1px solid #334155; }
        .lang-btn { cursor: pointer; font-size: 20px; filter: grayscale(0.5); transition: 0.3s; }
        .lang-btn.active { filter: grayscale(0); transform: scale(1.2); }

        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 15px 0; font-size: 16px; text-transform: uppercase; }
        
        /* Dashboard */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 12px; }
        .stat-box { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; text-align: center; }
        .stat-box small { font-size: 8px; display: block; margin-bottom: 4px; color: #94a3b8; font-weight: bold; }
        .stat-box span { font-weight: bold; font-size: 11px; }
        
        .main-result { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 15px; padding: 20px; text-align: center; position: relative; }
        .eye-icon { position: absolute; right: 15px; top: 15px; cursor: pointer; color: var(--yellow); }
        .sub-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 15px; }
        
        /* List */
        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 0 15px 12px 15px; border-left: 8px solid; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .entry-info h4 { margin: 0; font-size: 14px; }
        .entry-info small { color: #64748b; font-size: 11px; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #334155; }
        .nav-item { text-align: center; color: #64748b; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: var(--yellow); }
        
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        .btn-pro { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hidden-val { filter: blur(8px); }
        .dropdown { position: absolute; right: 10px; top: 45px; background: white; color: black; border-radius: 8px; display: none; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .dropdown div { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="lang-bar">
    <span class="lang-btn active" onclick="setLang('no')" title="Norsk">🇳🇴</span>
    <span class="lang-btn" onclick="setLang('so')" title="Somali">🇸🇴</span>
    <span class="lang-btn" onclick="setLang('en')" title="English">🇺🇸</span>
</div>

<div id="auth-page" style="padding: 40px 25px; text-align: center;">
    <h1 style="color:var(--yellow); font-size: 28px;">🚖 TAXI PRO</h1>
    <p id="t-welcome" style="color:#64748b">Velkommen tilbake</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn-pro" style="background:var(--blue); color:white; margin-bottom:10px;" onclick="handleAuth('login')" id="t-login">LOGIN</button>
    <button class="btn-pro" style="background:transparent; color:var(--yellow); border:1px solid var(--yellow);" onclick="handleAuth('reg')" id="t-reg">REGISTER</button>
</div>

<div id="app-content" style="display:none;">
    <div id="page-guudmar" class="page active">
        <div class="header-title" id="t-dash">GUUDMARKA XISAABTA</div>
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green);"><small id="t-sentral">SENTRAL (MVA)</small><span class="val-text" id="total-sentral" style="color:var(--green)">0</span></div>
            <div class="stat-box" style="border-color: var(--blue);"><small id="t-own">OWN (NO MVA)</small><span class="val-text" id="total-own" style="color:var(--blue)">0</span></div>
            <div class="stat-box" style="border-color: var(--red);"><small id="t-exp">UTGIFTER</small><span class="val-text" id="total-kharash" style="color:var(--red)">0</span></div>
        </div>
        <div class="main-result">
            <i class="fas fa-eye eye-icon" onclick="toggleVisibility()"></i>
            <div class="sub-stats">
                <div><small id="t-mva">MVA REFUND</small><span class="val-text" id="mva-val">0</span></div>
                <div><small id="t-ferie">FERIEPENGER</small><span class="val-text" id="ferie-val">0</span></div>
            </div>
            <small id="t-net" style="color:var(--yellow)">NETTO RESULT (LØNN)</small>
            <h1 class="val-text" id="net-result" style="color:var(--green); margin: 10px 0;">0 kr</h1>
        </div>
        <div id="entry-list"></div>
    </div>

    <div id="page-add" class="page">
        <h2 style="text-align:center; color:var(--yellow)" id="t-add-title">Geli Xogta</h2>
        <select id="type">
            <option value="Income-Sentral">Sentral Income (Med MVA)</option>
            <option value="Income-Own">Own Income (Uten MVA)</option>
            <option value="Kharash-Regn">Regnskapsfører (Red)</option>
            <option value="Kharash-Biler">Biler Fix / Service (Red)</option>
            <option value="Kharash-Bom">Bompenger (Red)</option>
            <option value="Kharash-Driv">Drivstoff (Red)</option>
            <option value="Kharash-Other">Other Expenses (Red)</option>
        </select>
        <input type="text" id="cat" placeholder="Description">
        <input type="number" id="amount" placeholder="Amount (kr)">
        <button class="btn-pro" style="background:var(--green); color:white;" onclick="saveData()" id="t-save">SAVE / KEYDI</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('guudmar')"><i class="fas fa-chart-pie"></i><br><span id="n-dash">Dashboard</span></div>
        <div class="nav-item" onclick="switchPage('add')"><i class="fas fa-plus-circle"></i><br><span id="n-add">Add</span></div>
        <div class="nav-item" onclick="auth.signOut()"><i class="fas fa-power-off"></i><br><span id="n-out">Logout</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let isHidden = false;

    // Translation Data
    const langData = {
        no: { welcome: "Velkommen tilbake", login: "LOGG INN", reg: "REGISTRER", dash: "GUUDMARKA XISAABTA", sentral: "SENTRAL (MVA)", own: "OWN (NO MVA)", exp: "UTGIFTER", mva: "MVA REFUND", ferie: "FERIEPENGER", net: "NETTO RESULT (LØNN)", add_t: "Geli Xogta", save: "SAVE / KEYDI", n_dash: "Dashboard", n_add: "Geli Xog", n_out: "Logg ut" },
        so: { welcome: "Soo dhawaaw sxb", login: "GELI APP-KA", reg: "SAMAYSO ACCOUNT", dash: "WARBIXINTA GUUD", sentral: "DAKHLIGA (MVA)", own: "DAKHLI KALE", exp: "KHARASHYADA", mva: "MVA DIB-U-HELID", ferie: "LACAGTA FASAXA", net: "DAKHLI NADIIF AH", add_t: "Ku dar xog", save: "KEYDI XOGTA", n_dash: "Guudmar", n_add: "Ku Dar", n_out: "Ka Bax" },
        en: { welcome: "Welcome Back", login: "LOG IN", reg: "REGISTER", dash: "FINANCIAL OVERVIEW", sentral: "SENTRAL (MVA)", own: "OWN (NO MVA)", exp: "EXPENSES", mva: "MVA REFUND", ferie: "HOLIDAY PAY", net: "NET INCOME", add_t: "Add Entry", save: "SAVE DATA", n_dash: "Overview", n_add: "Add New", n_out: "Logout" }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        const d = langData[lang];
        document.getElementById('t-welcome').innerText = d.welcome;
        document.getElementById('t-login').innerText = d.login;
        document.getElementById('t-reg').innerText = d.reg;
        document.getElementById('t-dash').innerText = d.dash;
        document.getElementById('t-sentral').innerText = d.sentral;
        document.getElementById('t-own').innerText = d.own;
        document.getElementById('t-exp').innerText = d.exp;
        document.getElementById('t-mva').innerText = d.mva;
        document.getElementById('t-ferie').innerText = d.ferie;
        document.getElementById('t-net').innerText = d.net;
        document.getElementById('t-add-title').innerText = d.add_t;
        document.getElementById('t-save').innerText = d.save;
        document.getElementById('n-dash').innerText = d.n_dash;
        document.getElementById('n-add').innerText = d.n_add;
        document.getElementById('n-out').innerText = d.n_out;
    }

    function handleAuth(mode) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(mode==='reg') auth.createUserWithEmailAndPassword(e,p).catch(err=>alert(err.message));
        else auth.signInWithEmailAndPassword(e,p).catch(err=>alert("Login Failed"));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display='none';
            document.getElementById('app-content').style.display='block';
            loadData();
        } else {
            document.getElementById('auth-page').style.display='block';
            document.getElementById('app-content').style.display='none';
        }
    });

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(ni=>ni.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function toggleVisibility() {
        isHidden = !isHidden;
        document.querySelectorAll('.val-text').forEach(v=>isHidden?v.classList.add('hidden-val') : v.classList.remove('hidden-val'));
    }

    function saveData() {
        const t = document.getElementById('type').value;
        const c = document.getElementById('cat').value;
        const a = parseFloat(document.getElementById('amount').value);
        if(!c || !a) return;
        db.ref('users/'+auth.currentUser.uid+'/entries').push({
            type:t, cat:c, amount:a, date:new Date().toLocaleDateString('no-NO')
        });
        document.getElementById('cat').value=""; document.getElementById('amount').value="";
        switchPage('guudmar');
    }

    function loadData() {
        db.ref('users/'+auth.currentUser.uid+'/entries').on('value', snap => {
            const list = document.getElementById('entry-list');
            list.innerHTML = "";
            let sentral=0, own=0, kharash=0, mva=0;

            snap.forEach(child => {
                const d = child.val();
                const id = child.key;
                let clr = 'var(--red)';
                if(d.type.includes('Income')) {
                    clr = d.type==='Income-Sentral' ? 'var(--green)' : 'var(--blue)';
                    if(d.type==='Income-Sentral') { sentral+=d.amount; mva+=(d.amount*12/112); }
                    else own+=d.amount;
                } else {
                    kharash+=d.amount;
                    if(["Kharash-Regn","Kharash-Biler","Kharash-Bom"].includes(d.type)) mva+=(d.amount/5);
                }

                list.innerHTML += `
                    <div class="entry-card" style="border-left-color:${clr}">
                        <div class="entry-info">
                            <small>${d.type.split('-')[1].toUpperCase()}</small>
                            <h4>${d.cat}</h4>
                            <small>${d.date}</small>
                        </div>
                        <div class="entry-amount" style="color:${clr}">
                            <span class="val-text">${d.amount.toLocaleString()} kr</span>
                            <i class="fas fa-ellipsis-v" style="margin-left:10px; color:#444;" onclick="toggleMenu('${id}')"></i>
                            <div id="drop-${id}" class="dropdown">
                                <div onclick="deleteE('${id}')" style="color:red">Delete</div>
                            </div>
                        </div>
                    </div>`;
            });

            document.getElementById('total-sentral').innerText = sentral.toLocaleString();
            document.getElementById('total-own').innerText = own.toLocaleString();
            document.getElementById('total-kharash').innerText = kharash.toLocaleString();
            document.getElementById('mva-val').innerText = Math.floor(mva).toLocaleString();
            document.getElementById('ferie-val').innerText = Math.floor((sentral+own)*0.102).toLocaleString();
            document.getElementById('net-result').innerText = ((sentral+own)-kharash).toLocaleString() + " kr";
        });
    }

    function toggleMenu(id) {
        const d = document.getElementById('drop-'+id);
        d.style.display = (d.style.display==='block')?'none':'block';
    }

    function deleteE(id) {
        if(confirm("Tirtir?")) db.ref('users/'+auth.currentUser.uid+'/entries/'+id).remove();
    }
</script>
</body>
</html>
