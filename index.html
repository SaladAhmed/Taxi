<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Salaad Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 10px; margin: 0; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; max-width: 500px; margin: 10px auto; }
        h1, h2 { text-align: center; color: var(--yellow); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-save { background: var(--green); color: white; }
        .btn-logout { background: var(--red); color: white; margin-top: 20px; }
        .total-box { background: #334155; padding: 15px; border-radius: 10px; text-align: center; font-size: 20px; margin-bottom: 20px; border: 2px solid var(--yellow); }
        .item { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 5px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        .item small { color: #94a3b8; display: block; font-size: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- QAYBTA LOGIN-KA -->
<div id="auth-page" class="box">
    <h1>🚖 Taxi Salaad</h1>
    <input type="email" id="email" placeholder="Emailkaaga">
    <input type="password" id="pass" placeholder="Password (6+ xaraf)">
    <button style="background: var(--blue); color: white;" onclick="handleAuth('login')">Login</button>
    <button style="background: #334155; color: white;" onclick="handleAuth('reg')">Create New Account</button>
</div>

<!-- QAYBTA APP-KA -->
<div id="app-page" class="hidden">
    <div class="box">
        <h2 id="u-name">Taxi Salaad</h2>
        
        <!-- ISKU DARKA LACAGTA -->
        <div class="total-box">
            Total: <span id="total-amount" style="color: var(--yellow);">0</span> kr
        </div>

        <label>Nooca Kharashka:</label>
        <select id="cat">
            <option value="Faktura inCom (Fra Sentral)">Faktura inCom (Fra Sentral)</option>
            <option value="Drivstoff">Drivstoff</option>
            <option value="Lønn + feriepenger">Lønn + feriepenger</option>
            <option value="Bank transaction ute MVA">Bank transaction ute MVA</option>
            <option value="Bompenger med MVA">Bompenger med MVA</option>
            <option value="Fixed bil MVA">Fixed bil MVA</option>
            <option value="Annet uten MVA">Annet uten MVA</option>
        </select>

        <input type="number" id="amount" placeholder="Lacagta (kr)">
        <button class="btn-save" onclick="saveData()">Keydi Xogta (Save)</button>
        <button class="btn-logout" onclick="location.reload()">Logout</button>
    </div>

    <div id="list" style="max-width: 500px; margin: auto;"></div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:34cafc1a23316664717bee",
      measurementId: "G-YN3RKFE194"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function handleAuth(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if (type === 'reg') {
            auth.createUserWithEmailAndPassword(e,p).then(() => showApp()).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(e,p).then(() => showApp()).catch(err => alert("Khalad: Email ama Password"));
        }
    }

    function showApp() {
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('app-page').classList.remove('hidden');
        document.getElementById('u-name').innerText = "Soo dhowaad, " + auth.currentUser.email.split('@')[0];
        loadData();
    }

    function saveData() {
        const c = document.getElementById('cat').value;
        const a = parseFloat(document.getElementById('amount').value);
        if(c && a) {
            db.ref('user_data/' + auth.currentUser.uid).push({
                category: c, amount: a, date: new Date().toLocaleString()
            });
            document.getElementById('amount').value = "";
        } else {
            alert("Fadlan qor lacagta");
        }
    }

    function loadData() {
        db.ref('user_data/' + auth.currentUser.uid).on('value', snap => {
            const listDiv = document.getElementById('list');
            const totalSpan = document.getElementById('total-amount');
            listDiv.innerHTML = "";
            let total = 0;

            snap.forEach(child => {
                const data = child.val();
                total += data.amount;
                listDiv.innerHTML += `
                    <div class="item">
                        <div>
                            <strong>${data.category}</strong>
                            <small>${data.date}</small>
                        </div>
                        <span style="font-weight:bold;">${data.amount} kr</span>
                    </div>`;
            });
            totalSpan.innerText = total.toLocaleString();
        });
    }
</script>
</body>
</html>
