<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO</title>
    
    <!-- App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: 0.3s; overflow-x: hidden; }
        .container { max-width: 1000px; margin: auto; padding: 10px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        
        .auth-container { padding: 40px 20px; text-align: center; max-width: 400px; margin: 60px auto; background: var(--card); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat-box { background: var(--card); border: 2px solid; border-radius: 15px; padding: 15px 5px; text-align: center; }
        .stat-box small { font-size: 10px; display: block; margin-bottom: 5px; opacity: 0.8; }
        .stat-box span { font-size: 14px; font-weight: bold; }

        .summary-card { background: var(--card); border: 3px solid var(--yellow); border-radius: 25px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .tax-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; color: white; }

        /* Entry Cards */
        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; }
        
        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--yellow); }

        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 12px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .img-preview { width: 100%; border-radius: 15px; margin-bottom: 15px; display: none; border: 2px solid var(--yellow); }

        @media (min-width: 768px) { .stats-grid { gap: 20px; } .stat-box span { font-size: 18px; } }
    </style>
</head>
<body id="body-tag">

<div id="auth-page" class="auth-container">
    <h2 id="auth-title">LOGG INN</h2>
    <div id="reg-fields" style="display:none">
        <input type="text" id="fname" placeholder="Fornavn">
        <input type="text" id="lname" placeholder="Etternavn">
    </div>
    <div onkeypress="if(event.key==='Enter') handleAuth()">
        <input type="email" id="email" placeholder="E-post" autofocus>
        <input type="password" id="pass" placeholder="Passord">
        <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    </div>
    <p onclick="toggleAuth()" style="color:var(--yellow); cursor:pointer; margin-top:15px;">Habka Diiwaangelinta</p>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-adjust" onclick="toggleTheme()"></i>
        <div class="header-title" style="padding:0; font-size:14px;">TRANSPORT PRO</div>
        <div id="user-name-top" style="font-size:12px; color:var(--yellow)"></div>
    </div>

    <div class="container">
        <!-- Dashboard -->
        <div id="page-dash" class="page">
            <div class="stats-grid">
                <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small>INNTEKT</small><span id="total-income">0</span></div>
                <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small>UTGIFTER</small><span id="total-expense">0</span></div>
                <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small>NETTO</small><span id="total-netto">0</span></div>
            </div>

            <div class="summary-card">
                <small>NETTO NATIIDADA</small>
                <h1 id="res-total">0 kr</h1>
                <div class="tax-grid">
                    <div><small>MVA (25%)</small><br><b id="tax-mva">0</b></div>
                    <div><small>FERIEPENGER (10.2%)</small><br><b id="tax-ferie">0</b></div>
                </div>
            </div>

            <div class="btn-row">
                <button class="action-btn" style="background:var(--blue)" onclick="toggleView()">Modus: <span id="view-text">Mid-mid</span></button>
                <button class="action-btn" style="background:var(--green)" onclick="downloadCSV()"><i class="fas fa-file-excel"></i> Report</button>
            </div>

            <div id="entries-list"></div>
        </div>

        <!-- Add / Scanner -->
        <div id="page-add" class="page" style="display:none;">
            <div class="header-title">SMART SCANNER & MANUAL</div>
            <center><img id="scan-preview" class="img-preview"></center>
            <div id="scan-loading" style="display:none; color:var(--yellow); text-align:center; margin-bottom:10px;"><i class="fas fa-spinner fa-spin"></i> Akhrinayaa...</div>
            
            <input type="text" id="entry-desc" placeholder="Maxay tahay?">
            <input type="number" id="entry-amt" placeholder="Lacagta (kr)">
            <select id="entry-cat">
                <option value="income">INNTEKT (Dakhli)</option>
                <option value="expense">UTGIFT (Kharash)</option>
            </select>
            <button class="btn-save" style="background:var(--green)" onclick="saveData()">SAVE DATA</button>
        </div>

        <!-- Profile / Settings -->
        <div id="page-profile" class="page" style="display:none; text-align:center;">
            <div class="header-title">SETTINGS</div>
            <div class="summary-card" style="border-color:var(--blue)">
                <i class="fas fa-user-circle" style="font-size:50px; color:var(--blue)"></i>
                <h3 id="p-full-name">User Name</h3>
                <p id="p-email" style="opacity:0.6"></p>
            </div>
            <button class="btn-save" style="background:var(--blue); margin-bottom:15px;" onclick="changePassword()"><i class="fas fa-key"></i> Change Password</button>
            <button class="btn-save" style="background:var(--red)" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logg ut</button>
        </div>
    </div>

    <input type="file" id="camera-file" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)">

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-chart-bar"></i><span>Home</span></div>
        <div class="nav-item" onclick="document.getElementById('camera-file').click()"><i class="fas fa-camera"></i><span>Scanner</span></div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><span>Manual</span></div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-cog"></i><span>Settings</span></div>
    </div>
</div>

<script>
    // Config
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.appspot.com",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const storage = firebase.storage();

    let rawData = [];
    let viewMode = 'individual';
    let selectedFile = null;

    // Auth Functions
    function toggleAuth() {
        const rf = document.getElementById('reg-fields');
        rf.style.display = rf.style.display === 'none' ? 'block' : 'none';
        document.getElementById('auth-title').innerText = rf.style.display === 'none' ? 'LOGG INN' : 'REGISTRER';
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(document.getElementById('reg-fields').style.display === 'none') {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            const fn = document.getElementById('fname').value;
            const ln = document.getElementById('lname').value;
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.ref('users/' + u.user.uid + '/profile').set({ fullName: fn + " " + ln });
            }).catch(e => alert(e.message));
        }
    }

    // Smart Scanner
    async function handleImage(event) {
        const file = event.target.files[0]; if(!file) return;
        selectedFile = file;
        document.getElementById('scan-preview').src = URL.createObjectURL(file);
        document.getElementById('scan-preview').style.display = 'block';
        document.getElementById('scan-loading').style.display = 'block';
        showTab('add');

        try {
            const result = await Tesseract.recognize(file, 'nor+eng');
            const amounts = result.data.text.replace(/\s/g, '').replace(',', '.').match(/\d+\.\d{2}/g);
            if(amounts) document.getElementById('entry-amt').value = Math.max(...amounts.map(a => parseFloat(a)));
            document.getElementById('entry-desc').value = "Scanned " + new Date().toLocaleDateString();
        } catch(e) { alert("Scanner-ka ayaa cilad bixiyay"); }
        document.getElementById('scan-loading').style.display = 'none';
    }

    // Data Actions
    async function saveData() {
        const desc = document.getElementById('entry-desc').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const cat = document.getElementById('entry-cat').value;
        if(!desc || !amt) return alert("Fadhlan buuxi xogta");

        const ref = db.ref('users/' + auth.currentUser.uid + '/entries').push();
        let imgUrl = "";
        if(selectedFile) {
            const sRef = storage.ref(`receipts/${auth.currentUser.uid}/${ref.key}`);
            await sRef.put(selectedFile);
            imgUrl = await sRef.getDownloadURL();
        }

        await ref.set({ desc, amt, mainCat: cat, imgUrl, date: new Date().toLocaleDateString('no-NO'), ts: Date.now() });
        document.getElementById('entry-desc').value = ""; document.getElementById('entry-amt').value = "";
        document.getElementById('scan-preview').style.display = 'none'; selectedFile = null;
        showTab('dash');
    }

    function loadData() {
        const uid = auth.currentUser.uid;
        db.ref('users/' + uid + '/profile/fullName').on('value', s => {
            document.getElementById('user-name-top').innerText = s.val();
            document.getElementById('p-full-name').innerText = s.val();
            document.getElementById('p-email').innerText = auth.currentUser.email;
        });

        db.ref('users/' + uid + '/entries').on('value', snap => {
            rawData = []; snap.forEach(c => { const v = c.val(); v.id = c.key; rawData.push(v); });
            renderList();
        });
    }

    function renderList() {
        const list = document.getElementById('entries-list'); list.innerHTML = "";
        let ti=0, te=0;

        if(viewMode === 'individual') {
            rawData.forEach(v => {
                if(v.mainCat === 'income') ti += v.amt; else te += v.amt;
                list.innerHTML += `
                <div class="entry-card" style="border-left-color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}">
                    <div><b>${v.desc}</b><br><small>${v.date}</small></div>
                    <div style="text-align:right">
                        <b>${v.amt.toLocaleString()} kr</b><br>
                        ${v.imgUrl ? `<i class="fas fa-image" style="color:var(--blue)" onclick="window.open('${v.imgUrl}')"></i>` : ''}
                        <i class="fas fa-trash" style="margin-left:10px; opacity:0.5" onclick="deleteEntry('${v.id}')"></i>
                    </div>
                </div>`;
            });
        } else {
            const summary = rawData.reduce((acc, curr) => {
                acc[curr.desc] = (acc[curr.desc] || 0) + curr.amt;
                return acc;
            }, {});
            for(let key in summary) {
                list.innerHTML += `<div class="entry-card" style="border-left-color:var(--yellow)"><div><b>${key} (Total)</b></div><b>${summary[key].toLocaleString()} kr</b></div>`;
            }
            rawData.forEach(v => { if(v.mainCat === 'income') ti += v.amt; else te += v.amt; });
        }

        let netto = ti - te;
        document.getElementById('total-income').innerText = ti.toLocaleString();
        document.getElementById('total-expense').innerText = te.toLocaleString();
        document.getElementById('total-netto').innerText = netto.toLocaleString();
        document.getElementById('res-total').innerText = netto.toLocaleString() + " kr";
        document.getElementById('tax-mva').innerText = (netto * 0.25).toLocaleString() + " kr";
        document.getElementById('tax-ferie').innerText = (netto * 0.102).toLocaleString() + " kr";
    }

    // Tools
    function toggleView() { viewMode = (viewMode==='individual'?'summary':'individual'); document.getElementById('view-text').innerText = (viewMode==='individual'?'Mid-mid':'Isku-dar'); renderList(); }
    function toggleTheme() { document.getElementById('body-tag').classList.toggle('light-theme'); }
    function showTab(t) { document.querySelectorAll('.page').forEach(p => p.style.display='none'); document.getElementById('page-'+t).style.display='block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById('nav-'+t).classList.add('active'); }
    function deleteEntry(id) { if(confirm("Ma tirtirtaa?")) db.ref('users/'+auth.currentUser.uid+'/entries/'+id).remove(); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function changePassword() { auth.sendPasswordResetEmail(auth.currentUser.email).then(() => alert("Iimayl ayaad ku heshaa password bedelka")); }

    function downloadCSV() {
        let csv = "Dato,Beskrivelse,Kategori,Belop\n";
        rawData.forEach(v => { csv += `${v.date},${v.desc},${v.mainCat},${v.amt}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.setAttribute('href', url); a.setAttribute('download', 'Transport_Report.csv'); a.click();
    }

    auth.onAuthStateChanged(u => { if(u) { document.getElementById('auth-page').style.display='none'; document.getElementById('main-app').style.display='block'; loadData(); } else { document.getElementById('auth-page').style.display='block'; document.getElementById('main-app').style.display='none'; } });
</script>
</body>
</html>
