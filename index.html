<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Regnskap Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransportPRO">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- OCR LIBRARY ADDED HERE -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .auth-container { padding: 30px; text-align: center; max-width: 400px; margin: 40px auto; background: var(--card); border-radius: 15px; }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .stat-box { background: var(--card); border: 1.5px solid; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-box small { font-size: 9px; display: block; margin-bottom: 5px; font-weight: bold; }

        .mva-card { background: var(--card); border: 2px solid var(--border); border-radius: 15px; margin: 10px auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 780px; }
        .mva-item { text-align: center; border-right: 1px solid var(--border); }
        .mva-item:last-child { border-right: none; }

        .summary-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 10px auto; padding: 20px; text-align: center; max-width: 770px; }
        
        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 0 15px 12px 15px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }
        
        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .profile-img-wrap { width: 80px; height: 80px; margin: 0 auto 10px; border: 2px solid var(--yellow); border-radius: 50%; overflow: hidden; background: #334155; }
        .profile-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .entry-actions { display: flex; gap: 15px; }
        .entry-actions i { cursor: pointer; transition: 0.2s; }
        .fa-trash:hover { color: var(--red); }
        .fa-edit:hover { color: var(--yellow); }

        .scanner-preview { width: 100%; height: 200px; background: #000; border-radius: 10px; margin-bottom: 15px; display: none; object-fit: cover; border: 2px solid var(--yellow); }
        .btn-scan { background: var(--blue); margin-bottom: 15px; }
        #ocr-status { font-size: 12px; color: var(--yellow); text-align: center; margin-bottom: 10px; }

        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card); border-radius: 10px; overflow: hidden; }
        .report-table th, .report-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        .report-table th { background: var(--border); color: var(--yellow); }
    </style>
</head>
<body>

<div id="auth-page" class="auth-container">
    <h2 id="auth-title" style="color:var(--yellow)">LOGG INN</h2>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    <p style="color:var(--yellow); cursor:pointer; font-size:12px; margin-top:15px;" onclick="forgotPassword()">Glemt passord?</p>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        <div id="user-display-name" style="font-weight:bold">Laster...</div>
        <div>
            <span onclick="updateLang('no')">🇳🇴</span>
            <span onclick="updateLang('so')">🇸🇴</span>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="page-dash" class="page">
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small id="l-inc">INNTEKT</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small id="l-exp">UTGIFTER</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small id="l-net">TOTAL (TOTAL)</small><span id="total-netto">0 kr</span></div>
        </div>
        
        <div class="mva-card">
            <div class="mva-item"><small id="l-mva">Skyldig MVA</small><br><b id="res-mva">0 kr</b></div>
            <div class="mva-item"><small id="l-aga">AGA (14.1%)</small><br><b id="res-aga">0 kr</b></div>
            <div class="mva-item"><small id="l-fp">Feriepenger</small><br><b id="res-fp">0 kr</b></div>
            <div class="mva-item"><small id="l-avsk">Avskrivning</small><br><b id="res-avsk">0 kr</b></div>
        </div>
        
        <div class="summary-card">
            <small id="l-res">RESULTAT FØR SKATT (NETTO)</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        
        <div id="entries-list"></div>
    </div>

    <!-- REPORTS PAGE -->
    <div id="page-reports" class="page" style="display:none; padding: 20px;">
        <div class="header-title">REGNSKAP REPORTS</div>
        <div id="report-content">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Dato</th>
                        <th>Konto</th>
                        <th>Beskrivelse</th>
                        <th>Beløp</th>
                    </tr>
                </thead>
                <tbody id="report-body"></tbody>
            </table>
        </div>
    </div>

    <!-- ADD/EDIT DATA & SCANNER -->
    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="header-title" id="l-add-title">REGISTRER DATA</div>
        
        <!-- SCANNER UI -->
        <button class="btn-save btn-scan" id="scan-btn" onclick="startScanner()"><i class="fas fa-camera"></i> SCAN RECEIPT</button>
        <div id="ocr-status"></div>
        <video id="scanner-video" class="scanner-preview" autoplay playsinline></video>
        <canvas id="scanner-canvas" style="display:none;"></canvas>
        <img id="scanned-img" class="scanner-preview" />
        <button id="capture-btn" class="btn-save" style="display:none; background:var(--green); margin-bottom:15px;" onclick="capturePhoto()">TA SAWIRKA & AQRI</button>

        <input type="hidden" id="edit-id">
        <input type="date" id="entry-date">
        <select id="entry-category">
            <optgroup label="INNTEKT (DRIFTSINNTEKTER)">
                <option value="3030">3030 - Kjøreinntekter, lav sats</option>
                <option value="3031">3031 - Kjøreinntekter kontant, lav sats</option>
                <option value="3110">3110 - Tips</option>
            </optgroup>
            <optgroup label="UTGIFTER (DRIFTSKOSTNADER)">
                <option value="7000">7000 - Drivstoff</option>
                <option value="6755">6755 - Sentralavgift</option>
                <option value="7020">7020 - Vedlikehold transportmiddel</option>
                <option value="7040">7040 - Forsikring transportmiddel</option>
                <option value="7770">7770 - Bank- og kortgebyr</option>
            </optgroup>
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        
        <div class="btn-group">
            <button class="btn-save" style="background:var(--green)" onclick="saveData('income')">LAGRE INNTEKT</button>
            <button class="btn-save" style="background:var(--red)" onclick="saveData('expense')">LAGRE UTGIFT</button>
        </div>
    </div>

    <!-- PROFILE PAGE -->
    <div id="page-profile" class="page" style="display:none; padding: 20px; text-align: center;">
        <div class="header-title">MY PROFILE</div>
        <div class="profile-img-wrap" onclick="document.getElementById('profile-upload').click()">
            <img id="profile-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <input type="file" id="profile-upload" style="display:none" onchange="uploadPhoto(this)">
        </div>
        <h3 id="prof-name">User Name</h3>
        <button class="btn-save" style="background:var(--red)" onclick="logout()">LOGG UT (EXIT)</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-chart-line"></i><br><span>Dash</span></div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus"></i><br><span>Add</span></div>
        <div class="nav-item" id="nav-reports" onclick="showTab('reports')"><i class="fas fa-file-invoice"></i><br><span>Reports</span></div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user"></i><br><span>Profil</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let stream = null;

    async function startScanner() {
        const video = document.getElementById('scanner-video');
        const captureBtn = document.getElementById('capture-btn');
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.style.display = 'block';
            captureBtn.style.display = 'block';
            document.getElementById('scanned-img').style.display = 'none';
            document.getElementById('ocr-status').innerText = "Camerada waa diyaar...";
        } catch (err) { alert("Error: " + err); }
    }

    async function capturePhoto() {
        const video = document.getElementById('scanner-video');
        const canvas = document.getElementById('scanner-canvas');
        const img = document.getElementById('scanned-img');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const dataUrl = canvas.toDataURL('image/png');
        img.src = dataUrl;
        img.style.display = 'block';
        
        if(stream) stream.getTracks().forEach(track => track.stop());
        video.style.display = 'none';
        document.getElementById('capture-btn').style.display = 'none';
        
        document.getElementById('ocr-status').innerText = "Waan aqrinayaa qoraalka... (Processing)";

        // OCR Start
        Tesseract.recognize(dataUrl, 'nor+eng').then(({ data: { text } }) => {
            processOCR(text);
        }).catch(err => {
            document.getElementById('ocr-status').innerText = "Waan ku guuldareystay aqrinta.";
        });
    }

    function processOCR(text) {
        const lower = text.toLowerCase();
        
        // Match Amount (e.g. 500,00 or 500.00)
        const amountMatch = text.match(/[\d\s]{2,}(?=[.,]00)/);
        if(amountMatch) document.getElementById('entry-amt').value = amountMatch[0].replace(/\s/g, '');

        // Match Date (DD.MM.YYYY)
        const dateMatch = text.match(/\d{2}\.\d{2}\.\d{4}/);
        if(dateMatch) {
            const parts = dateMatch[0].split('.');
            document.getElementById('entry-date').value = `${parts[2]}-${parts[1]}-${parts[0]}`;
        }

        // Logic for categories
        if(lower.includes("drivstoff") || lower.includes("shell") || lower.includes("circle k")) {
            document.getElementById('entry-category').value = "7000";
            document.getElementById('entry-desc').value = "Drivstoff";
        } else if(lower.includes("forsikring")) {
            document.getElementById('entry-category').value = "7040";
        } else if(lower.includes("taxi") || lower.includes("kjøring")) {
            document.getElementById('entry-category').value = "3030";
        }

        document.getElementById('ocr-status').innerText = "Waa la dhameeyay aqrinta!";
    }

    function saveData(type) {
        const editId = document.getElementById('edit-id').value;
        const desc = document.getElementById('entry-desc').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const cat = document.getElementById('entry-category').value;
        const dateInput = document.getElementById('entry-date').value;
        if(!desc || !amt || !dateInput) return alert("Fadlan buuxi meelaha banaan!");
        const entryData = { desc, amt, subCat: cat, mainCat: type, date: new Date(dateInput).toLocaleDateString('no-NO'), timestamp: new Date(dateInput).getTime() };
        if(editId) db.ref('users/' + auth.currentUser.uid + '/entries/' + editId).update(entryData);
        else db.ref('users/' + auth.currentUser.uid + '/entries').push(entryData);
        resetForm(); showTab('dash');
    }

    function resetForm() {
        document.getElementById('entry-desc').value = ""; document.getElementById('entry-amt').value = "";
        document.getElementById('edit-id').value = ""; document.getElementById('scanned-img').style.display = 'none';
        document.getElementById('ocr-status').innerText = "";
    }

    function loadData() {
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            let ti=0, te=0;
            const list = document.getElementById('entries-list');
            const reportBody = document.getElementById('report-body');
            list.innerHTML = ""; reportBody.innerHTML = "";
            snap.forEach(child => {
                const v = child.val(); const key = child.key;
                if(v.mainCat === 'income') ti += v.amt; else te += v.amt;
                list.innerHTML += `<div class="entry-card" style="border-left-color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}">
                        <div><b>${v.subCat} - ${v.desc}</b><br><small>${v.date}</small></div>
                        <div class="entry-actions"><span style="color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}; font-weight:bold;">${v.amt} kr</span>
                        <i class="fas fa-edit" onclick="editEntry('${key}', '${v.desc}', ${v.amt}, '${v.subCat}')"></i>
                        <i class="fas fa-trash" onclick="deleteEntry('${key}')"></i></div></div>`;
                reportBody.innerHTML += `<tr><td>${v.date}</td><td>${v.subCat}</td><td>${v.desc}</td><td style="color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}">${v.amt} kr</td></tr>`;
            });
            document.getElementById('total-income').innerText = ti.toLocaleString() + " kr";
            document.getElementById('total-expense').innerText = te.toLocaleString() + " kr";
            document.getElementById('total-netto').innerText = (ti - te).toLocaleString() + " kr";
            document.getElementById('res-total').innerText = (ti - te).toLocaleString() + " kr";
        });
    }

    function deleteEntry(id) { if(confirm("Ma hubtaa inaad tirtirto?")) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).remove(); }
    function editEntry(id, desc, amt, cat) {
        document.getElementById('edit-id').value = id; document.getElementById('entry-desc').value = desc;
        document.getElementById('entry-amt').value = amt; document.getElementById('entry-category').value = cat;
        showTab('add');
    }

    auth.onAuthStateChanged(user => {
        if(user) { document.getElementById('auth-page').style.display='none'; document.getElementById('main-app').style.display='block'; loadData(); }
        else { document.getElementById('auth-page').style.display='block'; document.getElementById('main-app').style.display='none'; }
    });

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
    }

    function handleAuth() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).catch(err => alert(err.message)); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
</script>
</body>
</html>
