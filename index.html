<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #121420; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #1e213a; border-radius: 16px; padding: 18px; border: 1px solid #2d314d; }
        input, select { background: #2d314d !important; color: white !important; border: 1px solid #3d4266 !important; border-radius: 12px; padding: 14px; width: 100%; margin-bottom: 12px; outline: none; }
        .hidden { display: none !important; }
        .btn-grad { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: black; font-weight: 900; }
        .lang-btn { padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; border: 1px solid #3d4266; }
    </style>
</head>
<body class="pb-24">

    <div id="authSection" class="fixed inset-0 bg-[#121420] z-[2000] flex items-center justify-center p-6">
        <div class="bg-[#1e213a] p-8 rounded-3xl w-full max-w-sm border-b-4 border-yellow-500 shadow-2xl">
            <h1 class="text-yellow-500 font-black text-2xl mb-8 text-center uppercase">M. Salad Login</h1>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="handleAuth()" class="w-full btn-grad py-4 rounded-xl mt-4 uppercase">LOGIN</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-2">
                <button onclick="setLang('so')" class="lang-btn bg-yellow-500 text-black">SO</button>
                <button onclick="setLang('en')" class="lang-btn bg-gray-800">EN</button>
                <button onclick="setLang('no')" class="lang-btn bg-gray-800">NO</button>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold border border-red-500/20 px-4 py-2 rounded-xl text-[10px]">KA BAX</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="card border-l-4 border-green-500 text-center">
                <p class="text-[9px] text-gray-400 font-bold uppercase" id="lbl-inntekt">INNTEKT</p>
                <h3 id="totalIncome" class="text-lg font-black text-green-400">0 kr</h3>
            </div>
            <div class="card border-l-4 border-red-500 text-center">
                <p class="text-[9px] text-gray-400 font-bold uppercase" id="lbl-utgift">UTGIFT</p>
                <h3 id="totalExpense" class="text-lg font-black text-red-400">0 kr</h3>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-4 text-center">
            <div class="card p-2 border-b-2 border-blue-500">
                <p class="text-[7px] text-gray-500 uppercase font-bold">MVA 25%</p>
                <h4 id="totalMva" class="text-[10px] font-black text-blue-400">0 kr</h4>
            </div>
            <div class="card p-2 border-b-2 border-orange-500">
                <p class="text-[7px] text-gray-500 uppercase font-bold">Feriepenger</p>
                <h4 id="totalFerie" class="text-[10px] font-black text-orange-400">0 kr</h4>
            </div>
            <div class="card p-2 border-b-2 border-purple-500">
                <p class="text-[7px] text-gray-500 uppercase font-bold">EIER (OWNER)</p>
                <h4 id="totalOwner" class="text-[10px] font-black text-purple-400">0 kr</h4>
            </div>
        </div>

        <div class="card bg-gradient-to-br from-[#2d314d] to-[#1e213a] border-2 border-yellow-500/20 text-center py-6 mb-6 shadow-xl">
            <p class="text-[11px] text-yellow-500 font-black uppercase mb-1" id="lbl-net">NET RESULT</p>
            <h2 id="netResult" class="text-3xl font-black">0 kr</h2>
        </div>

        <div id="dashboardSection" class="section space-y-3 pb-10"></div>

        <div id="inputSection" class="section hidden">
            <div class="card">
                <div class="flex gap-2 mb-6">
                    <button onclick="setMode('income')" id="m-inc" class="flex-1 py-4 rounded-xl font-black bg-green-600 text-xs">INNTEKT</button>
                    <button onclick="setMode('expense')" id="m-exp" class="flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs">UTGIFT</button>
                </div>
                <input type="date" id="dateInput">
                <input type="text" id="nameInput" placeholder="Name">
                <input type="number" id="amountInput" placeholder="Amount">
                <select id="typeInput"></select>
                <button onclick="saveData()" class="w-full btn-grad py-4 rounded-xl font-black uppercase mt-4">SAVE</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#1e213a] border-t border-white/5 flex justify-around py-5">
        <button onclick="showSection('dashboard')" id="nav-dash" class="text-yellow-500 flex flex-col items-center gap-1"><i class="fas fa-home text-xl"></i><span class="text-[10px] font-bold">Dashbord</span></button>
        <button onclick="showSection('input')" id="nav-inp" class="opacity-40 flex flex-col items-center gap-1"><i class="fas fa-plus-circle text-xl"></i><span class="text-[10px] font-bold">Add New</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, currentMode = 'income';

        onAuthStateChanged(auth, u => {
            if(u) { user = u; document.getElementById('authSection').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); loadData(); }
            else { document.getElementById('authSection').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
        });

        window.loadData = () => {
            const list = document.getElementById('dashboardSection');
            const collections = [
                { name: 'transfers', mode: 'income' },
                { name: 'xisaabaadka', mode: 'expense' }
            ];

            let itemsMap = new Map();

            collections.forEach(col => {
                onSnapshot(collection(db, col.name), snap => {
                    snap.forEach(doc => {
                        const d = doc.data();
                        itemsMap.set(doc.id, { id: doc.id, source: col.name, ...d, mode: d.mode || col.mode });
                    });

                    let ti=0, te=0, to=0;
                    list.innerHTML = '';
                    const sorted = Array.from(itemsMap.values()).sort((a,b) => new Date(b.date) - new Date(a.date));

                    sorted.forEach(item => {
                        const amt = Number(item.amount) || 0;
                        if(item.mode === 'income') ti += amt; else te += amt;
                        if(item.type?.includes("Bankuttak") || item.name?.toLowerCase().includes("lønn")) to += amt;

                        list.innerHTML += `
                            <div class="card flex justify-between items-center border-l-4 ${item.mode === 'income' ? 'border-green-500' : 'border-red-500'} mb-2">
                                <div>
                                    <p class="font-bold text-[11px] uppercase">${item.name || item.type || 'Salad'}</p>
                                    <p class="text-[9px] text-gray-500">${item.date || '2026'}</p>
                                </div>
                                <div class="flex items-center gap-4">
                                    <p class="font-black ${item.mode === 'income' ? 'text-green-400' : 'text-red-400'}">${amt.toLocaleString()} kr</p>
                                    <button onclick="deleteItem('${item.source}', '${item.id}')" class="bg-red-500/10 p-2 rounded-lg text-red-500 hover:bg-red-500 hover:text-white transition">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </div>`;
                    });

                    document.getElementById('totalIncome').innerText = ti.toLocaleString() + ' kr';
                    document.getElementById('totalExpense').innerText = te.toLocaleString() + ' kr';
                    document.getElementById('totalMva').innerText = (te * 0.25).toLocaleString() + ' kr';
                    document.getElementById('totalFerie').innerText = (ti * 0.102).toLocaleString() + ' kr';
                    document.getElementById('totalOwner').innerText = to.toLocaleString() + ' kr';
                    document.getElementById('netResult').innerText = (ti - te).toLocaleString() + ' kr';
                });
            });
        };

        window.setLang = (l) => {
            const t = {
                so: { inn: "DAKHLI", utg: "KHARASH", net: "FAA'IIDO (NET)" },
                en: { inn: "INCOME", utg: "EXPENSE", net: "NET PROFIT" },
                no: { inn: "INNTEKT", utg: "UTGIFT", net: "NETTO RESULTAT" }
            };
            document.getElementById('lbl-inntekt').innerText = t[l].inn;
            document.getElementById('lbl-utgift').innerText = t[l].utg;
            document.getElementById('lbl-net').innerText = t[l].net;
        };

        window.saveData = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value);
            if(!amt) return;
            await addDoc(collection(db, currentMode === 'income' ? 'transfers' : 'xisaabaadka'), {
                amount: amt, name: document.getElementById('nameInput').value,
                mode: currentMode, type: document.getElementById('typeInput').value,
                date: document.getElementById('dateInput').value, createdAt: Date.now()
            });
            document.getElementById('amountInput').value = ''; showSection('dashboard');
        };

        window.deleteItem = async (c, id) => { if(confirm("Ma tirtirtaa xogtan?")) await deleteDoc(doc(db, c, id)); };
        
        window.setMode = (m) => {
            currentMode = m;
            document.getElementById('m-inc').className = m === 'income' ? 'flex-1 py-4 rounded-xl font-black bg-green-600 text-xs text-white' : 'flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs text-white';
            document.getElementById('m-exp').className = m === 'expense' ? 'flex-1 py-4 rounded-xl font-black bg-red-600 text-xs text-white' : 'flex-1 py-4 rounded-xl font-black bg-gray-700 text-xs text-white';
            const opts = m === 'income' ? ['Faktura', 'Kontanter'] : ['Shidaal', 'Lønn', 'Forsikring', 'Bankuttak (Owner)'];
            document.getElementById('typeInput').innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
        };

        window.showSection = (s) => {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById(s+'Section').classList.remove('hidden');
            document.getElementById('nav-dash').style.opacity = s === 'dashboard' ? '1' : '0.4';
            document.getElementById('nav-inp').style.opacity = s === 'input' ? '1' : '0.4';
        };

        window.handleAuth = () => signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passInput').value).catch(e => alert("Login failed"));
        window.logout = () => signOut(auth);
        document.getElementById('dateInput').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
