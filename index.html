<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #252945; border-radius: 15px; padding: 15px; border: 1px solid #30355a; }
        input, select { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        .hidden { display: none !important; }
        .nav-active { color: #fbbf24 !important; opacity: 1 !important; }
    </style>
</head>
<body class="pb-24">

    <!-- LOGIN -->
    <div id="authSection" class="fixed inset-0 bg-[#1a1c2c] z-[2000] flex items-center justify-center p-6">
        <div class="bg-[#252945] p-8 rounded-3xl w-full max-w-sm border-t-4 border-yellow-400 text-center shadow-2xl">
            <h1 class="text-yellow-400 font-black text-2xl mb-6">M. SALAD LOGIN</h1>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="handleAuth()" class="w-full bg-yellow-400 text-black py-4 rounded-xl font-black mt-2 uppercase shadow-lg">LOGIN</button>
            <button onclick="resetPassword()" class="text-yellow-400/60 text-[10px] mt-6 block w-full hover:underline font-bold">Password ma ilowday?</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden p-4">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-1">
                <button onclick="changeLang('so')" class="bg-gray-700 px-2.5 py-1 rounded text-[10px] font-bold uppercase">SO</button>
                <button onclick="changeLang('no')" class="bg-yellow-400 text-black px-2.5 py-1 rounded text-[10px] font-bold uppercase">NO</button>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold border border-red-500/30 px-3 py-1.5 rounded-lg text-[10px]">KA BAX</button>
        </div>

        <h2 class="text-center font-black text-yellow-400 text-xl mb-6 uppercase tracking-widest">M. Salad Transport</h2>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 gap-2 mb-2">
            <div class="card border-l-4 border-green-500 text-center">
                <p id="t-inc" class="text-[8px] text-gray-400 font-bold uppercase">Inntekt</p>
                <h3 id="totalIncome" class="text-sm font-black text-green-400">0 kr</h3>
            </div>
            <div class="card border-l-4 border-red-500 text-center">
                <p id="t-exp" class="text-[8px] text-gray-400 font-bold uppercase">Utgift</p>
                <h3 id="totalExpense" class="text-sm font-black text-red-400">0 kr</h3>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="card border-l-4 border-blue-400 text-center p-2">
                <p class="text-[7px] text-gray-400 font-bold uppercase">MVA (25%)</p>
                <h3 id="totalMva" class="text-[10px] font-black text-blue-400">0 kr</h3>
            </div>
            <div class="card border-l-4 border-orange-400 text-center p-2">
                <p class="text-[7px] text-gray-400 font-bold uppercase">Feriepenger</p>
                <h3 id="totalFerie" class="text-[10px] font-black text-orange-400">0 kr</h3>
            </div>
            <div class="card border-l-4 border-purple-400 text-center p-2">
                <p id="t-own" class="text-[7px] text-gray-400 font-bold uppercase">Eier</p>
                <h3 id="totalOwner" class="text-[10px] font-black text-purple-400">0 kr</h3>
            </div>
        </div>

        <div class="card border-2 border-yellow-400/20 text-center py-6 mb-6">
            <p id="t-net" class="text-[10px] text-yellow-400 font-bold uppercase tracking-widest mb-1">Net Resultat</p>
            <h2 id="netResult" class="text-3xl font-black">0 kr</h2>
        </div>

        <div id="dashboardSection" class="section space-y-3"></div>

        <!-- Input Section -->
        <div id="inputSection" class="section hidden">
            <div class="card p-6">
                <div class="flex gap-2 mb-6">
                    <button onclick="setMode('income')" id="m-inc" class="flex-1 py-3 rounded-lg font-black bg-green-600 text-[10px]">INCOME</button>
                    <button onclick="setMode('expense')" id="m-exp" class="flex-1 py-3 rounded-lg font-black bg-gray-700 text-[10px]">UTGIFT</button>
                </div>
                <input type="date" id="dateInput">
                <input type="text" id="nameInput" placeholder="Tusaale: Salad Drivstoff">
                <input type="number" id="amountInput" placeholder="Beløp (Amount)">
                <select id="typeInput"></select>
                <button onclick="saveData()" id="btn-save" class="w-full bg-yellow-400 text-black py-4 rounded-xl font-black uppercase mt-4">KAYDI / LAGRE</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-0 w-full bg-[#252945] border-t border-white/5 flex justify-around py-4">
        <button onclick="showSection('dashboard')" id="nav-dash" class="nav-active flex flex-col items-center gap-1 opacity-50"><i class="fas fa-list-ul"></i><span class="text-[10px] font-bold">Oversikt</span></button>
        <button onclick="showSection('input')" id="nav-inp" class="flex flex-col items-center gap-1 opacity-50"><i class="fas fa-plus-circle"></i><span class="text-[10px] font-bold">Legg til</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, mode = 'income';

        onAuthStateChanged(auth, u => {
            if(u) { user = u; document.getElementById('authSection').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); loadData(); }
            else { document.getElementById('authSection').classList.remove('hidden'); document.getElementById('mainApp').classList.add('hidden'); }
        });

        window.loadData = () => {
            // Halkan waxaan ku daray xog kasta oo laga yaabo in xogtaadii hore ku jirtay
            const collections = ['transfers', 'data', 'xisaabaadka', 'records'];
            let ti=0, te=0, tmva=0, tferie=0, town=0;
            const list = document.getElementById('dashboardSection');
            list.innerHTML = '';

            collections.forEach(cName => {
                onSnapshot(collection(db, cName), snap => {
                    snap.forEach(dDoc => {
                        const d = dDoc.data();
                        const n = d.name || "";
                        
                        // XALKA: Koodhku wuxuu hadda soo saarayaa xog kasta oo magaca "Salad" uu ku jiro
                        if(n.toLowerCase().includes("salad") || d.userId === user.uid) {
                            const amt = Number(d.amount) || 0;
                            
                            // Kala saarista dakhliga iyo kharashka (haddii d.mode uusan jirin)
                            let currentMode = d.mode;
                            if (!currentMode) {
                                if (n.toLowerCase().includes("faktura") || cName === 'xisaabaadka') currentMode = 'income';
                                else currentMode = 'expense';
                            }

                            if(currentMode === 'income') {
                                ti += amt;
                                tmva += (amt * 0.25);
                                tferie += (amt * 0.102);
                            } else {
                                te += amt;
                            }
                            
                            if(n.toLowerCase().includes("lønn") || n.toLowerCase().includes("owner") || d.typeKey === 'Withdrawal') town += amt;

                            list.innerHTML += `<div class="card flex justify-between items-center border-l-4 ${currentMode === 'income' ? 'border-green-500' : 'border-red-500'} mb-2">
                                <div><p class="font-bold text-xs uppercase">${n}</p><p class="text-[9px] text-gray-500">${d.date || 'Jan-Apr Data'}</p></div>
                                <div class="flex items-center gap-4"><p class="font-black ${currentMode === 'income' ? 'text-green-400' : 'text-red-400'}">${amt.toLocaleString()} kr</p>
                                <button onclick="deleteItem('${cName}', '${dDoc.id}')" class="text-gray-600"><i class="fas fa-trash-alt"></i></button></div>
                            </div>`;
                        }
                    });
                    document.getElementById('totalIncome').innerText = ti.toLocaleString() + ' kr';
                    document.getElementById('totalExpense').innerText = te.toLocaleString() + ' kr';
                    document.getElementById('totalMva').innerText = tmva.toLocaleString() + ' kr';
                    document.getElementById('totalFerie').innerText = tferie.toLocaleString() + ' kr';
                    document.getElementById('totalOwner').innerText = town.toLocaleString() + ' kr';
                    document.getElementById('netResult').innerText = (ti - te).toLocaleString() + ' kr';
                });
            });
        };

        window.handleAuth = () => signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passInput').value).catch(() => alert("Email/Password khaldan!"));
        window.resetPassword = () => { const e = document.getElementById('emailInput').value; if(e) sendPasswordResetEmail(auth, e).then(() => alert("Email ayaa laguu soo diray!")); };
        window.saveData = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value);
            if(!amt) return;
            await addDoc(collection(db, "transfers"), {
                userId: user.uid, amount: amt, name: document.getElementById('nameInput').value,
                mode: mode, typeKey: document.getElementById('typeInput').value, date: document.getElementById('dateInput').value
            });
            document.getElementById('amountInput').value = '';
            showSection('dashboard');
        };
        window.deleteItem = async (c, id) => { if(confirm("Ma tirtirtaa xogtan?")) await deleteDoc(doc(db, c, id)); };
        window.setMode = (m) => {
            mode = m;
            document.getElementById('m-inc').className = m === 'income' ? 'flex-1 py-3 rounded-lg font-black bg-green-600 text-[10px]' : 'flex-1 py-3 rounded-lg font-black bg-gray-700 text-[10px]';
            document.getElementById('m-exp').className = m === 'expense' ? 'flex-1 py-3 rounded-lg font-black bg-red-600 text-[10px]' : 'flex-1 py-3 rounded-lg font-black bg-gray-700 text-[10px]';
            const opts = m === 'income' ? ['Faktura', 'Kontanter', 'Annet'] : ['Drivstoff', 'Lønn', 'Feriepenger', 'MVA Betaling', 'Regnskap', 'Reparasjon', 'Anet'];
            document.getElementById('typeInput').innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
        };
        window.showSection = (s) => {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById(s+'Section').classList.remove('hidden');
        };
        window.changeLang = (l) => {
            const d = { so: { inc: "INCOME", exp: "UTGIFT", own: "EIER", net: "RESULTAT" }, no: { inc: "INNTEKT", exp: "UTGIFT", own: "EIER", net: "RESULTAT" } }[l];
            document.getElementById('t-inc').innerText = d.inc; document.getElementById('t-exp').innerText = d.exp; document.getElementById('t-own').innerText = d.own; document.getElementById('t-net').innerText = d.net;
        };
        window.logout = () => signOut(auth);
        document.getElementById('dateInput').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
