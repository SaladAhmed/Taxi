<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .card { background: #252945; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #30355a; position: relative; }
        #authSection { position: fixed; inset: 0; background: #1a1c2c; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .auth-card { background: #252945; border-radius: 15px; padding: 20px; width: 100%; max-width: 320px; border-top: 4px solid #fbbf24; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-input { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 8px; padding: 10px; width: 100%; font-size: 14px; margin-bottom: 8px; outline: none; }
        .auth-btn { width: 100%; background-color: #fbbf24; color: black; padding: 12px; border-radius: 10px; font-weight: bold; text-transform: uppercase; font-size: 14px; margin-top: 10px; border: none; cursor: pointer; }
        .lang-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; transition: 0.3s; background: #374151; color: white !important; border: none; cursor: pointer; }
        .active-lang { background: #fbbf24 !important; color: black !important; }
        .result-card { background: linear-gradient(135deg, #30355a 0%, #1a1c2c 100%); border: 2px solid #fbbf24; }
        input, select { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; font-size: 16px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        nav button { transition: 0.3s; opacity: 0.6; background: none; border: none; color: white; cursor: pointer; }
        nav button.active { opacity: 1; color: #fbbf24; }
    </style>
</head>
<body class="pb-24">

    <!-- LOGIN SCREEN -->
    <div id="authSection">
        <div class="w-full flex flex-col items-center">
            <h1 class="text-xl font-black text-yellow-400 mb-4 uppercase tracking-wider">M. Salad Transport</h1>
            <div class="auth-card text-center">
                <h2 id="authTitle" class="text-white text-sm font-bold mb-4 uppercase tracking-widest">Login</h2>
                <input type="email" id="emailInput" class="auth-input" placeholder="Email">
                <input type="password" id="passInput" class="auth-input" placeholder="Password">
                <button id="mainAuthBtn" onclick="handleAuth()" class="auth-btn shadow-lg mb-4">Login</button>
                <div class="flex flex-col gap-2">
                    <button id="toggleAuthBtn" onclick="toggleAuthMode()" class="text-gray-400 text-[10px] font-bold uppercase transition">Sign Up</button>
                    <button onclick="resetPassword()" class="text-yellow-400 text-[9px] font-bold uppercase hover:underline">Forgot Password?</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden p-4">
        <div class="mb-4">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2">
                    <button onclick="changeLang('so')" id="btn-so" class="lang-btn">SO</button>
                    <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
                    <button onclick="changeLang('no')" id="btn-no" class="lang-btn">NO</button>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleVisibility()" class="text-yellow-400 text-xl"><i id="eyeIcon" class="fas fa-eye"></i></button>
                    <button onclick="logout()" class="text-red-400 font-bold border border-red-900/30 px-3 py-1 rounded text-[10px] uppercase">Ka Bax</button>
                </div>
            </div>
            
            <h1 class="text-lg font-black text-yellow-400 uppercase tracking-tighter text-center mb-4">M. Salad Transport</h1>
            
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="card border-l-4 border-green-500 p-2"><p id="label-income" class="text-[8px] text-gray-400 uppercase font-bold">DAKHLI</p><h2 id="totalIncome" class="text-xs font-bold text-green-400">0 kr</h2></div>
                <div class="card border-l-4 border-red-500 p-2"><p id="label-expense" class="text-[8px] text-gray-400 uppercase font-bold">KHARASH</p><h2 id="totalExpense" class="text-xs font-bold text-red-400">0 kr</h2></div>
                <div class="card border-l-4 border-blue-400 p-2"><p id="label-owner" class="text-[8px] text-gray-400 uppercase font-bold">EIER</p><h2 id="totalOwner" class="text-xs font-bold text-blue-400">0 kr</h2></div>
            </div>

            <div class="card result-card mt-2">
                <div class="grid grid-cols-2 border-b border-gray-600 pb-2 mb-2 text-orange-400 font-bold text-center">
                    <div><p id="label-mva" class="text-[9px] text-gray-400 uppercase">MVA REFUND</p><p id="mvaTax" class="text-sm">0 kr</p></div>
                    <div><p id="label-ferie" class="text-[9px] text-gray-400 uppercase">FERIEPENGER</p><p id="ferieTax" class="text-sm">0 kr</p></div>
                </div>
                <div class="text-center"><p id="label-net" class="text-[10px] text-yellow-400 uppercase font-bold">NETTO RESULTAT</p><h2 id="netResult" class="text-2xl font-black mt-1">0 kr</h2></div>
            </div>
        </div>
        
        <div id="dashboardSection" class="section"><div id="transactionList" class="space-y-2"></div></div>
        <div id="statsSection" class="section hidden"><div id="categoryTotals" class="space-y-2"></div></div>
        <div id="inputSection" class="section hidden">
            <div class="card p-4">
                <div class="flex gap-2 mb-6 font-bold uppercase text-xs">
                    <button onclick="setMode('income')" id="modeInc" class="flex-1 py-3 rounded-xl bg-green-600 text-white shadow-lg">Income ↑</button>
                    <button onclick="setMode('expense')" id="modeExp" class="flex-1 py-3 rounded-xl bg-gray-700">Kharash ↓</button>
                </div>
                <div class="space-y-2">
                    <input type="date" id="dateInput">
                    <input type="text" id="nameInput" placeholder="Magaca">
                    <input type="number" id="amountInput" placeholder="Lacagta (Kr)">
                    <select id="typeInput"></select>
                    <button onclick="saveEntry()" id="btnSave" class="w-full bg-yellow-400 text-black py-4 rounded-2xl font-black mt-4 uppercase">Kaydi</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="bottomNav" class="fixed bottom-0 w-full bg-[#252945] border-t border-gray-800 flex justify-around py-3 z-50 hidden">
        <button onclick="showSection('dashboard')" id="nav-dashboard" class="active flex flex-col items-center"><i class="fas fa-list-ul"></i><span id="nav-text-dashboard" class="text-[10px]">Oversikt</span></button>
        <button onclick="showSection('stats')" id="nav-stats" class="flex flex-col items-center"><i class="fas fa-chart-pie"></i><span id="nav-text-stats" class="text-[10px]">Rapport</span></button>
        <button onclick="showSection('input')" id="nav-input" class="flex flex-col items-center"><i class="fas fa-plus-circle"></i><span id="nav-text-input" class="text-[10px]">Legg til</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null, mode = 'income', isHidden = false, currentLang = localStorage.getItem('appLang') || 'no';

        const i18n = {
            so: { income: "DAKHLI", expense: "KHARASH", owner: "OWNER", mva: "MVA REFUND", ferie: "FERIEPENGER", net: "NETTO RESULTAT", nav1: "Guudmar", nav2: "Warbixin", nav3: "Geli Xog", placeholder_name: "Magaca", placeholder_amt: "Lacagta", btn_save: "KAYDI" },
            en: { income: "INCOME", expense: "EXPENSE", owner: "OWNER", mva: "VAT REFUND", ferie: "HOLIDAY PAY", net: "NET PROFIT", nav1: "Summary", nav2: "Report", nav3: "Add Entry", placeholder_name: "Name", placeholder_amt: "Amount", btn_save: "SAVE" },
            no: { income: "INNTEKT", expense: "UTGIFT", owner: "EIER", mva: "MVA REFUND", ferie: "FERIEPENGER", net: "NETTO RESULTAT", nav1: "Oversikt", nav2: "Rapport", nav3: "Legg til", placeholder_name: "Navn", placeholder_amt: "Beløp", btn_save: "LAGRE" }
        };

        // Furaha (Key) caalami ah oo aan luuqad ku xirnayn
        const masterCats = {
            income: ['TaxiCard', 'Cash', 'Invoice', 'Other'],
            expense: ['Salary', 'Withdrawal', 'Tax', 'Fuel', 'Repair', 'Accounting', 'Insurance', 'Other']
        };

        const catLabels = {
            TaxiCard: { so: 'Kaarka Taksi', en: 'Taxi Card', no: 'Taxi Kort' },
            Cash: { so: 'Caddaan', en: 'Cash', no: 'Kontanter' },
            Invoice: { so: 'Faktura', en: 'Invoice', no: 'Faktura' },
            Other: { so: 'Wax kale', en: 'Other', no: 'Annet' },
            Salary: { so: 'Mushaar', en: 'Salary', no: 'Lønn' },
            Withdrawal: { so: 'Eieruttak', en: 'Withdrawal', no: 'Eieruttak' },
            Tax: { so: 'Skatt', en: 'Tax', no: 'Skatt' },
            Fuel: { so: 'Shidaal', en: 'Fuel', no: 'Drivstoff' },
            Repair: { so: 'Dayactir', en: 'Repair', no: 'Reparasjon' },
            Accounting: { so: 'Regnskap', en: 'Accounting', no: 'Regnskap' },
            Insurance: { so: 'Forsikring', en: 'Insurance', no: 'Forsikring' }
        };

        window.toggleAuthMode = () => {
            const isLogin = document.getElementById('authTitle').innerText === 'Login';
            document.getElementById('authTitle').innerText = isLogin ? 'Sign Up' : 'Login';
            document.getElementById('mainAuthBtn').innerText = isLogin ? 'Create Account' : 'Login';
        };

        window.handleAuth = () => {
            const email = document.getElementById('emailInput').value, pass = document.getElementById('passInput').value;
            if(!email || !pass) return alert("Fadlan buuxi");
            if(document.getElementById('authTitle').innerText === 'Sign Up') createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            else signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Cillad!"));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('bottomNav').classList.remove('hidden');
                changeLang(currentLang);
                loadData();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        window.loadData = () => {
            if(!currentUser) return;
            const q = query(collection(db, "xisaabaadka"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('transactionList');
                const statsList = document.getElementById('categoryTotals');
                list.innerHTML = ''; statsList.innerHTML = '';
                let ti=0, te=0, ownerSum=0, mvaSum=0, totalFP=0;
                let catTotals = {};

                snapshot.forEach((docSnap) => {
                    const d = docSnap.data();
                    if (!d.userId || d.userId === currentUser.uid) {
                        const amt = Number(d.amount) || 0;
                        const dName = d.name || "Xog";
                        const typeKey = d.typeKey || d.type; // Aqoonsi ku salaysan furaha

                        // Luuqadda isbedbedesha ee list-ka
                        const displayType = catLabels[typeKey] ? catLabels[typeKey][currentLang] : typeKey;

                        if(d.mode === 'income') {
                            ti += amt;
                            if(typeKey === 'Invoice' || typeKey === 'Other') mvaSum += (amt * 0.25);
                        } else {
                            te += amt;
                            if(typeKey === 'Withdrawal') ownerSum += amt;
                            if(typeKey === 'Salary') totalFP += (amt * 0.102);
                            if(['Fuel', 'Repair', 'Accounting'].includes(typeKey)) mvaSum += (amt / 5);
                        }
                        
                        catTotals[typeKey] = (catTotals[typeKey] || 0) + amt;

                        const displayAmt = isHidden ? "**** kr" : Math.round(amt).toLocaleString() + " kr";
                        const borderColor = d.mode === 'income' ? 'border-green-500' : 'border-red-500';
                        const textColor = d.mode === 'income' ? 'text-green-400' : 'text-red-400';

                        list.innerHTML += `<div class="card flex justify-between items-center border-l-4 ${borderColor}">
                            <div><p class="text-[9px] text-yellow-400 font-bold uppercase">${dName}</p><p class="text-sm font-bold">${displayType}</p><p class="text-[10px] text-gray-500">${d.date}</p></div>
                            <div class="flex items-center gap-3"><p class="font-bold ${textColor}">${displayAmt}</p>
                            <button onclick="deleteItem('${docSnap.id}')" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button></div></div>`;
                    }
                });

                for (const [key, total] of Object.entries(catTotals)) {
                    const label = catLabels[key] ? catLabels[key][currentLang] : key;
                    statsList.innerHTML += `<div class="card flex justify-between border-l-4 border-gray-500"><span class="font-bold text-sm text-gray-200">${label}</span><span class="font-bold">${isHidden ? "**** kr" : Math.round(total).toLocaleString() + " kr"}</span></div>`;
                }

                const format = (v) => isHidden ? "**** kr" : Math.round(v).toLocaleString() + " kr";
                document.getElementById('totalIncome').innerText = format(ti);
                document.getElementById('totalExpense').innerText = format(te);
                document.getElementById('totalOwner').innerText = format(ownerSum);
                document.getElementById('mvaTax').innerText = format(mvaSum);
                document.getElementById('ferieTax').innerText = format(totalFP);
                document.getElementById('netResult').innerText = format(ti - te - totalFP);
            });
        };

        window.saveEntry = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value), date = document.getElementById('dateInput').value;
            const typeKey = document.getElementById('typeInput').value;
            if(amt && date) {
                await addDoc(collection(db, "xisaabaadka"), { 
                    amount: amt, date: date, name: document.getElementById('nameInput').value || "Xog", 
                    typeKey: typeKey, mode: mode, userId: currentUser.uid 
                });
                document.getElementById('amountInput').value = ''; showSection('dashboard');
            }
        };

        window.setMode = (m) => {
            mode = m;
            document.getElementById('modeInc').className = m === 'income' ? 'flex-1 py-3 rounded-xl bg-green-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl bg-gray-700';
            document.getElementById('modeExp').className = m === 'expense' ? 'flex-1 py-3 rounded-xl bg-red-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl bg-gray-700';
            
            let options = '';
            masterCats[m].forEach(key => {
                const label = catLabels[key] ? catLabels[key][currentLang] : key;
                options += `<option value="${key}">${label}</option>`;
            });
            document.getElementById('typeInput').innerHTML = options;
        };

        window.changeLang = (lang) => {
            currentLang = lang; localStorage.setItem('appLang', lang);
            const t = i18n[lang];
            document.getElementById('label-income').innerText = t.income;
            document.getElementById('label-expense').innerText = t.expense;
            document.getElementById('label-owner').innerText = t.owner;
            document.getElementById('label-mva').innerText = t.mva;
            document.getElementById('label-ferie').innerText = t.ferie;
            document.getElementById('label-net').innerText = t.net;
            document.getElementById('nav-text-dashboard').innerText = t.nav1;
            document.getElementById('nav-text-stats').innerText = t.nav2;
            document.getElementById('nav-text-input').innerText = t.nav3;
            document.getElementById('nameInput').placeholder = t.placeholder_name;
            document.getElementById('amountInput').placeholder = t.placeholder_amt;
            document.getElementById('btnSave').innerText = t.btn_save;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
            document.getElementById('btn-' + lang).classList.add('active-lang');
            setMode(mode);
            loadData();
        };

        window.showSection = (s) => {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById(s + 'Section').classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + s).classList.add('active');
        };

        window.deleteItem = async (id) => { if(confirm("Tirtir?")) await deleteDoc(doc(db, "xisaabaadka", id)); };
        window.toggleVisibility = () => { isHidden = !isHidden; loadData(); };
        document.getElementById('dateInput').valueAsDate = new Date();
    </script>
</body>
</html>
