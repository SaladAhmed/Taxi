<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Full Regnskap</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .theme-toggle { cursor: pointer; font-size: 20px; color: var(--yellow); }

        .auth-container { padding: 30px; text-align: center; max-width: 400px; margin: 40px auto; background: var(--card); border-radius: 15px; }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .stat-box { background: var(--card); border: 1.5px solid; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-box small { font-size: 9px; display: block; margin-bottom: 5px; font-weight: bold; }

        .mva-card { background: var(--card); border: 2px solid var(--border); border-radius: 15px; margin: 10px auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 780px; }
        .mva-item { text-align: center; border-right: 1px solid var(--border); }
        .mva-item:last-child { border-right: none; }

        .summary-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 15px auto; padding: 20px; text-align: center; max-width: 770px; }
        
        .view-toggle { display: flex; justify-content: space-between; padding: 0 15px; gap: 10px; max-width: 800px; margin: auto; }
        #month-filter { background: var(--card); color: var(--text); border: 1px solid var(--yellow); padding: 8px 15px; border-radius: 20px; }

        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 10px 15px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }

        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--yellow); margin-bottom: 10px; cursor: pointer; }
        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        
        #scanner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="auth-page" class="auth-container">
    <h2 id="auth-title">LOGG INN</h2>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    <p style="margin-top:15px; font-size:12px; cursor:pointer; color:var(--yellow)" onclick="forgotPassword()">Glemt passord?</p>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        <div id="user-display-name" style="font-weight:bold; color:var(--yellow)">...</div>
    </div>

    <div id="page-dash" class="page">
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small>INNTEKT</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small>UTGIFTER</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small>NETTO</small><span id="total-netto">0 kr</span></div>
        </div>
        <div class="mva-card">
            <div class="mva-item"><small>Skyldig MVA</small><br><b id="res-mva">0 kr</b></div>
            <div class="mva-item"><small>AGA (14.1%)</small><br><b id="res-aga">0 kr</b></div>
            <div class="mva-item"><small>Feriepenger</small><br><b id="res-fp">0 kr</b></div>
            <div class="mva-item"><small>Avskrivning</small><br><b id="res-avsk">0 kr</b></div>
        </div>
        <div class="summary-card">
            <small>TOTAL RESULTAT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        <div class="view-toggle">
            <select id="month-filter" onchange="loadData()"></select>
            <button onclick="downloadReport()" style="background:var(--green); border:none; color:white; padding:10px 15px; border-radius:15px;"><i class="fas fa-file-excel"></i> CSV</button>
            <button onclick="toggleHideValues()" style="background:var(--blue); border:none; color:white; padding:10px 15px; border-radius:15px;"><i class="fas fa-eye"></i></button>
        </div>
        <div id="entries-list"></div>
    </div>

    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="header-title">REGISTRER DATA</div>
        <button onclick="startScanner()" style="width:100%; margin-bottom:15px; padding:10px; border-radius:10px; background:var(--card); color:var(--text); border:1px dashed var(--yellow)"><i class="fas fa-camera"></i> SCAN RECEIPT</button>
        <input type="date" id="entry-date">
        <select id="entry-category" onchange="updateSaveBtnColor()">
            <optgroup label="INNTEKT"><option value="3030">3030 - Kjøreinntekter</option><option value="3110">3110 - Tips</option></optgroup>
            <optgroup label="UTGIFTER">
                <option value="5000">5000 - Lønn</option>
                <option value="7000">7000 - Drivstoff</option>
                <option value="6755">6755 - Sentralavgift</option>
                <option value="7020">7020 - Vedlikehold</option>
                <option value="7798">7798 - Annet</option>
            </optgroup>
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        <button id="l-save-btn" class="btn-save" style="background:var(--green)" onclick="saveData()">LAGRE</button>
    </div>

    <div id="page-profile" class="page" style="display:none; padding: 20px; text-align:center;">
        <div class="header-title">PROFILE</div>
        <input type="file" id="profile-upload" style="display:none" onchange="uploadPhoto(this)">
        <img id="user-photo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-img" onclick="document.getElementById('profile-upload').click()">
        <input type="text" id="profile-name" placeholder="Full Name">
        <button class="btn-save" style="background:var(--blue)" onclick="updateProfile()">UPDATE PROFILE</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-home"></i><br>Oversikt</div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br>Legg til</div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user"></i><br>Profile</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i><br>Logg ut</div>
    </div>
</div>

<div id="scanner-overlay">
    <video id="video" style="width:100%; max-width:400px; border-radius:10px;"></video>
    <button onclick="captureImage()" style="margin-top:20px; padding:15px 30px; border-radius:50px; background:var(--green); color:white; border:none;"><i class="fas fa-camera"></i></button>
    <button onclick="stopScanner()" style="margin-top:10px; color:white; background:none; border:none;">Avbryt</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const storage = firebase.storage();

    let isHidden = false;

    function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }

    function forgotPassword() {
        const e = document.getElementById('email').value;
        if(!e) return alert("Gali email-kaaga marka hore");
        auth.sendPasswordResetEmail(e).then(() => alert("Email dib-u-habeyn ah waa laguu soo diray")).catch(a => alert(a.message));
    }

    function updateSaveBtnColor() {
        const cat = parseInt(document.getElementById('entry-category').value);
        document.getElementById('l-save-btn').style.background = (cat < 4000) ? 'var(--green)' : 'var(--red)';
    }

    function saveData() {
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const cat = document.getElementById('entry-category').value;
        const date = new Date(document.getElementById('entry-date').value);
        if(!amt) return alert("Gali lacagta");
        
        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            desc: document.getElementById('entry-desc').value,
            amt: amt, subCat: cat, mainCat: (parseInt(cat) < 4000 ? 'income' : 'expense'),
            date: date.toLocaleDateString('no-NO'),
            filterKey: (date.getMonth()+1) + "-" + date.getFullYear()
        }).then(() => {
            document.getElementById('entry-amt').value = "";
            showTab('dash');
        });
    }

    function loadData() {
        const filter = document.getElementById('month-filter').value;
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            let ti=0, te=0, mvaIn=0, mvaOut=0, aga=0, fp=0, avsk=0;
            const list = document.getElementById('entries-list');
            list.innerHTML = "";
            if(snap.exists()) {
                snap.forEach(c => {
                    const v = c.val();
                    if(filter === "all" || v.filterKey === filter) {
                        if(v.mainCat === 'income') { ti += v.amt; if(v.subCat !== '3110') mvaIn += (v.amt * 0.1071); }
                        else { te += v.amt; if(['7000','6755','7020'].includes(v.subCat)) mvaOut += (v.amt * 0.20);
                               if(v.subCat === '5000') { aga += (v.amt*0.141); fp += (v.amt*0.102); }
                               if(v.subCat === '6010') avsk += v.amt; }
                        list.innerHTML += `<div class="entry-card" style="border-left-color:${v.mainCat==='income'?'var(--green)':'var(--red)'}">
                            <div><b>${v.desc}</b><br><small>${v.date}</small></div>
                            <div style="color:${v.mainCat==='income'?'var(--green)':'var(--red)'}"><b>${formatVal(v.amt)}</b></div>
                        </div>`;
                    }
                });
            }
            document.getElementById('total-income').innerText = formatVal(ti);
            document.getElementById('total-expense').innerText = formatVal(te);
            document.getElementById('total-netto').innerText = formatVal(ti - te);
            document.getElementById('res-mva').innerText = formatVal(mvaIn - mvaOut);
            document.getElementById('res-aga').innerText = formatVal(aga);
            document.getElementById('res-fp').innerText = formatVal(fp);
            document.getElementById('res-avsk').innerText = formatVal(avsk);
            const total = (ti - te) - (mvaIn - mvaOut + aga + fp);
            document.getElementById('res-total').innerText = formatVal(total);
        });
    }

    function formatVal(v) { return isHidden ? "**** kr" : Math.round(v).toLocaleString() + " kr"; }
    function toggleHideValues() { isHidden = !isHidden; loadData(); }

    function downloadReport() {
        db.ref('users/' + auth.currentUser.uid + '/entries').once('value', snap => {
            let csv = "\uFEFFDato;Kategori;Beskrivelse;Beloep\n";
            snap.forEach(c => { const v = c.val(); csv += `${v.date};${v.subCat};${v.desc};${v.amt}\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Rapport.csv";
            link.click();
        });
    }

    async function startScanner() {
        document.getElementById('scanner-overlay').style.display = 'flex';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('video').srcObject = stream;
        document.getElementById('video').play();
    }

    function stopScanner() {
        const stream = document.getElementById('video').srcObject;
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('scanner-overlay').style.display = 'none';
    }

    async function captureImage() {
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        stopScanner();
        Tesseract.recognize(canvas.toDataURL(), 'nor').then(({ data: { text } }) => {
            const match = text.match(/\d+[\.,]\d+/);
            if(match) document.getElementById('entry-amt').value = match[0].replace(',', '.');
        });
    }

    function uploadPhoto(input) {
        const file = input.files[0];
        const ref = storage.ref('users/' + auth.currentUser.uid + '/profile.jpg');
        ref.put(file).then(() => ref.getDownloadURL()).then(url => {
            db.ref('users/' + auth.currentUser.uid + '/profile/photo').set(url);
            document.getElementById('user-photo').src = url;
        });
    }

    function updateProfile() {
        db.ref('users/' + auth.currentUser.uid + '/profile/fullName').set(document.getElementById('profile-name').value);
        alert("Profile updated!");
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
        if(t==='add') updateSaveBtnColor();
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display='none';
            document.getElementById('main-app').style.display='block';
            db.ref('users/'+user.uid+'/profile').on('value', s => {
                const data = s.val() || {};
                document.getElementById('user-display-name').innerText = data.fullName || "USER";
                if(data.photo) document.getElementById('user-photo').src = data.photo;
            });
            const months = ["Jan", "Feb", "Mar", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Des"];
            let h = '<option value="all">Alt tid</option>';
            months.forEach((n, i) => h += `<option value="${i+1}-2026">${n} 2026</option>`);
            document.getElementById('month-filter').innerHTML = h;
            document.getElementById('month-filter').value = (new Date().getMonth()+1) + "-2026";
            document.getElementById('entry-date').valueAsDate = new Date();
            loadData();
        } else {
            document.getElementById('auth-page').style.display='block';
            document.getElementById('main-app').style.display='none';
        }
    });

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
