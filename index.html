<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salad Transport</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --orange: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; margin-top: 50px; border: 1px solid #334155; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #121826; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-login { background: var(--blue); color: white; }
        .btn-reg { background: #334155; color: white; border: 1px solid var(--blue); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-page">
        <div class="auth-box">
            <h1 style="color: #f1c40f;">🚖 Taxi System</h1>
            <input type="email" id="email" placeholder="Geli Email-kaaga">
            <input type="password" id="pass" placeholder="Geli Password-kaaga">
            <button class="btn-login" onclick="doLogin()">Login (Giriş)</button>
            <button class="btn-reg" onclick="doRegister()">Create New Account</button>
        </div>
    </div>

    <div id="app-page" class="hidden">
        <h2 style="text-align: center; color: #f1c40f;">MOHAMED SALAD TRANSPORT</h2>
        <div id="data-list"></div>
        <button class="btn-login" onclick="addData()">+ Geli Xog Cusub</button>
        <button class="btn-reg" onclick="auth.signOut(); location.reload();">Log Out</button>
    </div>
</div>

<script>
    // Koodhka isku xirka Firebase-kaaga (Config)
    const firebaseConfig = {
      apiKey: "AIzaSyCYNlmTJEV2_WWnHIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function doLogin() {
        auth.signInWithEmailAndPassword(email.value, pass.value)
            .then(() => { showApp(); })
            .catch(e => alert("Cillad: Email ama Password waa khaldan yihiin!"));
    }

    function doRegister() {
        if(pass.value.length < 6) return alert("Password-ku waa inuu ka badnaadaa 6 xaraf");
        auth.createUserWithEmailAndPassword(email.value, pass.value)
            .then(() => { alert("Akoon cusub waa la sameeyay!"); showApp(); })
            .catch(e => alert("Cillad: " + e.message));
    }

    function showApp() {
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('app-page').classList.remove('hidden');
    }
</script>
</body>
</html>
