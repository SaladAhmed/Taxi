<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransportPRO">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; overflow-x: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .lang-btn { cursor: pointer; font-size: 18px; margin-left: 10px; }
        .theme-toggle { cursor: pointer; font-size: 20px; color: var(--yellow); }

        .auth-container { padding: 30px; text-align: center; max-width: 400px; margin: 40px auto; background: var(--card); border-radius: 15px; }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .stat-box { background: var(--card); border: 1.5px solid; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-box small { font-size: 9px; display: block; margin-bottom: 5px; font-weight: bold; }

        .summary-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 10px auto; padding: 20px; text-align: center; max-width: 770px; }
        
        .filter-bar { padding: 10px 20px; max-width: 800px; margin: auto; display: flex; gap: 10px; }
        .filter-select { padding: 8px; border-radius: 10px; background: var(--card); color: var(--text); border: 1px solid var(--border); font-size: 12px; flex: 1; }

        .view-toggle { display: flex; justify-content: space-between; padding: 0 20px; margin-bottom: 10px; max-width: 800px; margin: auto; }
        .view-btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .report-btn { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; }

        .entry-list-container { max-width: 800px; margin: auto; }
        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 0 15px 12px 15px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .menu-dots { cursor: pointer; color: #64748b; padding: 10px; font-size: 20px; }
        .dropdown { position: absolute; right: 20px; top: 45px; background: white; color: black; border-radius: 10px; display: none; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); min-width: 140px; }
        .dropdown div { padding: 10px 15px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #eee; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--yellow); }
        
        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; }
        
        #undo-toast { display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 20px; border-radius: 30px; border: 1px solid var(--yellow); z-index: 2000; align-items: center; gap: 15px; justify-content: space-between; min-width: 200px;}
        #undo-toast button { background: var(--yellow); border: none; padding: 5px 10px; border-radius: 10px; font-weight: bold; }

        #scan-loading { display: none; font-size: 14px; color: var(--yellow); text-align: center; padding: 10px; font-weight: bold; }
        .img-preview { width: 100%; max-height: 200px; object-fit: contain; margin-bottom: 15px; border-radius: 10px; display: none; border: 1px solid var(--border); }
    </style>
</head>
<body id="body-tag">

<div id="undo-toast">
    <span id="undo-msg">Lagret!</span>
    <button onclick="undoSave()">UNDO</button>
</div>

<div id="auth-page" class="auth-container">
    <h2 id="auth-title">LOGG INN</h2>
    <div id="reg-fields" style="display:none">
        <input type="text" id="fname" placeholder="Fornavn">
        <input type="text" id="lname" placeholder="Etternavn">
    </div>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()" id="auth-btn">LOGG INN</button>
    <button onclick="toggleAuth()" style="background:none; border:none; color:var(--yellow); cursor:pointer;">Registrer deg</button>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        <div>
            <span class="lang-btn" onclick="updateLang('no')">🇳🇴</span>
            <span class="lang-btn" onclick="updateLang('so')">🇸🇴</span>
        </div>
    </div>

    <div id="page-dash" class="page">
        <div class="header-title"><span id="user-display-name">Laster...</span></div>
        
        <div class="filter-bar">
            <select id="month-filter" class="filter-select" onchange="renderList()">
                <option value="all">Alle måneder</option>
            </select>
        </div>

        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green);"><small id="l-inc">INNTEKT</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red);"><small id="l-exp">UTGIFTER</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue);"><small id="l-net">NETTO</small><span id="total-netto">0 kr</span></div>
        </div>

        <div class="summary-card">
            <small id="l-res">TOTAL RESULTAT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        
        <div class="view-toggle">
            <button class="report-btn" onclick="downloadReport()"><i class="fas fa-file-download"></i> Report</button>
            <button class="view-btn" id="toggle-view-btn" onclick="toggleView()">Modus: Individuell</button>
        </div>
        
        <div id="entries-list" class="entry-list-container"></div>
    </div>

    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="header-title" id="l-add-title">REGISTRER NY DATA</div>
        <img id="scan-preview" class="img-preview">
        <div id="scan-loading"><i class="fas fa-spinner fa-spin"></i> Reading...</div>
        <select id="entry-category">
            <option value="inc-mva">Inntekt (MVA 25%)</option>
            <option value="exp-fuel">Drivstoff (MVA 25%)</option>
            <option value="exp-fixed">Bilreparasjon (MVA 25%)</option>
            <option value="exp-lonn">Lønn (Skattepliktig)</option>
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        <button class="btn-save" style="background:var(--green)" id="l-btn-inc" onclick="saveData('income')">LAGRE INNTEKT</button>
        <button class="btn-save" style="background:var(--red)" id="l-btn-exp" onclick="saveData('expense')">LAGRE UTGIFT</button>
    </div>

    <div id="page-profile" class="page" style="display:none; padding: 20px;">
        <div class="header-title">PROFILE & SECURITY</div>
        <button class="btn-save" style="background:var(--blue)" onclick="changePassword()">Endre Passord</button>
        <button class="btn-save" style="background:var(--red)" onclick="logout()">Logg ut</button>
    </div>

    <input type="file" id="camera-file" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)">

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-home"></i><span>Oversikt</span></div>
        <div class="nav-item" onclick="document.getElementById('camera-file').click()"><i class="fas fa-camera"></i><span>Scanner</span></div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus"></i><span>Legg til</span></div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user-cog"></i><span>Profile</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.appspot.com",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const storage = firebase.storage();

    let rawData = [];
    let currentMode = 'individual';
    let currentLang = 'no';
    let lastSavedId = null;
    let selectedFile = null;

    function toggleTheme() { document.getElementById('body-tag').classList.toggle('light-theme'); }
    function toggleAuth() {
        const rf = document.getElementById('reg-fields');
        rf.style.display = rf.style.display === 'none' ? 'block' : 'none';
        document.getElementById('auth-title').innerText = rf.style.display === 'none' ? 'LOGG INN' : 'REGISTRER DEG';
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(document.getElementById('reg-fields').style.display === 'none') {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            const fn = document.getElementById('fname').value;
            const ln = document.getElementById('lname').value;
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.ref('users/' + u.user.uid + '/profile').set({ fullName: fn.toUpperCase() + " " + ln.toUpperCase() });
            }).catch(e => alert(e.message));
        }
    }

    async function handleImage(event) {
        const file = event.target.files[0]; if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = e => { 
            const img = document.getElementById('scan-preview');
            img.src = e.target.result; img.style.display = 'block';
            showTab('add');
        };
        reader.readAsDataURL(file);

        document.getElementById('scan-loading').style.display = 'block';
        try {
            const result = await Tesseract.recognize(file, 'nor+eng');
            const matches = result.data.text.replace(/\s/g, '').replace(',', '.').match(/\d+\.\d{2}/g);
            if (matches) document.getElementById('entry-amt').value = Math.max(...matches.map(m => parseFloat(m)));
            document.getElementById('entry-desc').value = "Scanned: " + new Date().toLocaleDateString();
        } catch (e) { console.log(e); }
        document.getElementById('scan-loading').style.display = 'none';
    }

    async function saveData(mainCat) {
        const desc = document.getElementById('entry-desc').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const subCat = document.getElementById('entry-category').value;
        if(!desc || !amt) return alert("Fyll ut!");

        const newRef = db.ref('users/' + auth.currentUser.uid + '/entries').push();
        lastSavedId = newRef.key;
        
        let imgUrl = "";
        if(selectedFile) {
            const sRef = storage.ref(`users/${auth.currentUser.uid}/${lastSavedId}`);
            await sRef.put(selectedFile);
            imgUrl = await sRef.getDownloadURL();
        }

        newRef.set({ desc, amt, subCat, mainCat, imgUrl, date: new Date().toLocaleDateString('no-NO'), timestamp: Date.now() });
        
        resetAddForm();
        showTab('dash');
        showUndoToast("Lagret!");
    }

    function resetAddForm() {
        document.getElementById('entry-desc').value = "";
        document.getElementById('entry-amt').value = "";
        document.getElementById('scan-preview').style.display = 'none';
        selectedFile = null;
    }

    function loadData() {
        db.ref('users/' + auth.currentUser.uid + '/profile/fullName').on('value', s => {
            document.getElementById('user-display-name').innerText = s.val() || "USER";
        });
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            rawData = []; let months = new Set();
            snap.forEach(child => {
                const v = child.val(); v.id = child.key; rawData.push(v);
                const m = v.date.split('.')[1] + "/" + v.date.split('.')[2];
                months.add(m);
            });
            updateMonthFilter(months);
            renderList();
        });
    }

    function updateMonthFilter(months) {
        const f = document.getElementById('month-filter');
        f.innerHTML = '<option value="all">Alle måneder</option>';
        months.forEach(m => f.innerHTML += `<option value="${m}">${m}</option>`);
    }

    function renderList() {
        const list = document.getElementById('entries-list'); list.innerHTML = "";
        const mFilter = document.getElementById('month-filter').value;
        
        let ti=0, te=0;
        rawData.filter(v => mFilter === 'all' || v.date.includes('.' + mFilter.split('/')[0] + '.' + mFilter.split('/')[1])).forEach(v => {
            if(v.mainCat === 'income') ti += v.amt; else te += v.amt;
            list.innerHTML += `
            <div class="entry-card" style="border-left-color:${v.mainCat==='income'?'var(--green)':'var(--red)'}">
                <div><small>${v.subCat}</small><h4>${v.desc}</h4><small>${v.date}</small></div>
                <div style="text-align:right">
                    <b>${v.amt.toLocaleString()} kr</b><br>
                    ${v.imgUrl ? `<i class="fas fa-image" onclick="window.open('${v.imgUrl}')"></i>` : ''}
                    <i class="fas fa-ellipsis-v menu-dots" onclick="toggleM('${v.id}')"></i>
                    <div id="m-${v.id}" class="dropdown"><div onclick="delEntry('${v.id}')">Slett</div></div>
                </div>
            </div>`;
        });
        document.getElementById('total-income').innerText = ti.toLocaleString() + " kr";
        document.getElementById('total-expense').innerText = te.toLocaleString() + " kr";
        document.getElementById('res-total').innerText = (ti - te).toLocaleString() + " kr";
    }

    function changePassword() {
        const email = auth.currentUser.email;
        auth.sendPasswordResetEmail(email).then(() => alert("Reset link sent to " + email));
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
    }

    function toggleM(id) {
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        document.getElementById('m-'+id).style.display = 'block';
    }

    function delEntry(id) { if(confirm("Slette?")) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).remove(); }
    function logout() { auth.signOut().then(() => window.location.reload()); }
    function downloadReport() {
        let csv = "data:text/csv;charset=utf-8,Dato,Desc,Amt\n";
        rawData.forEach(v => csv += `${v.date},${v.desc},${v.amt}\n`);
        const link = document.createElement("a"); link.href = encodeURI(csv);
        link.download = "Report.csv"; link.click();
    }

    auth.onAuthStateChanged(u => {
        if(u) { document.getElementById('auth-page').style.display='none'; document.getElementById('main-app').style.display='block'; loadData(); }
        else { document.getElementById('auth-page').style.display='block'; document.getElementById('main-app').style.display='none'; }
    });
</script>
</body>
</html>
