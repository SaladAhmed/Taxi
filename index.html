<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed Salad Transport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1c2c; color: white; font-family: -apple-system, sans-serif; }
        .card { background: #252945; border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid #30355a; position: relative; }
        .result-card { background: linear-gradient(135deg, #30355a 0%, #1a1c2c 100%); border: 2px solid #fbbf24; }
        input, select { background: #30355a !important; color: white !important; border: 1px solid #404677 !important; border-radius: 10px; padding: 12px; width: 100%; font-size: 16px; }
        .menu-dropdown { display: none; position: absolute; right: 10px; top: 45px; background: #30355a; border: 1px solid #404677; border-radius: 8px; z-index: 50; min-width: 140px; }
        .menu-dropdown.active { display: block; }
    </style>
</head>
<body class="pb-24">
    <div id="app" class="p-4">
        <div class="mb-6 text-center">
            <h1 class="text-xl font-bold text-yellow-400 uppercase">Mohamed Salad Transport</h1>
            <div class="grid grid-cols-2 gap-3 mt-4 text-left">
                <div class="card border-l-4 border-green-500"><p class="text-[10px] text-gray-400 uppercase font-bold text-green-500">Income Guud</p><h2 id="totalIncome" class="text-lg font-bold text-green-400">0 kr</h2></div>
                <div class="card border-l-4 border-red-500"><p class="text-[10px] text-gray-400 uppercase font-bold text-red-500">Kharash Guud</p><h2 id="totalExpense" class="text-lg font-bold text-red-400">0 kr</h2></div>
            </div>

            <div class="card result-card mt-2 text-center">
                <div class="grid grid-cols-2 border-b border-gray-600 pb-2 mb-2 text-orange-400">
                    <div><p class="text-[9px] text-gray-400 uppercase">MVA Refund (1/5)</p><p id="mvaTax" class="text-sm font-semibold">0 kr</p></div>
                    <div><p class="text-[9px] text-gray-400 uppercase">Feriepenger (10.2%)</p><p id="ferieTax" class="text-sm font-semibold">0 kr</p></div>
                </div>
                <div>
                    <p class="text-[10px] text-yellow-400 uppercase tracking-wider font-bold">Lacagta Nadiifka ah (Net)</p>
                    <h2 id="netResult" class="text-2xl font-black mt-1">0 kr</h2>
                </div>
            </div>
        </div>
        
        <div id="dashboardSection"><div id="transactionList" class="space-y-3"></div></div>

        <div id="inputSection" class="hidden">
            <div class="card">
                <div class="flex gap-2 mb-6">
                    <button onclick="setMode('income')" id="modeInc" class="flex-1 py-3 rounded-xl font-bold bg-yellow-400 text-black">Income ↑</button>
                    <button onclick="setMode('expense')" id="modeExp" class="flex-1 py-3 rounded-xl font-bold bg-gray-700 text-white">Kharash ↓</button>
                </div>
                <div class="space-y-4">
                    <input type="date" id="dateInput">
                    <input type="text" id="nameInput" placeholder="Magaca/Faahfaahin">
                    <input type="number" id="amountInput" placeholder="Lacagta (Kr)">
                    <select id="typeInput"></select>
                    <button onclick="saveEntry()" id="saveBtn" class="w-full bg-yellow-400 text-black py-4 rounded-2xl font-bold mt-4 text-lg shadow-lg">KAYDI ONLINE</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#252945] border-t border-gray-800 flex justify-around py-3">
        <button onclick="showSection('dashboard')" class="flex flex-col items-center text-yellow-400"><i class="fas fa-home text-xl"></i><span class="text-[10px]">Guudmar</span></button>
        <button onclick="showSection('input')" class="flex flex-col items-center text-gray-400"><i class="fas fa-plus-circle text-xl"></i><span class="text-[10px]">Geli Xog</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmT JEV2_WWNhIbpwbUCXZAMiN",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let mode = 'income';

        const categories = {
            income: ['Kaarka Taksi', 'Caddaan', 'Faktura (Income)', 'Wax kale'],
            expense: ['Mushaar (Lønn)', 'Bankuttak (Owner)', 'Skatt', 'Shidaal', 'Dayactir', 'Regnskap', 'Sentral Avgifter', 'Forsikring', 'Wax kale']
        };

        window.setMode = (m) => {
            mode = m;
            document.getElementById('modeInc').className = m === 'income' ? 'flex-1 py-3 rounded-xl font-bold bg-yellow-400 text-black' : 'flex-1 py-3 rounded-xl font-bold bg-gray-700 text-white';
            document.getElementById('modeExp').className = m === 'expense' ? 'flex-1 py-3 rounded-xl font-bold bg-red-500 text-white' : 'flex-1 py-3 rounded-xl font-bold bg-gray-700 text-white';
            const select = document.getElementById('typeInput');
            select.innerHTML = categories[m].map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.showSection = (s) => {
            document.getElementById('dashboardSection').classList.toggle('hidden', s !== 'dashboard');
            document.getElementById('inputSection').classList.toggle('hidden', s !== 'input');
        };

        window.toggleMenu = (id) => { document.getElementById('menu-'+id).classList.toggle('active'); };

        window.saveEntry = async () => {
            const amt = parseFloat(document.getElementById('amountInput').value);
            const date = document.getElementById('dateInput').value;
            const name = document.getElementById('nameInput').value;
            if(!amt || !date) return alert("Fadlan geli lacagta!");
            
            await addDoc(collection(db, "xisaabaadka"), { 
                amount: amt, 
                date: date, 
                name: name || "General",
                type: document.getElementById('typeInput').value, 
                mode: mode, 
                createdAt: Date.now() 
            });
            
            document.getElementById('amountInput').value = '';
            document.getElementById('nameInput').value = '';
            showSection('dashboard');
        };

        window.deleteItem = async (id) => { if(confirm("Ma tirtirtaa xogtan?")) await deleteDoc(doc(db, "xisaabaadka", id)); };

        const q = query(collection(db, "xisaabaadka"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('transactionList'); list.innerHTML = '';
            let ti=0, te=0, totalFP=0, mvaSum=0;

            snapshot.forEach((docSnap) => {
                const d = docSnap.data();
                if(d.mode === 'income') {
                    ti += d.amount;
                } else {
                    te += d.amount;
                    // Kaliya Mushaar (Lønn) ayaa leh Feriepenger
                    if(d.type === 'Mushaar (Lønn)') totalFP += (d.amount * 0.102);
                    
                    // Kaliya waxyaabahan ayaa MVA laga soo celinayaa
                    if(['Shidaal', 'Dayactir', 'Regnskap', 'Sentral Avgifter'].includes(d.type)) {
                        mvaSum += (d.amount / 5); 
                    }
                    // Bankuttak iyo Skatt wax MVA ah ma lahan
                }
                list.innerHTML += `<div class="card flex justify-between items-center border-l-4 ${d.mode==='income'?'border-green-500':'border-red-500'}">
                    <div>
                        <p class="text-[10px] text-yellow-400 font-black uppercase mb-1">${d.name || ''}</p>
                        <p class="text-sm font-bold text-gray-200">${d.type}</p>
                        <p class="text-[10px] text-gray-500">${d.date}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-bold ${d.mode==='income'?'text-green-400':'text-red-400'}">${Math.round(d.amount).toLocaleString()} kr</p>
                        <button onclick="toggleMenu('${docSnap.id}')" class="text-gray-400 p-2"><i class="fas fa-ellipsis-v"></i></button>
                        <div id="menu-${docSnap.id}" class="menu-dropdown shadow-2xl border border-gray-600">
                            <div class="menu-item text-red-500 p-3" onclick="deleteItem('${docSnap.id}')"><i class="fas fa-trash mr-2"></i> Tirtir</div>
                        </div>
                    </div>
                </div>`;
            });

            const net = ti - te - totalFP;

            document.getElementById('totalIncome').innerText = Math.round(ti).toLocaleString() + ' kr';
            document.getElementById('totalExpense').innerText = Math.round(te).toLocaleString() + ' kr';
            document.getElementById('mvaTax').innerText = Math.round(mvaSum).toLocaleString() + ' kr';
            document.getElementById('ferieTax').innerText = Math.round(totalFP).toLocaleString() + ' kr';
            const netEl = document.getElementById('netResult');
            netEl.innerText = Math.round(net).toLocaleString() + ' kr';
            netEl.style.color = net >= 0 ? '#4ade80' : '#f87171';
        });

        document.getElementById('dateInput').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
