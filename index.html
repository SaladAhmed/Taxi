<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salad Transport</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; }
        .box { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--blue); color: white; }
        .btn-sub { background: #334155; color: white; border: 1px solid var(--blue); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="box" id="auth-section">
    <h2 style="color: #f1c40f;">🚖 Taxi System</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn-main" onclick="login()">Login</button>
    <button class="btn-sub" onclick="register()">Create New Account</button>
</div>

<div class="box hidden" id="app-section">
    <h2 id="user-display">Soo dhawoow</h2>
    <div id="data-list" style="text-align: left; margin: 20px 0;"></div>
    <button class="btn-main" onclick="addData()">+ Geli Xog Cusub</button>
    <button class="btn-sub" style="border-color: red;" onclick="location.reload()">Log Out</button>
</div>

<script>
    // Config-gaaga rasmiga ah
    const firebaseConfig = {
      apiKey: "AIzaSyCYNlmTJEV2_WWnHIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function login() {
        auth.signInWithEmailAndPassword(email.value, pass.value)
            .then(() => showApp())
            .catch(e => alert("Khalad: " + e.message));
    }

    function register() {
        auth.createUserWithEmailAndPassword(email.value, pass.value)
            .then(() => { alert("Akoon cusub ayaa kuu samaysan!"); showApp(); })
            .catch(e => alert("Khalad: " + e.message));
    }

    function showApp() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('user-display').innerText = auth.currentUser.email;
        loadData();
    }

    function addData() {
        const val = prompt("Geli lacagta (kr):");
        if(val) {
            db.ref('entries').push({
                amount: val,
                user: auth.currentUser.email,
                time: new Date().toLocaleString()
            });
        }
    }

    function loadData() {
        db.ref('entries').on('value', snap => {
            const list = document.getElementById('data-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                list.innerHTML += `<div style="border-bottom:1px solid #334155; padding:5px;">${data.amount} kr - <small>${data.time}</small></div>`;
            });
        });
    }
</script>
</body>
</html>
