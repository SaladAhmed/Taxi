<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.appspot.com",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentMode = "total";

    const categories = {
        income: ["Faktura mva income", "Faktura uten mva"],
        expense: [
            "Drivstoff mva", "Bil fixed mva", "Regnskap mva",
            "Own withdrawal uten mva", "Forsikring mva", "Bil vasker mva",
            "Lønn + feriepenger", "Internet uten mva", "Telefon uten mva",
            "Dekk shift mva", "Kontor shoping mva", "Bank transaksjon uten mva"
        ]
    };

    function updateCategories() {
        const type = document.getElementById('entry-type').value;
        const catSelect = document.getElementById('entry-category');

        catSelect.innerHTML = categories[type]
            .map(c => `<option value="${c}">${c}</option>`)
            .join('');
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;

        auth.signInWithEmailAndPassword(e, p)
            .catch(err => alert(err.message));
    }

    function saveData() {

        const type = document.getElementById('entry-type').value;
        const cat = document.getElementById('entry-category').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const note = document.getElementById('entry-note').value;

        if (!amt) return alert("Enter amount");

        // MVA 25%
        const mva = amt * 0.25;

        // Feriepenger 10.2%
        const feriepenger = amt * 0.102;

        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            type,
            cat,
            amt,
            note,
            mva,
            feriepenger,
            date: new Date().toLocaleDateString()
        });

        showTab('dash');
    }

    function loadData() {

        db.ref('users/' + auth.currentUser.uid + '/entries')
            .on('value', snap => {

            const list = document.getElementById('entries-list');
            list.innerHTML = "";

            let ti = 0;
            let te = 0;
            let totalMva = 0;
            let totalFerie = 0;

            snap.forEach(child => {

                const v = child.val();

                if (v.type === 'income') {
                    ti += v.amt;
                } else {
                    te += v.amt;
                }

                totalMva += (v.mva || 0);
                totalFerie += (v.feriepenger || 0);

                list.innerHTML += `

                <div class="entry-card"
                     style="border-left-color:${v.type==='income'
                        ? 'var(--green)'
                        : 'var(--red)'}">

                    <div>
                        <b>${v.cat}</b><br>

                        <small>
                            ${v.date}
                            ${v.note ? ' - ' + v.note : ''}
                        </small>

                        <br>

                        ${
                            currentMode === "individual"
                            ?
                            `
                            <small>MVA: ${Math.round(v.mva || 0)} kr</small><br>
                            <small>Feriepenger: ${Math.round(v.feriepenger || 0)} kr</small>
                            `
                            :
                            ''
                        }
                    </div>

                    <div style="display:flex; align-items:center;">

                        <b style="margin-right:10px;">
                            ${v.amt} kr
                        </b>

                        <div class="dots-menu"
                             onclick="toggleMenu('${child.key}')">

                             <i class="fas fa-ellipsis-v"></i>

                        </div>

                        <div id="menu-${child.key}"
                             class="dropdown-content">

                            <div onclick="deleteItem('${child.key}')">
                                <i class="fas fa-trash"></i> Delete
                            </div>

                            <div onclick="editItem('${child.key}')">
                                <i class="fas fa-edit"></i> Edit
                            </div>

                            <div onclick="closeMenu('${child.key}')">
                                <i class="fas fa-times"></i> Exit
                            </div>

                        </div>

                    </div>

                </div>
                `;
            });

            document.getElementById('total-income').innerText = ti;
            document.getElementById('total-expense').innerText = te;
            document.getElementById('total-netto').innerText = ti - te;

            document.getElementById('res-total').innerHTML = `
                ${ti - te} kr <br>
                <small>MVA 25%: ${Math.round(totalMva)} kr</small><br>
                <small>Feriepenger 10.2%: ${Math.round(totalFerie)} kr</small><br><br>

                <button onclick="setMode('total')"
                    style="padding:5px 10px; border:none; border-radius:6px; margin-right:5px;">
                    Total
                </button>

                <button onclick="setMode('individual')"
                    style="padding:5px 10px; border:none; border-radius:6px;">
                    Individual
                </button>
            `;
        });
    }

    function setMode(mode) {
        currentMode = mode;
        loadData();
    }

    function toggleMenu(id) {

        const m = document.getElementById('menu-' + id);

        m.style.display =
            m.style.display === 'block'
            ? 'none'
            : 'block';
    }

    function closeMenu(id) {
        document.getElementById('menu-' + id).style.display = 'none';
    }

    function deleteItem(id) {

        if (confirm("Ma tirtirtaa?")) {

            db.ref(
                'users/' +
                auth.currentUser.uid +
                '/entries/' +
                id
            ).remove();
        }
    }

    function editItem(id) {

        const newAmount = prompt("Qor lacagta cusub");

        if (!newAmount) return;

        const amt = parseFloat(newAmount);

        db.ref(
            'users/' +
            auth.currentUser.uid +
            '/entries/' +
            id
        ).update({

            amt: amt,
            mva: amt * 0.25,
            feriepenger: amt * 0.102
        });
    }

    function showTab(t) {

        document.querySelectorAll('.page')
            .forEach(p => p.style.display = 'none');

        document.getElementById('page-' + t).style.display = 'block';

        document.querySelectorAll('.nav-item')
            .forEach(n => n.classList.remove('active'));

        document.getElementById('nav-' + t)
            .classList.add('active');

        if (t === 'add') updateCategories();
    }

    function toggleTheme() {
        document.getElementById('body-tag')
            .classList.toggle('light-theme');
    }

    function logout() {
        auth.signOut().then(() => location.reload());
    }

    function changePassword() {

        auth.sendPasswordResetEmail(auth.currentUser.email)
            .then(() => alert("Email sent"));
    }

    auth.onAuthStateChanged(u => {

        if (u) {

            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';

            loadData();
        }
    });
</script>
