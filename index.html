<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport PRO - DNB Fix</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{--bg:#0f172a;--card:#1e293b;--y:#f1c40f;--g:#2ecc71;--r:#ff4757;--b:#3b82f6;--t:#f8fafc;--br:#334155}
body{font-family:"Segoe UI",sans-serif;background:var(--bg);color:var(--t);margin:0;padding-bottom:90px}
.topbar{display:flex;justify-content:space-between;padding:15px;background:var(--card);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:100}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:15px}
.sb{background:var(--card);border:2px solid;border-radius:12px;padding:12px;text-align:center}
.sb small{font-size:10px;display:block;margin-bottom:5px}
.ecard{background:var(--card);border-radius:12px;padding:15px;margin:10px 15px;border-left:6px solid;display:flex;justify-content:space-between;align-items:center}
.navbar{position:fixed;bottom:0;width:100%;background:var(--card);display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid var(--br)}
.ni{text-align:center;color:#64748b;font-size:12px;cursor:pointer;flex:1}
.ni.on{color:var(--y)}
.uarea{border:2px dashed var(--y);padding:40px 20px;text-align:center;margin:20px;border-radius:15px;cursor:pointer}
.pitem{background:var(--card);padding:12px;margin:8px 0;border-radius:8px;display:flex;justify-content:space-between;border:1px solid var(--br)}
#pdfi{display:none}
.btn{width:90%;display:block;margin:10px auto;padding:15px;border-radius:12px;border:none;font-weight:bold;cursor:pointer;color:#fff;font-size:16px}
</style>
</head>
<body>

<div id="pg-auth" style="display:none">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh">
        <div style="background:var(--card);padding:40px;border-radius:20px;text-align:center;width:340px">
            <h2 style="color:var(--y)">LOGIN</h2>
            <input type="email" id="em" placeholder="E-mail" style="width:100%;padding:10px;margin-bottom:10px">
            <input type="password" id="pw" placeholder="Password" style="width:100%;padding:10px;margin-bottom:20px">
            <button class="btn" style="background:var(--b)" onclick="doLogin()">SOO GAL</button>
        </div>
    </div>
</div>

<div id="app" style="display:none">
    <div class="topbar">
        <span id="uname" style="font-weight:bold">...</span>
        <i class="fas fa-sign-out-alt" style="color:var(--r);cursor:pointer" onclick="doLogout()"></i>
    </div>

    <div id="pg-dash" class="pg">
        <div class="sgrid">
            <div class="sb" style="border-color:var(--g);color:var(--g)"><small>INNTEKT</small><span id="s-inc">0 kr</span></div>
            <div class="sb" style="border-color:var(--r);color:var(--r)"><small>UTGIFTER</small><span id="s-exp">0 kr</span></div>
            <div class="sb" style="border-color:var(--b);color:var(--b)"><small>NETTO</small><span id="s-net">0 kr</span></div>
        </div>
        <div id="elist"></div>
    </div>

    <div id="pg-add" class="pg" style="display:none">
        <div class="uarea" onclick="document.getElementById('pdfi').click()">
            <i class="fas fa-file-pdf" style="font-size:40px;color:var(--r)"></i>
            <p>Soo geli DNB PDF-ka</p>
        </div>
        <input type="file" id="pdfi" accept=".pdf" onchange="handlePDF(this)">
        <div id="bprev" style="padding:15px;max-height:400px;overflow-y:auto"></div>
        <button id="btn-bi" class="btn" style="background:var(--g);display:none" onclick="importBank()">KEYDI DHAMMAAN</button>
    </div>

    <div class="navbar">
        <div class="ni on" id="ni-dash" onclick="showPg('dash')"><i class="fas fa-th-large"></i><br>Dash</div>
        <div class="ni" id="ni-add" onclick="showPg('add')"><i class="fas fa-plus-circle"></i><br>Add</div>
        <div class="ni" onclick="delAll()" style="color:var(--r)"><i class="fas fa-trash-alt"></i><br>Tirtir</div>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

firebase.initializeApp({
    apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
    authDomain: "mohamed-salad-transport.firebaseapp.com",
    databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mohamed-salad-transport"
});

const db = firebase.database(), auth = firebase.auth();
let bItems = [];

auth.onAuthStateChanged(u => {
    if (u) {
        document.getElementById('pg-auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('uname').textContent = u.email;
        loadData();
    } else {
        document.getElementById('pg-auth').style.display = 'block';
        document.getElementById('app').style.display = 'none';
    }
});

function doLogin() {
    auth.signInWithEmailAndPassword(document.getElementById('em').value, document.getElementById('pw').value)
    .catch(e => alert("Noget gikk galt: " + e.message));
}

function doLogout() { if(confirm("Ma hubtaa?")) auth.signOut(); }

function showPg(pg) {
    document.querySelectorAll('.pg').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
    document.getElementById('pg-' + pg).style.display = 'block';
    document.getElementById('ni-' + pg).classList.add('on');
}

async function handlePDF(inp) {
    const file = inp.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function() {
        const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(s => s.str).join(" ") + "\n";
        }
        processDNB(text);
    };
    reader.readAsArrayBuffer(file);
}

function processDNB(t) {
    bItems = [];
    // Habka cusub wuxuu raadinayaa: Date + Text + Ut_Amount + [Inn_Amount]
    const regex = /(\d{2}\.\d{2}\.\d{2})\s+([\w\s\.\-\/æøåÆØÅ]+?)\s+([\d\.\,]+)(?:\s+([\d\.\,]+))?/g;
    let m;
    while ((m = regex.exec(t)) !== null) {
        const date = m[1];
        const desc = m[2].trim();
        const firstVal = m[3].replace(/\./g, '').replace(',', '.');
        const secondVal = m[4] ? m[4].replace(/\./g, '').replace(',', '.') : null;

        let type = "expense";
        let amount = parseFloat(firstVal);

        // Haddii uu jiro qiimo labaad, ka hore waa Utgifter, ka dambe waa Inn-konto (Income)
        if (secondVal) {
            type = "income";
            amount = parseFloat(secondVal);
        } else if (desc.toLowerCase().includes("agder taxi")) {
            // Mararka qaarkood Agder Taxi wuxuu ku jiraa hal tiir laakiin waa dakhli
            type = "income";
        }

        if (!isNaN(amount) && amount > 0) {
            bItems.push({ date, description: desc, amount, type });
        }
    }
    renderPreview();
}

function renderPreview() {
    const container = document.getElementById('bprev');
    container.innerHTML = `<h4 style="color:var(--y)">Hordhac: ${bItems.length} meelood</h4>`;
    bItems.forEach(item => {
        const color = item.type === 'income' ? 'var(--g)' : 'var(--r)';
        container.innerHTML += `<div class="pitem" style="border-left: 5px solid ${color}">
            <div style="font-size:13px"><b>${item.description}</b><br>${item.date}</div>
            <b style="color:${color}">${item.amount.toLocaleString('nb-NO')} kr</b>
        </div>`;
    });
    document.getElementById('btn-bi').style.display = bItems.length ? 'block' : 'none';
}

async function importBank() {
    const u = auth.currentUser;
    const ref = db.ref('entries/' + u.uid);
    for (let item of bItems) {
        await ref.push(item);
    }
    alert("Xogtii waa la keydiyay!");
    bItems = [];
    document.getElementById('bprev').innerHTML = "";
    document.getElementById('btn-bi').style.display = 'none';
    showPg('dash');
}

function loadData() {
    db.ref('entries/' + auth.currentUser.uid).on('value', snap => {
        const list = [];
        snap.forEach(c => { list.push(c.val()); });
        renderDash(list);
    });
}

function renderDash(list) {
    const container = document.getElementById('elist');
    container.innerHTML = "";
    let inc = 0, exp = 0;
    
    [...list].reverse().forEach(e => {
        const color = e.type === 'income' ? 'var(--g)' : 'var(--r)';
        if (e.type === 'income') inc += e.amount; else exp += e.amount;
        
        container.innerHTML += `<div class="ecard" style="border-color:${color}">
            <div><b>${e.description}</b><br><small>${e.date}</small></div>
            <b style="color:${color}">${e.amount.toLocaleString('nb-NO')} kr</b>
        </div>`;
    });

    document.getElementById('s-inc').textContent = inc.toLocaleString('nb-NO') + " kr";
    document.getElementById('s-exp').textContent = exp.toLocaleString('nb-NO') + " kr";
    document.getElementById('s-net').textContent = (inc - exp).toLocaleString('nb-NO') + " kr";
}

function delAll() {
    if (confirm("Ma hubtaa inaad tirtirto DHAMMAAN xogta?")) {
        db.ref('entries/' + auth.currentUser.uid).remove();
    }
}
</script>
</body>
</html>
