<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M. Salad Transport PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .card-pro { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .input-pro { background: #334155 !important; border: 1px solid #475569 !important; color: white !important; border-radius: 12px; padding: 12px; width: 100%; outline: none; }
        .nav-tab.active { color: var(--primary); border-top: 3px solid var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <div id="authSection" class="fixed inset-0 bg-[#0f172a] z-[3000] flex items-center justify-center p-6">
        <div class="bg-[#1e293b] p-8 rounded-[30px] w-full max-w-md shadow-2xl border-t-4 border-yellow-500 text-center">
            <i class="fas fa-truck-moving text-4xl text-yellow-500 mb-2"></i>
            <h1 class="text-2xl font-black mb-6">M. SALAD <span class="text-yellow-500">PRO</span></h1>
            <input type="email" id="emailInput" class="input-pro mb-3" placeholder="Email">
            <input type="password" id="passInput" class="input-pro mb-6" placeholder="Password">
            <button onclick="handleAuth()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black">LOGIN</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex justify-between items-center">
            <h2 class="text-xl font-bold" id="txt-welcome">Admin Panel</h2>
            <div class="flex gap-2">
                <select onchange="changeLang(this.value)" class="bg-transparent text-[10px] border border-gray-600 rounded px-2">
                    <option value="so">SO</option>
                    <option value="no">NO</option>
                    <option value="en">EN</option>
                </select>
                <button onclick="logout()" class="text-red-400 text-xs font-bold p-2"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="px-4 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="card-pro p-4 border-l-4 border-green-500">
                    <p class="text-[10px] text-gray-400 uppercase font-bold" id="lbl-income">Inntekt</p>
                    <h3 id="totalIncome" class="text-xl font-black text-green-400">0 kr</h3>
                </div>
                <div class="card-pro p-4 border-l-4 border-red-500">
                    <p class="text-[10px] text-gray-400 uppercase font-bold" id="lbl-expense">Utgift</p>
                    <h3 id="totalExpense" class="text-xl font-black text-red-400">0 kr</h3>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-center">
                <div class="card-pro p-3 bg-blue-500/5">
                    <p class="text-[8px] text-blue-400 font-bold uppercase">MVA REFUND (1/5)</p>
                    <p id="stat-mva" class="text-xs font-black text-blue-400">0 kr</p>
                </div>
                <div class="card-pro p-3 bg-orange-500/5">
                    <p class="text-[8px] text-orange-400 font-bold uppercase">FERIEPENGER (10.2%)</p>
                    <p id="stat-ferie" class="text-xs font-black text-orange-400">0 kr</p>
                </div>
            </div>

            <div class="card-pro p-6 bg-gradient-to-br from-yellow-500 to-yellow-600 text-black text-center shadow-xl">
                <p class="text-[11px] font-black uppercase opacity-70" id="lbl-net">NET PROFIT</p>
                <h2 id="totalNet" class="text-4xl font-black">0 kr</h2>
            </div>

            <div id="listSection" class="section space-y-3 pb-12"></div>

            <div id="addSection" class="section hidden">
                <div class="card-pro p-6">
                    <div class="flex gap-2 mb-4">
                        <button onclick="setMode('income')" id="btn-inc" class="flex-1 py-3 rounded-lg font-bold bg-green-600 text-xs">INNTEKT</button>
                        <button onclick="setMode('expense')" id="btn-exp" class="flex-1 py-3 rounded-lg font-bold bg-gray-700 text-xs">UTGIFT</button>
                    </div>
                    <input type="date" id="inDate" class="input-pro mb-3">
                    <input type="text" id="inName" class="input-pro mb-3" placeholder="Magaca (e.g. Shidaal)">
                    <input type="number" id="inAmount" class="input-pro mb-3" placeholder="Lacagta">
                    <select id="inType" class="input-pro mb-4"></select>
                    <button onclick="saveEntry()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase shadow-lg">KAYDI (SAVE)</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-[#1e293b] border-t border-white/5 flex justify-around py-4">
            <button onclick="showPage('list')" id="nav-list" class="nav-tab active flex flex-col items-center gap-1 opacity-100">
                <i class="fas fa-home text-xl"></i><span class="text-[10px] font-bold">Oversikt</span>
            </button>
            <button onclick="showPage('add')" id="nav-add" class="nav-tab flex flex-col items-center gap-1 opacity-40">
                <i class="fas fa-plus-circle text-xl"></i><span class="text-[10px] font-bold">Add New</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
            authDomain: "mohamed-salad-transport.firebaseapp.com",
            projectId: "mohamed-salad-transport",
            storageBucket: "mohamed-salad-transport.firebasestorage.app",
            messagingSenderId: "608716442795",
            appId: "1:608716442795:web:ea17e2c3f26d3103717bee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentMode = 'income';

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                fetchData();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        window.fetchData = () => {
            const q = query(collection(db, "pro_records"), orderBy("date", "desc"));
            onSnapshot(q, snap => {
                const list = document.getElementById('listSection');
                list.innerHTML = '';
                let ti=0, te=0;

                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const amt = Number(d.amount);
                    if(d.mode === 'income') ti += amt; else te += amt;

                    list.innerHTML += `
                        <div class="card-pro p-4 flex justify-between items-center border-l-4 ${d.mode === 'income' ? 'border-green-500' : 'border-red-500'} mb-2">
                            <div><p class="text-xs font-black uppercase">${d.name}</p><p class="text-[9px] text-gray-500">${d.date} • ${d.type}</p></div>
                            <div class="flex items-center gap-3"><p class="font-black ${d.mode === 'income' ? 'text-green-400' : 'text-red-400'}">${amt.toLocaleString()} kr</p>
                            <button onclick="deleteEntry('${docSnap.id}')" class="text-gray-600"><i class="fas fa-trash"></i></button></div>
                        </div>`;
                });

                document.getElementById('totalIncome').innerText = ti.toLocaleString() + ' kr';
                document.getElementById('totalExpense').innerText = te.toLocaleString() + ' kr';
                document.getElementById('stat-mva').innerText = (ti > te ? (ti - te) * 0.20 : 0).toLocaleString() + ' kr';
                document.getElementById('stat-ferie').innerText = (ti * 0.102).toLocaleString() + ' kr';
                document.getElementById('totalNet').innerText = (ti - te).toLocaleString() + ' kr';
            });
        };

        window.saveEntry = async () => {
            const amt = document.getElementById('inAmount').value;
            const name = document.getElementById('inName').value;
            const date = document.getElementById('inDate').value;
            if(!amt || !name || !date) return alert("Buuxi!");
            await addDoc(collection(db, "pro_records"), { amount: parseFloat(amt), name, date, type: document.getElementById('inType').value, mode: currentMode });
            document.getElementById('inAmount').value = ''; document.getElementById('inName').value = ''; showPage('list');
        };

        window.deleteEntry = async (id) => { if(confirm("Ma tirtirtaa?")) await deleteDoc(doc(db, "pro_records", id)); };
        window.setMode = (m) => {
            currentMode = m;
            document.getElementById('btn-inc').className = m === 'income' ? 'flex-1 py-3 rounded-lg font-bold bg-green-600 text-xs' : 'flex-1 py-3 rounded-lg font-bold bg-gray-700 text-xs';
            document.getElementById('btn-exp').className = m === 'expense' ? 'flex-1 py-3 rounded-lg font-bold bg-red-600 text-xs' : 'flex-1 py-3 rounded-lg font-bold bg-gray-700 text-xs';
            const opts = m === 'income' ? ['Faktura', 'Kontanter'] : ['Shidaal', 'Lønn', 'Feriepenger', 'Forsikring', 'Bankuttak (Owner)'];
            document.getElementById('inType').innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
        };

        window.showPage = (p) => {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(p + 'Section').classList.remove('hidden');
            document.getElementById('nav-list').style.opacity = p === 'list' ? '1' : '0.4';
            document.getElementById('nav-add').style.opacity = p === 'add' ? '1' : '0.4';
        };

        window.handleAuth = () => signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passInput').value);
        window.logout = () => signOut(auth);
        document.getElementById('inDate').valueAsDate = new Date();
        setMode('income');
    </script>
</body>
</html>
