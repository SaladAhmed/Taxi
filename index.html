<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salad Transport PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .lang-btn { cursor: pointer; font-size: 18px; margin-left: 10px; }
        .theme-toggle { cursor: pointer; font-size: 20px; color: var(--yellow); }

        .auth-container { padding: 30px; text-align: center; max-width: 400px; margin: auto; }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .stat-box { background: var(--card); border: 1.5px solid; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-box small { font-size: 9px; display: block; margin-bottom: 5px; font-weight: bold; }

        .mva-card { background: var(--card); border: 2px solid var(--border); border-radius: 15px; margin: 10px 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }

        .summary-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 10px 15px; padding: 20px; text-align: center; }
        
        .view-toggle { text-align: right; padding: 0 20px; margin-bottom: 10px; }
        .view-btn { background: var(--blue); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 0 15px 12px 15px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .menu-dots { cursor: pointer; color: #64748b; padding: 10px; }
        .dropdown { position: absolute; right: 20px; top: 45px; background: white; color: black; border-radius: 10px; display: none; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); min-width: 120px; }
        .dropdown div { padding: 10px 15px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #eee; }
        .dropdown div:last-child { border: none; color: red; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #64748b; font-size: 12px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }

        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; }
    </style>
</head>
<body id="body-tag">

<div id="auth-page" class="auth-container">
    <h2 id="auth-title">LOGG INN</h2>
    <div id="reg-fields" style="display:none">
        <input type="text" id="fname" placeholder="Fornavn">
        <input type="text" id="lname" placeholder="Etternavn">
    </div>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()" id="auth-btn">LOGG INN</button>
    <button onclick="toggleAuth()" id="toggle-text" style="background:none; border:none; color:var(--yellow); cursor:pointer;">Registrer deg</button>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        <div>
            <span class="lang-btn" onclick="updateLang('no')">🇳🇴</span>
            <span class="lang-btn" onclick="updateLang('so')">🇸🇴</span>
            <span class="lang-btn" onclick="updateLang('en')">🇺🇸</span>
        </div>
    </div>

    <div id="page-dash" class="page">
        <div class="header-title">MOHAMED SALAD TRANSPORT</div>
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small id="l-inc">INCOME</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small id="l-exp">EXPENSES</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small id="l-net">NETTO</small><span id="total-netto">0 kr</span></div>
        </div>
        <div class="mva-card">
            <div><small style="color:#888; display:block">MVA (25%)</small><b id="res-mva" style="font-size:18px">0 kr</b></div>
            <div style="text-align:right"><small style="color:#888; display:block">FERIEPENGER (10.2%)</small><b id="res-fp">0 kr</b></div>
        </div>
        <div class="summary-card">
            <small style="color:var(--yellow); font-weight:bold;" id="l-res">TOTAL RESULT</small>
            <h1 id="res-total" style="color:var(--green); margin: 10px 0;">0 kr</h1>
        </div>
        <div class="view-toggle">
            <button class="view-btn" id="toggle-view-btn" onclick="toggleView()">Mode: Individual</button>
        </div>
        <div id="entries-list"></div>
    </div>

    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="header-title" id="l-add-title">GELI XOG CUSUB</div>
        <select id="entry-category">
            <optgroup label="CAGAAR (INCOME)">
                <option value="inc-mva">Sentral Avgjifter (MVA 25%)</option>
            </optgroup>
            <optgroup label="GADUUD (EXPENSES)">
                <option value="exp-fuel">Drivstoff (MVA 25%)</option>
                <option value="exp-bomp">Bompenger (MVA 25%)</option>
                <option value="exp-fixed">Fixed Biler (MVA 25%)</option>
                <option value="exp-anet-no">Anet uden MVA</option>
                <option value="exp-bank">Bank Transaction (No MVA)</option>
                <option value="exp-lonn">Lønn (Taxable - 10.2% FP)</option>
                <option value="exp-own">Own Withdrawal (No MVA)</option>
            </optgroup>
        </select>
        <input type="text" id="entry-desc" placeholder="Magaca / Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        <button class="btn-save" style="background:var(--green)" id="l-btn-inc" onclick="saveData('income')">SAVE INCOME</button>
        <button class="btn-save" style="background:var(--red)" id="l-btn-exp" onclick="saveData('expense')">SAVE EXPENSE</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-list"></i><br><span id="n-dash">Guudmar</span></div>
        <div class="nav-item" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br><span id="n-add">Geli Xog</span></div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i><br><span id="n-exit">Exit</span></div>
    </div>
</div>

<script>
    // Firebase Config halkan ayay ku jirtay (aan iska dhaafno si aan koodhka u gaabino)
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentView = 'individual';
    let rawData = [];

    function toggleTheme() {
        document.getElementById('body-tag').classList.toggle('light-theme');
    }

    function toggleAuth() {
        const rf = document.getElementById('reg-fields');
        rf.style.display = (rf.style.display === 'none') ? 'block' : 'none';
        document.getElementById('auth-title').innerText = (rf.style.display === 'none') ? 'LOGG INN' : 'REGISTRER DEG';
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(document.getElementById('reg-fields').style.display === 'none') {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }
    }

    function saveData(mainCat) {
        const desc = document.getElementById('entry-desc').value.trim();
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const subCat = document.getElementById('entry-category').value;
        if(!desc || !amt) return alert("Fyll ut alt!");
        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            desc, amt, subCat, mainCat, date: new Date().toLocaleDateString('no-NO')
        });
        document.getElementById('entry-desc').value = "";
        document.getElementById('entry-amt').value = "";
        showTab('dash');
    }

    function loadData() {
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            rawData = [];
            let ti=0, te=0, tmva=0, tfp=0;
            snap.forEach(child => {
                const v = child.val();
                v.id = child.key;
                rawData.push(v);
                
                if(v.mainCat === 'income') {
                    ti += v.amt;
                    tmva += (v.amt * 0.20); 
                } else {
                    te += v.amt;
                    if(['exp-fuel', 'exp-bomp', 'exp-fixed'].includes(v.subCat)) {
                        tmva -= (v.amt * 0.20); 
                    }
                    if(v.subCat === 'exp-lonn') {
                        tfp += (v.amt * 0.102);
                    }
                }
            });
            document.getElementById('total-income').innerText = ti.toLocaleString() + " kr";
            document.getElementById('total-expense').innerText = te.toLocaleString() + " kr";
            document.getElementById('total-netto').innerText = (ti - te).toLocaleString() + " kr";
            document.getElementById('res-mva').innerText = Math.floor(tmva).toLocaleString() + " kr";
            document.getElementById('res-fp').innerText = Math.floor(tfp).toLocaleString() + " kr";
            document.getElementById('res-total').innerText = (ti - te).toLocaleString() + " kr";
            renderList();
        });
    }

    function renderList() {
        const list = document.getElementById('entries-list');
        list.innerHTML = "";
        rawData.forEach(v => {
            list.innerHTML += `
            <div class="entry-card" style="border-left-color:${v.mainCat==='income'?'var(--green)':'var(--red)'}">
                <div><small style="color:#888">${v.subCat}</small><h4>${v.desc}</h4><small>${v.date}</small></div>
                <div style="text-align:right">
                    <span style="font-weight:bold; color:${v.mainCat==='income'?'var(--green)':'var(--red)'}">${v.amt.toLocaleString()} kr</span>
                    <i class="fas fa-ellipsis-v menu-dots" onclick="toggleM('${v.id}')"></i>
                    <div id="m-${v.id}" class="dropdown">
                        <div onclick="editEntry('${v.id}', '${v.desc}', ${v.amt})">Edit</div>
                        <div onclick="delEntry('${v.id}')">Delete</div>
                    </div>
                </div>
            </div>`;
        });
    }

    function toggleM(id) {
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        document.getElementById('m-'+id).style.display = 'block';
    }

    function delEntry(id) {
        if(confirm("Ma hubtaa?")) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).remove();
    }

    function editEntry(id, oldD, oldA) {
        const nD = prompt("Description:", oldD);
        const nA = prompt("Amount:", oldA);
        if(nD && nA) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).update({ desc: nD, amt: parseFloat(nA) });
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(t==='dash') document.querySelector('.nav-item:nth-child(1)').classList.add('active');
        if(t==='add') document.querySelector('.nav-item:nth-child(2)').classList.add('active');
    }

    function logout() {
        auth.signOut().then(() => { window.location.reload(); });
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        } else {
            document.getElementById('auth-page').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    const dict = {
        no: { inc: "INNTEKT", exp: "UTGIFTER", net: "NETTO", res: "TOTAL RESULTAT", add: "GELI XOG", dash: "Guudmar", nadd: "Geli Xog", exit: "Exit" },
        so: { inc: "DAKHLI", exp: "KHARASH", net: "NETTO", res: "NATIIJADA", add: "GELI XOG CUSUB", dash: "Guudmar", nadd: "Geli Xog", exit: "Ka Bax" },
        en: { inc: "INCOME", exp: "EXPENSES", net: "NET", res: "TOTAL RESULT", add: "ADD DATA", dash: "Dashboard", nadd: "Add New", exit: "Logout" }
    };

    function updateLang(l) {
        const d = dict[l];
        document.getElementById('l-inc').innerText = d.inc;
        document.getElementById('l-exp').innerText = d.exp;
        document.getElementById('l-net').innerText = d.net;
        document.getElementById('l-res').innerText = d.res;
        document.getElementById('l-add-title').innerText = d.add;
        document.getElementById('n-dash').innerText = d.dash;
        document.getElementById('n-add').innerText = d.nadd;
        document.getElementById('n-exit').innerText = d.exit;
    }
</script>
</body>
</html>
