<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salad Transport PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        /* Language Bar */
        .lang-bar { display: flex; justify-content: flex-end; padding: 15px; gap: 15px; background: #1e293b; border-bottom: 1px solid #334155; }
        .lang-btn { cursor: pointer; font-size: 22px; }

        /* Dashboard Stats */
        .header-main { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .stat-box { background: var(--card); border-radius: 12px; padding: 12px; text-align: center; border: 1.5px solid; }
        .stat-box small { font-size: 9px; display: block; margin-bottom: 5px; font-weight: bold; }
        .stat-box span { font-weight: bold; font-size: 14px; }

        .main-summary { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 15px; padding: 25px; text-align: center; }
        .sub-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 15px; }
        .sub-row div small { color: #94a3b8; font-size: 10px; display: block; }
        .sub-row div b { font-size: 15px; color: white; }

        /* List Cards */
        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 0 15px 12px 15px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .entry-card.expense { border-left: 5px solid var(--red); }
        .entry-card.income { border-left: 5px solid var(--green); }
        
        .entry-info h4 { margin: 0; font-size: 16px; }
        .entry-info small { color: #64748b; font-size: 12px; }
        .entry-val { text-align: right; font-weight: bold; position: relative; }
        
        /* Action Menu */
        .menu-dots { cursor: pointer; color: #444; padding: 5px; margin-left: 10px; }
        .dropdown { position: absolute; right: 0; top: 25px; background: white; color: black; border-radius: 8px; display: none; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5); min-width: 100px; }
        .dropdown div { padding: 10px; font-size: 12px; border-bottom: 1px solid #eee; text-align: left; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--yellow); }

        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="lang-bar">
    <span class="lang-btn" onclick="setLang('no')">🇳🇴</span>
    <span class="lang-btn" onclick="setLang('so')">🇸🇴</span>
    <span class="lang-btn" onclick="setLang('en')">🇺🇸</span>
</div>

<div id="app-content">
    <!-- PAGE 1: DASHBOARD -->
    <div id="page-dash" class="page">
        <div class="header-main">MOHAMED SALAD TRANSPORT</div>
        
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small id="t-inc">INCOME</small><span id="val-income">0</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small id="t-exp">KHARASH</small><span id="val-expense">0</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small id="t-other">U-BAXAY</small><span id="val-other">0</span></div>
        </div>

        <div class="main-summary">
            <div class="sub-row">
                <div><small id="t-mva">MVA REFUND (1/5)</small><b id="res-mva">0 kr</b></div>
                <div><small id="t-ferie">FERIEPENGER (10.2%)</small><b id="res-ferie">0 kr</b></div>
            </div>
            <small style="color:var(--yellow); font-weight:bold;" id="t-net">NET RESULT</small>
            <h1 id="res-net" style="color:var(--green); margin: 10px 0;">0 kr</h1>
        </div>

        <div id="entry-list"></div>
    </div>

    <!-- PAGE 2: ADD -->
    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <h2 style="text-align:center; color:var(--yellow)" id="t-add-title">Add New Entry</h2>
        <select id="type">
            <option value="income-mva">Faktura (Income MVA)</option>
            <option value="expense-fuel">Drivstoff (Fuel)</option>
            <option value="expense-regn">Regnskap</option>
            <option value="expense-other">Other Expense</option>
        </select>
        <input type="text" id="desc" placeholder="Description (e.g. Drivstoff)">
        <input type="number" id="amt" placeholder="Amount (kr)">
        <button class="btn-save" style="background:var(--green); color:white" onclick="save('income')" id="btn-inc">SAVE INCOME</button>
        <button class="btn-save" style="background:var(--red); color:white" onclick="save('expense')" id="btn-exp">SAVE EXPENSE</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('dash')"><i class="fas fa-th-large"></i><br><span id="n-dash">Dash</span></div>
    <div class="nav-item" onclick="showPage('add')"><i class="fas fa-plus-circle"></i><br><span id="n-add">Add</span></div>
    <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i><br><span id="n-exit">Exit</span></div>
</div>

<script>
    // Config taada geli halkan
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const lang = {
        no: { inc: "INNTEKT", exp: "UTGIFTER", other: "ANDRE", mva: "MVA REFUND", ferie: "FERIEPENGER", net: "NETTO RESULTAT", add: "Legg til", n_dash: "Dash", n_add: "Legg til", n_exit: "Logg ut" },
        so: { inc: "INCOME", exp: "KHARASH", other: "U-BAXAY", mva: "MVA REFUND", ferie: "FERIEPENGER", net: "NET RESULT", add: "Geli Xog", n_dash: "Guudmar", n_add: "Ku Dar", n_exit: "Ka Bax" },
        en: { inc: "INCOME", exp: "EXPENSES", other: "OTHER", mva: "MVA REFUND", ferie: "FERIEPENGER", net: "NET RESULT", add: "Add Entry", n_dash: "Dash", n_add: "Add", n_exit: "Exit" }
    };

    function setLang(l) {
        const d = lang[l];
        document.getElementById('t-inc').innerText = d.inc;
        document.getElementById('t-exp').innerText = d.exp;
        document.getElementById('t-other').innerText = d.other;
        document.getElementById('t-mva').innerText = d.mva;
        document.getElementById('t-ferie').innerText = d.ferie;
        document.getElementById('t-net').innerText = d.net;
        document.getElementById('n-dash').innerText = d.n_dash;
        document.getElementById('n-add').innerText = d.n_add;
        document.getElementById('n-exit').innerText = d.n_exit;
    }

    function save(category) {
        const t = document.getElementById('type').value;
        const d = document.getElementById('desc').value;
        const a = parseFloat(document.getElementById('amt').value);
        if(!d || !a) return alert("Buuxi xogta!");

        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            category: category, type: t, desc: d, amount: a, date: new Date().toISOString().split('T')[0]
        });
        showPage('dash');
    }

    function load() {
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            const list = document.getElementById('entry-list');
            list.innerHTML = "";
            let i=0, e=0, m=0;
            
            snap.forEach(child => {
                const val = child.val();
                if(val.category === 'income') { i += val.amount; m += (val.amount * 12/112); }
                else e += val.amount;

                list.innerHTML += `
                <div class="entry-card ${val.category}">
                    <div class="entry-info">
                        <small>${val.type.toUpperCase()}</small>
                        <h4>${val.desc}</h4>
                        <small>${val.date}</small>
                    </div>
                    <div class="entry-val">
                        <span style="color:${val.category==='income'?'var(--green)':'var(--red)'}">${val.amount.toLocaleString()} kr</span>
                        <i class="fas fa-ellipsis-v menu-dots" onclick="toggleMenu('${child.key}')"></i>
                        <div id="menu-${child.key}" class="dropdown">
                            <div onclick="alert('Detail: ${val.desc}')"><i class="fas fa-info-circle"></i> Detail</div>
                            <div onclick="alert('Edit disabled for safety')"><i class="fas fa-edit"></i> Edit</div>
                            <div onclick="remove('${child.key}')" style="color:red"><i class="fas fa-trash"></i> Delete</div>
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('val-income').innerText = i.toLocaleString() + " kr";
            document.getElementById('val-expense').innerText = e.toLocaleString() + " kr";
            document.getElementById('res-mva').innerText = Math.floor(m).toLocaleString() + " kr";
            document.getElementById('res-ferie').innerText = Math.floor(i * 0.102).toLocaleString() + " kr";
            document.getElementById('res-net').innerText = (i - e).toLocaleString() + " kr";
        });
    }

    function toggleMenu(id) {
        const m = document.getElementById('menu-'+id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function remove(id) { if(confirm("Ma tirtirtaa?")) db.ref('users/' + auth.currentUser.uid + '/entries/' + id).remove(); }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
        document.getElementById('page-'+p).style.display = 'block';
    }

    auth.onAuthStateChanged(user => { if(user) load(); else location.href="login.html"; }); // Hubi inuu login yahay
</script>
</body>
</html>
