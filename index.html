<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Full Regnskap</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .lang-btn { cursor: pointer; font-size: 20px; margin-left: 10px; }
        
        /* Stats Grid - 4 Columns */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .stat-box { background: var(--card); border: 2px solid; border-radius: 12px; padding: 15px; text-align: center; }
        .stat-box small { font-size: 10px; display: block; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }

        /* Summary Card */
        .summary-card { background: var(--card); border: 3px solid var(--yellow); border-radius: 20px; margin: 15px; padding: 20px; text-align: center; }
        
        .mva-card { background: var(--card); border-radius: 15px; margin: 0 15px; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid var(--border); }
        .mva-item { text-align: center; font-size: 12px; }

        .entry-card { background: var(--card); border-radius: 15px; padding: 15px; margin: 10px 15px; border-left: 6px solid; display: flex; justify-content: space-between; align-items: center; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--yellow); }
        
        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; background: var(--green); }
        .auth-container { padding: 40px 20px; text-align: center; max-width: 400px; margin: auto; }
    </style>
</head>
<body id="body-tag">

<div id="auth-page" class="auth-container">
    <h2 style="color:var(--yellow)">TRANSPORT PRO</h2>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon" onclick="toggleTheme()"></i>
        <div>
            <span class="lang-btn" onclick="setLang('no')">🇳🇴</span>
            <span class="lang-btn" onclick="setLang('so')">🇸🇴</span>
            <span class="lang-btn" onclick="setLang('en')">🇺🇸</span>
        </div>
    </div>

    <div id="page-dash" class="page">
        <h3 style="text-align:center; color:var(--yellow)" id="u-name">MOHAMED SALAAD</h3>
        
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small id="l-inc">Dakhli</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small id="l-exp">Kharash</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small id="l-net">Netto</small><span id="total-netto">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small>MVA (25%)</small><span id="total-mva-25">0 kr</span></div>
        </div>

        <div class="mva-card">
            <div class="mva-item"><small>Feriepenger (10.2%)</small><br><b id="res-fp">0 kr</b></div>
            <div class="mva-item"><small>AGA (14.1%)</small><br><b id="res-aga">0 kr</b></div>
        </div>
        
        <div class="summary-card">
            <small style="color: var(--yellow); font-weight: bold;">TOTAL RESULTAT</small>
            <h1 id="res-total" style="color:var(--green); margin: 10px 0;">0 kr</h1>
        </div>
        
        <div style="padding: 0 15px;"><select id="month-filter" onchange="loadData()"></select></div>
        <div id="entries-list"></div>
    </div>

    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <h3 id="l-add-title">REGISTRER DATA</h3>
        <input type="date" id="entry-date">
        <select id="entry-category">
            <optgroup label="DRIFTSINNTEKTER (Dakhli)">
                <option value="3030">3030 - Kjøreinntekter, lav sats</option>
                <option value="3031">3031 - Kjøreinntekter kontant</option>
                <option value="3032">3032 - Kjøreinntekter NAV</option>
                <option value="3033">3033 - Kjøreinntekter skole</option>
                <option value="3039">3039 - Bomtur, lav sats</option>
                <option value="3110">3110 - Tips</option>
            </optgroup>
            <optgroup label="DRIFTSKOSTNADER (Kharash)">
                <option value="5000">5000 - Lønn til ansatte</option>
                <option value="5400">5400 - Arbeidsgiveravgift</option>
                <option value="5920">5920 - Yrkesskadeforsikring</option>
                <option value="6010">6010 - Avskrivning transport</option>
                <option value="7000">7000 - Drivstoff</option>
                <option value="7020">7020 - Vedlikehold</option>
                <option value="7798">7798 - Annen kostnad</option>
            </optgroup>
        </select>
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        <button class="btn-save" onclick="saveData()" id="l-save-btn">LAGRE</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-chart-line"></i><br><span id="n-dash">Oversikt</span></div>
        <div class="nav-item" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br><span id="n-add">Legg til</span></div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><br><span id="n-exit">Logg ut</span></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      messagingSenderId: "608716442795",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const lang = {
        so: { inc: "Dakhli", exp: "Kharash", net: "Netto", dash: "Warbixin", add: "Ku dar", exit: "Kabax", save: "KAYDI", title: "DIIWAANGELI" },
        no: { inc: "Inntekt", exp: "Utgifter", net: "Netto", dash: "Oversikt", add: "Legg til", exit: "Logg ut", save: "LAGRE", title: "REGISTRER DATA" },
        en: { inc: "Income", exp: "Expense", net: "Netto", dash: "Dashboard", add: "Add Data", exit: "Logout", save: "SAVE", title: "REGISTER DATA" }
    };

    function setLang(l) {
        document.getElementById('l-inc').innerText = lang[l].inc;
        document.getElementById('l-exp').innerText = lang[l].exp;
        document.getElementById('l-net').innerText = lang[l].net;
        document.getElementById('n-dash').innerText = lang[l].dash;
        document.getElementById('n-add').innerText = lang[l].add;
        document.getElementById('n-exit').innerText = lang[l].exit;
        document.getElementById('l-save-btn').innerText = lang[l].save;
        document.getElementById('l-add-title').innerText = lang[l].title;
    }

    function setupFilter() {
        const select = document.getElementById('month-filter');
        const months = ["Jan", "Feb", "Mar", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Des"];
        let options = `<option value="all">Alt tid</option>`;
        for(let i=0; i<12; i++) options += `<option value="${i+1}-2026">${months[i]} 2026</option>`;
        select.innerHTML = options;
        select.value = (new Date().getMonth()+1) + "-2026";
        document.getElementById('entry-date').valueAsDate = new Date();
    }

    function saveData() {
        const desc = document.getElementById('entry-desc').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);
        const cat = document.getElementById('entry-category').value;
        const date = new Date(document.getElementById('entry-date').value);
        if(!desc || isNaN(amt)) return alert("Gali xogta!");
        
        const mainCat = parseInt(cat) < 4000 ? 'income' : 'expense';
        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            desc, amt, subCat: cat, mainCat,
            date: date.toLocaleDateString('no-NO'),
            filterKey: (date.getMonth()+1) + "-" + date.getFullYear()
        });
        document.getElementById('entry-desc').value = "";
        document.getElementById('entry-amt').value = "";
        showTab('dash');
    }

    function loadData() {
        const filter = document.getElementById('month-filter').value;
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            let ti=0, te=0, fp=0, aga=0;
            const list = document.getElementById('entries-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const v = child.val();
                if(filter === "all" || v.filterKey === filter) {
                    if(v.mainCat === 'income') ti += v.amt; else te += v.amt;
                    if(v.subCat == "5000") { fp += (v.amt * 0.102); aga += (v.amt * 0.141); }
                    list.innerHTML += `<div class="entry-card" style="border-left-color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}">
                        <div><b>${v.desc}</b><br><small>Kat: ${v.subCat}</small></div>
                        <div style="color:${v.mainCat==='income'?'#2ecc71':'#ff4757'}"><b>${v.amt.toLocaleString()} kr</b></div>
                    </div>`;
                }
            });
            document.getElementById('total-income').innerText = ti.toLocaleString() + " kr";
            document.getElementById('total-expense').innerText = te.toLocaleString() + " kr";
            document.getElementById('total-netto').innerText = (ti - te).toLocaleString() + " kr";
            document.getElementById('total-mva-25').innerText = (ti * 0.25).toLocaleString() + " kr";
            document.getElementById('res-fp').innerText = fp.toLocaleString() + " kr";
            document.getElementById('res-aga').innerText = aga.toLocaleString() + " kr";
            document.getElementById('res-total').innerText = (ti - te).toLocaleString() + " kr";
        });
    }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display='none';
            document.getElementById('main-app').style.display='block';
            db.ref('users/'+user.uid+'/profile/fullName').on('value', s => {
                if(s.exists()) document.getElementById('u-name').innerText = s.val().toUpperCase();
            });
            setupFilter(); loadData();
        }
    });

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
