<!-- PAGE 2: GELI XOG (FORM) -->
    <div id="page-add" class="page">
        <h2 style="text-align:center; color:var(--yellow)" id="t-add-title">Ku Dar Xog</h2>
        <label id="t-type-label">Nooca:</label>
        <select id="type">
            <option value="Income-Sentral">Sentral Income (Med MVA)</option>
            <option value="Income-Own">Own Income (Uten MVA)</option>
            <option value="Kharash-Regn">Regnskapsfører (Red)</option>
            <option value="Kharash-Biler">Biler Fix / Service (Red)</option>
            <option value="Kharash-Bom">Bompenger (Red)</option>
            <option value="Kharash-Driv">Drivstoff (Red)</option>
            <option value="Kharash-Other">Other Expenses (Red)</option>
        </select>
        <input type="text" id="cat" placeholder="Faahfaahin / Description">
        <input type="number" id="amount" placeholder="Lacagta (kr)">
        
        <!-- Badhanka Cagaarka (Dakhliga) -->
        <button class="btn-pro" style="background:var(--green); color:white; margin-bottom:10px;" onclick="saveData()" id="t-save">KEYDI DAKHLIGA (INCOME)</button>
        
        <!-- Badhanka Guduudka (Kharashka) oo lagu daray -->
        <button class="btn-pro" style="background:var(--red); color:white;" onclick="saveData()">KEYDI KHARASHKA (EXPENSE)</button>
    </div>
