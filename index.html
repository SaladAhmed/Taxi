<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Regnskap Edition</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransportPRO">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --yellow: #f1c40f;
            --green: #2ecc71;
            --red: #ff4757;
            --blue: #3b82f6;
            --text: #f8fafc;
            --border: #334155;
        }

        .light-theme {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
            transition: 0.3s;
            overflow-x: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }

        .auth-container {
            padding: 30px;
            text-align: center;
            max-width: 400px;
            margin: 40px auto;
            background: var(--card);
            border-radius: 15px;
        }

        .header-title {
            text-align: center;
            color: var(--yellow);
            font-weight: bold;
            padding: 20px 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            max-width: 800px;
            margin: auto;
        }

        .stat-box {
            background: var(--card);
            border: 1.5px solid;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-box small {
            font-size: 9px;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .mva-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 15px;
            margin: 10px auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 780px;
        }

        .mva-item {
            text-align: center;
            border-right: 1px solid var(--border);
        }

        .mva-item:last-child { border-right: none; }

        .summary-card {
            background: var(--card);
            border: 2px solid var(--yellow);
            border-radius: 20px;
            margin: 10px auto;
            padding: 20px;
            text-align: center;
            max-width: 770px;
        }

        .entry-card {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            margin: 0 15px 12px 15px;
            border-left: 6px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #64748b;
            font-size: 10px;
            cursor: pointer;
            flex: 1;
        }

        .nav-item.active { color: var(--yellow); }

        input, select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-save {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .entry-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .entry-actions i { cursor: pointer; transition: 0.2s; }
        .fa-trash:hover { color: var(--red); }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="auth-page" class="auth-container">
    <h2 style="color:var(--yellow)">🚖 TRANSPORT PRO</h2>
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        <div id="user-display-name">Laster...</div>
        <div>
            <span onclick="updateLang('no')">🇳🇴</span>
            <span onclick="updateLang('so')">🇸🇴</span>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="page-dash" class="page">
        <div class="stats-grid">
            <div class="stat-box" style="border-color:var(--green);color:var(--green)">
                <small>INNTEKT</small><span id="total-income">0 kr</span>
            </div>
            <div class="stat-box" style="border-color:var(--red);color:var(--red)">
                <small>UTGIFTER</small><span id="total-expense">0 kr</span>
            </div>
            <div class="stat-box" style="border-color:var(--blue);color:var(--blue)">
                <small>NETTO</small><span id="total-netto">0 kr</span>
            </div>
        </div>
        <div class="summary-card">
            <small>RESULTAT FØR SKATT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>
        <div id="entries-list"></div>
    </div>

    <!-- ADD PAGE -->
    <div id="page-add" class="page" style="display:none; padding:20px;">
        <div class="header-title">REGISTRER DATA</div>
        
        <input type="date" id="entry-date">
        
        <select id="entry-category">
            <optgroup label="INNTEKT (DRIFTSINNTEKTER)">
                <option value="3030">3030 - Kjøreinntekter, lav sats</option>
                <option value="3031">3031 - Kjøreinntekter kontant</option>
                <option value="3032">3032 - Kjøreinntekter NAV (Pasient)</option>
                <option value="3033">3033 - Kjøreinntekter skole</option>
                <option value="3039">3039 - Bomtur / Ikke møtt</option>
                <option value="3110">3110 - Tips</option>
            </optgroup>
            <optgroup label="UTGIFTER (DRIFTSKOSTNADER)">
                <option value="5000">5000 - Lønn / Feriepenger</option>
                <option value="5400">5400 - Arbeidsgiveravgift</option>
                <option value="5920">5920 - Yrkesskadeforsikring</option>
                <option value="6010">6010 - Avskrivning</option>
                <option value="6705">6705 - Regnskapshonorar</option>
                <option value="6755">6755 - Sentralavgift</option>
                <option value="6800">6800 - Kontorrekvisita</option>
                <option value="6900">6900 - Telefon</option>
                <option value="6907">6907 - Datakommunikasjon</option>
                <option value="7000">7000 - Drivstoff</option>
                <option value="7020">7020 - Vedlikehold</option>
                <option value="7040">7040 - Forsikring</option>
                <option value="7140">7140 - Reisekostnad</option>
                <option value="7400">7400 - Kontingent</option>
                <option value="7770">7770 - Bank- og kortgebyr</option>
                <option value="7798">7798 - Annen kostnad</option>
            </optgroup>
        </select>

        <input type="text" id="entry-desc" placeholder="Beskrivelse (T.d: Pasienttransport)" oninput="handleSmartLogic(this.value)">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">

        <div class="btn-group">
            <button class="btn-save" style="background:var(--green)" onclick="saveData('income')">INNTEKT</button>
            <button class="btn-save" style="background:var(--red)" onclick="saveData('expense')">UTGIFT</button>
        </div>
    </div>

    <!-- REPORTS -->
    <div id="page-reports" class="page" style="display:none; padding:20px;">
        <div class="header-title">REGNSKAP REPORTS</div>
        <table class="report-table" id="report-table-main" style="width:100%; border-collapse: collapse; background:var(--card);">
            <thead>
                <tr style="background:var(--border); color:var(--yellow)">
                    <th style="padding:10px">Dato</th>
                    <th>Konto</th>
                    <th>Beskrivelse</th>
                    <th>Beløp</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-chart-line"></i><br>Dash</div>
        <div class="nav-item" onclick="showTab('add')"><i class="fas fa-plus"></i><br>Add</div>
        <div class="nav-item" onclick="showTab('reports')"><i class="fas fa-file-invoice"></i><br>Reports</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><br>Logg ut</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
        authDomain: "mohamed-salad-transport.firebaseapp.com",
        databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mohamed-salad-transport",
        storageBucket: "mohamed-salad-transport.firebasestorage.app",
        appId: "1:608716442795:web:34cafc1a23316664717bee"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // SMART LOGIC: Otomaatik u dooro account-ka saxda ah
    function handleSmartLogic(val) {
        const d = val.toLowerCase();
        const cat = document.getElementById('entry-category');

        if (d.includes('pasient') || d.includes('nav')) cat.value = "3032";
        else if (d.includes('spesial') || d.includes('kreditt')) cat.value = "3030";
        else if (d.includes('møtt') || d.includes('bomtur')) cat.value = "3039";
        else if (d.includes('tips')) cat.value = "3110";
        else if (d.includes('ferie') || d.includes('lønn')) cat.value = "5000";
        else if (d.includes('drivstoff') || d.includes('diesel')) cat.value = "7000";
        else if (d.includes('gebyr') || d.includes('adm')) cat.value = "7770";
        else if (d.includes('vedlikehold')) cat.value = "7020";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } 
        catch (err) { alert("Error: " + err.message); }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display-name').innerText = user.email;
            loadData();
        } else {
            document.getElementById('auth-page').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + tab).style.display = 'block';
    }

    async function saveData(type) {
        const userId = auth.currentUser.uid;
        const date = document.getElementById('entry-date').value;
        const cat = document.getElementById('entry-category').value;
        const desc = document.getElementById('entry-desc').value;
        const amt = parseFloat(document.getElementById('entry-amt').value);

        if (!date || isNaN(amt)) return alert("Geli xogta!");

        await db.ref(`users/${userId}/entries`).push({ date, cat, desc, amt, type });
        document.getElementById('entry-amt').value = '';
        document.getElementById('entry-desc').value = '';
        showTab('dash');
    }

    function loadData() {
        const userId = auth.currentUser.uid;
        db.ref(`users/${userId}/entries`).on('value', snap => {
            let inc = 0, exp = 0, listH = '', reportH = '';
            snap.forEach(child => {
                const d = child.val();
                if (d.type === 'income') inc += d.amt; else exp += d.amt;
                
                listH += `
                    <div class="entry-card" style="border-color:${d.type==='income'?'#2ecc71':'#ff4757'}">
                        <div><b>${d.desc}</b><br><small>${d.date} (${d.cat})</small></div>
                        <div class="entry-actions"><b>${d.amt} kr</b> <i class="fas fa-trash" onclick="deleteEntry('${child.key}')"></i></div>
                    </div>`;
                reportH += `<tr style="border-bottom:1px solid #334155"><td style="padding:10px">${d.date}</td><td>${d.cat}</td><td>${d.desc}</td><td>${d.amt} kr</td></tr>`;
            });
            document.getElementById('total-income').innerText = inc + " kr";
            document.getElementById('total-expense').innerText = exp + " kr";
            document.getElementById('total-netto').innerText = (inc - exp) + " kr";
            document.getElementById('res-total').innerText = (inc - exp) + " kr";
            document.getElementById('entries-list').innerHTML = listH;
            document.getElementById('report-body').innerHTML = reportH;
        });
    }

    function deleteEntry(id) { if(confirm("Ma tirtirtaa?")) db.ref(`users/${auth.currentUser.uid}/entries/${id}`).remove(); }
    function logout() { auth.signOut(); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
</script>
</body>
</html>
