<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport PRO - Full Regnskap</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransportPRO">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --yellow: #f1c40f; --green: #2ecc71; --red: #ff4757; --blue: #3b82f6; --text: #f8fafc; --border: #334155; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; overflow-x: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .lang-btn { cursor: pointer; font-size: 18px; margin-left: 10px; }
        .theme-toggle { cursor: pointer; font-size: 20px; color: var(--yellow); }

        .auth-container { padding: 30px; text-align: center; max-width: 400px; margin: 40px auto; background: var(--card); border-radius: 15px; }
        .header-title { text-align: center; color: var(--yellow); font-weight: bold; padding: 20px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Stats Grid - Sida sawirkaada */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .stat-box { background: var(--card); border: 1.5px solid; border-radius: 12px; padding: 12px; text-align: center; }
        .stat-box small { font-size: 10px; display: block; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .stat-box span { font-weight: bold; font-size: 14px; }

        /* MVA & Tax Info */
        .mva-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; margin: 10px auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 780px; }
        .mva-item { text-align: center; }
        .mva-item small { font-size: 10px; color: #94a3b8; text-transform: uppercase; }

        /* Natiijada Guud - Total Resultat */
        .summary-card { background: var(--card); border: 2px solid var(--yellow); border-radius: 20px; margin: 15px auto; padding: 20px; text-align: center; max-width: 770px; }
        .summary-card small { font-weight: bold; color: var(--yellow); letter-spacing: 1px; }
        .summary-card h1 { margin: 10px 0 0 0; font-size: 32px; }
        
        .view-toggle { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 0 15px; gap: 10px; max-width: 800px; margin: 15px auto; }
        #month-filter { background: var(--card); color: var(--text); border: 1px solid var(--yellow); padding: 10px; border-radius: 10px; flex: 1; }

        .entry-card { background: var(--card); border-radius: 12px; padding: 15px; margin: 0 15px 10px 15px; border-left: 5px solid; display: flex; justify-content: space-between; align-items: center; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--yellow); }

        input, select { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        .btn-save { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 16px; transition: 0.3s; }
        
        #scanner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #camera-feed { width: 90%; max-width: 400px; border-radius: 15px; }
    </style>
</head>
<body id="body-tag">

<div id="auth-page" class="auth-container">
    <h2 id="auth-title">LOGG INN</h2>
    <input type="text" id="reg-name" placeholder="Fullt navn" style="display:none">
    <input type="email" id="email" placeholder="E-post">
    <input type="password" id="pass" placeholder="Passord">
    <button id="auth-btn" class="btn-save" style="background:var(--blue)" onclick="handleAuth()">LOGG INN</button>
    <p id="auth-toggle-text" onclick="toggleAuthMode()" style="margin-top:20px; cursor:pointer; font-size:12px;">Ingen konto? Registrer deg her</p>
</div>

<div id="scanner-overlay">
    <video id="camera-feed" autoplay playsinline></video>
    <canvas id="camera-canvas" style="display:none;"></canvas>
    <div style="margin-top:20px;">
        <button class="btn-save" style="background:var(--green); width:auto; padding: 10px 30px;" onclick="captureImage()">SNAP</button>
        <button class="btn-save" style="background:var(--red); width:auto; padding: 10px 30px;" onclick="stopScanner()">AVBRYT</button>
    </div>
</div>

<div id="main-app" style="display:none">
    <div class="top-bar">
        <i class="fas fa-moon theme-toggle" onclick="toggleTheme()"></i>
        <div>
            <span class="lang-btn" onclick="alert('Language changed')">🇳🇴</span>
            <span class="lang-btn" onclick="alert('Language changed')">🇸🇴</span>
            <span class="lang-btn" onclick="alert('Language changed')">🇺🇸</span>
        </div>
    </div>

    <div id="page-dash" class="page">
        <div class="header-title"><span id="user-display-name">...</span></div>
        
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--green); color: var(--green);"><small>Inntekt</small><span id="total-income">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--red); color: var(--red);"><small>Utgifter</small><span id="total-expense">0 kr</span></div>
            <div class="stat-box" style="border-color: var(--blue); color: var(--blue);"><small>Netto</small><span id="total-netto">0 kr</span></div>
        </div>

        <div class="mva-card">
            <div class="mva-item"><small>MVA (25%)</small><br><b id="res-mva">0 kr</b></div>
            <div class="mva-item"><small>AGA (14.1%)</small><br><b id="res-aga">0 kr</b></div>
            <div class="mva-item"><small>Feriepenger</small><br><b id="res-fp">0 kr</b></div>
            <div class="mva-item"><small>Avskrivning</small><br><b id="res-avsk">0 kr</b></div>
        </div>

        <div class="summary-card">
            <small>TOTAL RESULTAT</small>
            <h1 id="res-total" style="color:var(--green)">0 kr</h1>
        </div>

        <div class="view-toggle">
            <select id="month-filter" onchange="loadData()"></select>
            <button class="btn-save" style="width:auto; padding:10px 20px; background:var(--blue)" onclick="toggleHideValues()"><i class="fas fa-eye"></i></button>
        </div>
        
        <div id="entries-list"></div>
    </div>

    <div id="page-add" class="page" style="display:none; padding: 20px;">
        <div class="header-title">REGISTRER DATA</div>
        <button class="btn-save" style="background:var(--blue); margin-bottom:20px;" onclick="startScanner()">
            <i class="fas fa-camera"></i> SMART SCAN
        </button>
        
        <input type="date" id="entry-date">
        
        <select id="entry-category" onchange="updateUI()">
            <optgroup label="DRIFTSINNTEKTER (12%)">
                <option value="3030">3030 - Kjøreinntekter, lav sats</option>
                <option value="3031">3031 - Kjøreinntekter kontant</option>
                <option value="3032">3032 - Kjøreinntekter NAV</option>
                <option value="3039">3039 - Bomtur</option>
                <option value="3110">3110 - Tips (Ingen MVA)</option>
            </optgroup>
            <optgroup label="DRIFTSKOSTNADER">
                <option value="5000">5000 - Lønn til ansatte</option>
                <option value="7000">7000 - Drivstoff</option>
                <option value="6755">6755 - Sentralavgift</option>
                <option value="7020">7020 - Vedlikehold</option>
                <option value="7798">7798 - Annen kostnad</option>
            </optgroup>
        </select>
        
        <input type="text" id="entry-desc" placeholder="Beskrivelse">
        <input type="number" id="entry-amt" placeholder="Beløp (kr)">
        
        <button class="btn-save" id="btn-save-main" style="background:var(--green)" onclick="saveData()">LAGRE</button>
    </div>

    <div id="page-profile" class="page" style="display:none; padding: 20px; text-align: center;">
        <div class="header-title">PROFIL</div>
        <img id="user-profile-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:100px; border-radius:50%; margin-bottom:20px; border:3px solid var(--yellow)">
        <input type="text" id="profile-name-update" placeholder="Fullt navn">
        <button class="btn-save" style="background:var(--blue)" onclick="updateProfileName()">UPPDATER</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-dash" onclick="showTab('dash')"><i class="fas fa-th-large"></i><br>Oversikt</div>
        <div class="nav-item" id="nav-add" onclick="showTab('add')"><i class="fas fa-plus-circle"></i><br>Legg til</div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')"><i class="fas fa-user-circle"></i><br>Profile</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i><br>Ut</div>
    </div>
</div>

<script>
    // --- CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyCYNLmTJEV2_WWNhIbpwbUCXzAMiMb0EYE",
      authDomain: "mohamed-salad-transport.firebaseapp.com",
      databaseURL: "https://mohamed-salad-transport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mohamed-salad-transport",
      storageBucket: "mohamed-salad-transport.firebasestorage.app",
      appId: "1:608716442795:web:34cafc1a23316664717bee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let isHidden = false;
    let isRegisterMode = false;

    // --- AUTH ---
    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('reg-name').style.display = isRegisterMode ? 'block' : 'none';
        document.getElementById('auth-title').innerText = isRegisterMode ? 'REGISTRER DEG' : 'LOGG INN';
        document.getElementById('auth-btn').innerText = isRegisterMode ? 'REGISTRER' : 'LOGG INN';
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(isRegisterMode) {
            auth.createUserWithEmailAndPassword(e, p).then(c => {
                db.ref('users/'+c.user.uid+'/profile').set({ fullName: document.getElementById('reg-name').value });
            }).catch(a => alert(a.message));
        } else {
            auth.signInWithEmailAndPassword(e, p).catch(a => alert(a.message));
        }
    }

    // --- SCANNER ---
    let stream;
    async function startScanner() {
        document.getElementById('scanner-overlay').style.display = 'flex';
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('camera-feed').srcObject = stream;
    }
    function stopScanner() {
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('scanner-overlay').style.display = 'none';
    }
    function captureImage() {
        const v = document.getElementById('camera-feed');
        const c = document.getElementById('camera-canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        Tesseract.recognize(c.toDataURL(), 'eng').then(({ data: { text } }) => {
            const num = text.match(/\d+[\.,]\d+/g);
            if(num) document.getElementById('entry-amt').value = parseFloat(num[0].replace(',', '.'));
            stopScanner();
        });
    }

    // --- CORE LOGIC ---
    function updateUI() {
        const cat = parseInt(document.getElementById('entry-category').value);
        const btn = document.getElementById('btn-save-main');
        // Haddii ay tahay Inntekt (3000s) dhig Cagaar, haddii kale dhig Guduud
        btn.style.background = (cat < 5000) ? 'var(--green)' : 'var(--red)';
    }

    function saveData() {
        const cat = document.getElementById('entry-category').value;
        const amt = parseFloat(document.getElementById('entry-amt').value) || 0;
        const date = new Date(document.getElementById('entry-date').value);
        
        db.ref('users/' + auth.currentUser.uid + '/entries').push({
            subCat: cat,
            amt: amt,
            desc: document.getElementById('entry-desc').value,
            date: date.toLocaleDateString('no-NO'),
            filterKey: (date.getMonth()+1) + "-" + date.getFullYear(),
            type: (parseInt(cat) < 5000) ? 'income' : 'expense'
        });
        showTab('dash');
    }

    function loadData() {
        const filter = document.getElementById('month-filter').value;
        db.ref('users/' + auth.currentUser.uid + '/entries').on('value', snap => {
            let ti=0, te=0, mva=0, aga=0, fp=0;
            const list = document.getElementById('entries-list');
            list.innerHTML = "";
            
            snap.forEach(child => {
                const v = child.val();
                if(filter === "all" || v.filterKey === filter) {
                    if(v.type === 'income') {
                        ti += v.amt;
                        if(v.subCat !== '3110') mva += (v.amt * 0.1071); // 12% mva included calc
                    } else {
                        te += v.amt;
                        if(v.subCat === '5000') { aga += (v.amt * 0.141); fp += (v.amt * 0.102); }
                    }
                    list.innerHTML += `
                        <div class="entry-card" style="border-left-color:${v.type==='income'?'var(--green)':'var(--red)'}">
                            <div><b>${v.subCat}</b><br><small>${v.date} - ${v.desc}</small></div>
                            <div style="color:${v.type==='income'?'var(--green)':'var(--red)'}"><b>${format(v.amt)}</b></div>
                        </div>`;
                }
            });
            
            document.getElementById('total-income').innerText = format(ti);
            document.getElementById('total-expense').innerText = format(te);
            document.getElementById('total-netto').innerText = format(ti - te);
            document.getElementById('res-mva').innerText = format(mva);
            document.getElementById('res-aga').innerText = format(aga);
            document.getElementById('res-fp').innerText = format(fp);
            
            // Xisaabta rasmiga ah: Netto - Canshuuraha
            const finalResult = (ti - te) - (mva + aga + fp);
            const resEl = document.getElementById('res-total');
            resEl.innerText = format(finalResult);
            resEl.style.color = finalResult >= 0 ? 'var(--green)' : 'var(--red)';
        });
    }

    function format(v) { return isHidden ? "**** kr" : Math.round(v).toLocaleString() + " kr"; }
    function toggleHideValues() { isHidden = !isHidden; loadData(); }

    function showTab(t) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
        if(t === 'dash') loadData();
    }

    function setupMonths() {
        const m = ["Jan", "Feb", "Mar", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Des"];
        let html = '<option value="all">Alt tid</option>';
        m.forEach((name, i) => { html += `<option value="${i+1}-2026">${name} 2026</option>`; });
        document.getElementById('month-filter').innerHTML = html;
        document.getElementById('month-filter').value = (new Date().getMonth()+1) + "-2026";
        document.getElementById('entry-date').valueAsDate = new Date();
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-page').style.display='none';
            document.getElementById('main-app').style.display='block';
            db.ref('users/'+user.uid+'/profile').on('value', s => {
                document.getElementById('user-display-name').innerText = (s.val()||{}).fullName || "Bruker";
            });
            setupMonths(); loadData();
        } else {
            document.getElementById('auth-page').style.display='block';
            document.getElementById('main-app').style.display='none';
        }
    });

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
